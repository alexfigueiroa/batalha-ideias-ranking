<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel de Avaliadores — Batalha de Ideias 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

<style>
:root{--bg:#f8fafc;--borda:#e2e8f0;--cinza:#64748b;--txt:#1e293b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter Tight','Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
input,select,button,textarea{font-family:inherit}
header{background:#1e293b;color:#fff;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
header a{color:#94a3b8;text-decoration:none;font-size:0.8rem;flex-shrink:0;transition:color .12s}
header a:hover{color:#fff}
header h1{font-size:1rem;font-weight:700;color:#fff;flex:1}
.hbadge{font-size:0.72rem;background:#334155;color:#94a3b8;padding:4px 10px;border-radius:6px;white-space:nowrap}
.filters{display:flex;gap:10px;padding:12px 24px;background:#fff;border-bottom:1px solid #e2e8f0;align-items:flex-end;flex-wrap:wrap}
.f-group{flex:1 1 0;min-width:140px;max-width:210px;display:flex;flex-direction:column;gap:3px}
.f-group.wide{flex:2 1 0;max-width:310px}
.f-group>label{font-size:0.68rem;color:#64748b;font-weight:500;white-space:nowrap}
.f-group>select,.f-group>input{width:100%;height:34px;padding:5px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:0.78rem;background:#fff;outline:none;color:#1e293b;font-family:inherit}
.f-group>select:focus,.f-group>input:focus{border-color:#1e40af}
.f-clear{height:34px;padding:5px 14px;background:#4361ee;color:#fff;border:none;border-radius:6px;font-size:0.78rem;font-family:inherit;cursor:pointer;align-self:flex-end;flex-shrink:0}
.f-clear:hover{background:#3451d1}
.f-stats{font-size:0.75rem;color:#64748b;align-self:flex-end;padding-bottom:6px;white-space:nowrap;margin-left:auto}
.wrap{padding:20px 0 24px 32px;overflow-x:auto}
table{width:100%;border-collapse:collapse;margin-top:16px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
thead tr{background:#1e293b;color:#fff}
th{padding:10px 12px;font-size:0.88rem;font-weight:700;text-align:left;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #f1f5f9;vertical-align:top;font-size:1rem}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.td-id{color:#94a3b8;font-size:0.9rem;font-weight:700;white-space:nowrap}
.td-tit{font-weight:600;color:#1e293b;max-width:240px}
.td-tit small{display:block;font-weight:400;font-size:0.81rem;color:#94a3b8;margin-top:2px}
.td-tit .meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.b-nde{background:#dbeafe;color:#1e40af;font-size:0.78rem;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap}
.b-eoa{background:#dcfce7;color:#166534;font-size:0.78rem;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap}
.b-si {background:#f3e8ff;color:#6b21a8;font-size:0.78rem;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap}
.b-trl{background:#f1f5f9;color:#475569;font-size:0.78rem;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap}
.td-sc{text-align:center;font-size:1.25rem;font-weight:700;color:#1e293b;white-space:nowrap}
.td-sc small{display:block;font-size:0.81rem;font-weight:400;color:#94a3b8}
.td-par{text-align:center;white-space:nowrap;font-size:0.94rem;font-weight:600}
.av-cell{min-width:160px;max-width:200px}
.av-nome{font-size:0.94rem;font-weight:600;color:#1e293b;line-height:1.3}
.av-dept{font-size:0.81rem;color:#94a3b8;display:block;margin-bottom:4px}
.badge{display:inline-block;font-size:0.81rem;font-weight:700;padding:2px 7px;border-radius:4px;margin-right:3px;margin-bottom:3px;white-space:nowrap}
.b-emit{background:#dcfce7;color:#166534}
.b-elab{background:#fef9c3;color:#854d0e}
.b-pend{background:#f1f5f9;color:#64748b}
.b-fav{background:#dbeafe;color:#1e40af}
.b-nf{background:#fee2e2;color:#991b1b}
.av-sc{font-size:1rem;font-weight:700;color:#1e293b;margin-top:4px}
.av-sc.low{color:#991b1b}
.av-sc.med{color:#854d0e}
.av-sc.high{color:#166534}
.empty-av{color:#cbd5e1;font-size:0.9rem;text-align:center;padding:8px 0}
/* Segmented bar */
.ideia-seg-track{width:100%;height:12px;background:#e2e8f0;border-radius:6px;overflow:hidden;display:flex}
.ideia-seg-legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.ideia-seg-item{display:flex;align-items:center;gap:5px;font-size:0.88rem}
.ideia-seg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
/* Por Avaliador */
.td-num{text-align:center;font-weight:700}
.td-pct{text-align:center;font-weight:700}
.bar-wrap{display:flex;align-items:center;gap:8px;justify-content:center}
.bar-track{width:80px;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;flex-shrink:0}
.bar-fill{height:100%;background:#4ade80;border-radius:4px}
.bar-fill-aval{height:100%;background:#60a5fa;border-radius:4px}
.av-summary{background:#fff;border-radius:10px;padding:14px 20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.av-sum-prog{flex:1;min-width:180px}
.av-sum-label{font-size:0.88rem;color:#64748b;margin-bottom:6px}
.av-sum-bar-row{display:flex;align-items:center;gap:10px}
.av-sum-track{flex:1;height:10px;background:#e2e8f0;border-radius:6px;overflow:hidden}
.av-sum-fill{height:100%;background:#60a5fa;border-radius:6px;transition:width .3s}
.av-sum-pct{font-size:1.025rem;font-weight:700;color:#1e40af;white-space:nowrap;min-width:36px;text-align:right}
.av-sum-nums{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.av-sum-stat{display:flex;flex-direction:column;align-items:center;gap:1px}
.av-sum-val{font-size:1.56rem;font-weight:700}
.av-sum-lbl{font-size:0.81rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px}
/* Status de avaliação por linha */
tr.row-parcial td{background:#fefce8}
tr.row-completo td{background:#f0fdf4}
tr.div-alta td{background:#fff7ed}
tr.row-parcial:hover td{background:#fef9c3}
tr.row-completo:hover td{background:#dcfce7}
tr.div-alta:hover td{background:#ffedd5}
/* Sort */
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{background:#334155}
th.sort-asc::after{content:' ▲';font-size:0.55rem;opacity:.8}
th.sort-desc::after{content:' ▼';font-size:0.55rem;opacity:.8}
/* Profile bar */
#profile-bar{background:#fff;border-bottom:1px solid var(--borda);padding:16px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px}
.pb-col{display:flex;flex-direction:column;gap:4px}
.pb-name{font-size:1.31rem;font-weight:700}
.pb-cargo{font-size:0.9rem;color:var(--cinza)}
.pb-desc{font-size:0.97rem;color:#475569;line-height:1.6;margin-top:8px}
.pb-sec-label{font-size:0.79rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--cinza);margin-bottom:7px}
.pb-hbars{display:flex;flex-direction:column;gap:6px}
.pb-hbar-row{display:flex;align-items:center;gap:10px}
.pb-hbar-label{font-size:0.95rem;font-weight:700;color:var(--txt);width:168px;flex-shrink:0}
.pb-hbar-track{flex:1;background:#f1f5f9;border-radius:3px;height:9px;max-width:200px}
.pb-hbar-fill{height:100%;border-radius:3px}
.pb-hbar-val{font-size:0.76rem;font-weight:700;min-width:24px;text-align:right}
.pb-stats{display:flex;flex-direction:column;gap:9px;margin-top:2px}
.pb-stat-row{display:flex;align-items:center;gap:8px}
.pb-stat-badge{font-size:0.98rem;font-weight:700;padding:2px 10px;border-radius:20px;flex-shrink:0;min-width:38px;text-align:center}
.pb-stat-lbl{font-size:0.95rem;color:var(--txt)}
.pb-stat-corte{font-size:0.81rem;color:#94a3b8;margin-left:4px}

.nav-icon { font-size:18px; vertical-align:middle; margin-right:4px;
  font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; }
</style>
</head>

// ── Populate selects ──
function populateSel(id,opts){
  var sel=document.getElementById(id);
  opts.forEach(function(o){var el=document.createElement('option');el.value=o;el.textContent=o;sel.appendChild(el);});
}
populateSel('f-arena', ARENAS_P);
populateSel('f-tec',   TECS_P);
populateSel('f-dept',  DEPTS_P);
populateSel('f-av',    AVS_P);

function resetFilters(){
  ['q-ideia','f-arena','f-tec','f-dept','f-av','f-aval'].forEach(function(id){
    var el=document.getElementById(id);
    el.value='';
  });
  render();
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getFilters(){
  return {
    q:     document.getElementById('q-ideia').value.trim().toLowerCase(),
    arena: document.getElementById('f-arena').value,
    tec:   document.getElementById('f-tec').value,
    dept:  document.getElementById('f-dept').value,
    av:    document.getElementById('f-av').value,
    aval:  document.getElementById('f-aval').value,
  };
}

function matchesIdeia(x, f){
  if(f.q && !String(x.id).includes(f.q) && !x.tit.toLowerCase().includes(f.q)
          && !(x.aut||'').toLowerCase().includes(f.q)) return false;
  if(f.av && !(x.avs||[]).some(function(a){return a.nome===f.av;})) return false;
  if(f.arena && (x.arenas||[]).indexOf(f.arena)<0) return false;
  if(f.tec   && (x.tecs  ||[]).indexOf(f.tec  )<0) return false;
  if(f.dept  && !(x.avs||[]).some(function(a){ return a.dept === f.dept; })) return false;
  if(f.aval !== ''){
    var n=parseInt(f.aval,10);
    if(x.ne !== n) return false;
  }
  return true;
}

function render(){
  renderAv();
  var f=getFilters();
  var active=[f.q,f.av,f.arena,f.tec,f.dept,f.aval].filter(Boolean).length;
  var filtered=IDEAS.filter(function(x){return matchesIdeia(x,f);});
  document.getElementById('f-stats').textContent = active
    ? filtered.length+' resultado'+(filtered.length!==1?'s':'')+' (filtrado)'
    : IDEAS.length+' ideias no total';
}

function scClass(v){
  if(v===null||v===undefined) return '';
  if(v>=20) return 'high';
  if(v>=15) return 'med';
  return 'low';
}

function avCard(av){
  if(!av) return '<td class="av-cell"><div class="empty-av">—</div></td>';
  var b = '';
  if(av.st==='E'){
    b += '<span class="badge b-emit">Emitido</span>';
  } else {
    b += '<span class="badge b-pend">Pendente</span>';
  }
  var sc = av.sc!==null && av.sc!==undefined
    ? '<div class="av-sc ' + scClass(av.sc) + '">' + av.sc + ' pts</div>'
    : '';
  return '<td class="av-cell">'
    + '<div class="av-nome">' + esc(av.nome) + '<span class="av-dept">' + esc(av.dept) + '</span></div>'
    + b + sc + '</td>';
}

var avSortCol = 'atrib';
var avSortDir = 'desc';


function sortAv(col){
  if(avSortCol === col) avSortDir = avSortDir === 'asc' ? 'desc' : 'asc';
  else { avSortCol = col; avSortDir = col === 'nome' || col === 'dept' ? 'asc' : 'desc'; }
  renderAv();
}

function renderAv(){
  var f = getFilters();
  // Filtrar ideias sem o f.av (que é usado para filtrar a tabela de avaliadores)
  var fIdeia = Object.assign({}, f, {av:''});
  var filtIdeas = IDEAS.filter(function(x){ return matchesIdeia(x, fIdeia); });

  // Reconstruir av_map das ideias filtradas
  var avMap = {};
  filtIdeas.forEach(function(idea){
    (idea.avs||[]).forEach(function(av){
      if(!av.nome) return;
      if(!avMap[av.nome]) avMap[av.nome]={nome:av.nome,dept:av.dept||'',atrib:0,emit:0,pend:0,fav:0,nf:0};
      avMap[av.nome].atrib++;
      if(av.st==='E'){
        avMap[av.nome].emit++;
        if(av.ver==='Favorável')      avMap[av.nome].fav++;
        else if(av.ver==='Não Favorável') avMap[av.nome].nf++;
      } else { avMap[av.nome].pend++; }
    });
  });

  var rows = Object.values(avMap);
  // Filtrar por avaliador selecionado
  if(f.av) rows = rows.filter(function(a){ return a.nome === f.av; });

  // Enriquecer com % calculados
  rows = rows.map(function(a){
    return Object.assign({}, a, {
      pctAval: a.atrib > 0 ? a.emit / a.atrib * 100 : 0,
      pctFav:  a.emit  > 0 ? a.fav  / a.emit  * 100 : 0,
    });
  });

  // Ordenar
  rows.sort(function(a, b){
    var av = a[avSortCol], bv = b[avSortCol];
    if(typeof av === 'string') return avSortDir==='asc' ? av.localeCompare(bv,'pt') : bv.localeCompare(av,'pt');
    return avSortDir === 'asc' ? av - bv : bv - av;
  });

  // stats handled by render()

  // Atualizar indicadores de sort no thead
  document.querySelectorAll('#av-thead th').forEach(function(th){
    th.classList.remove('sort-asc','sort-desc');
  });
  var cols = [null,'nome','dept','atrib','pend','pctAval','emit','fav','nf','pctFav'];
  var idx = cols.indexOf(avSortCol);
  if(idx >= 0){
    var th = document.querySelectorAll('#av-thead th')[idx];
    if(th) th.classList.add(avSortDir==='asc'?'sort-asc':'sort-desc');
  }

  var html = '';
  rows.forEach(function(a, i){
    var pctAval = Math.round(a.pctAval);
    var pctFav  = Math.round(a.pctFav);
    html += '<tr>'
      + '<td class="td-id">' + (i+1) + '</td>'
      + '<td style="font-weight:600">' + esc(a.nome) + '</td>'
      + '<td style="color:#64748b;font-size:0.75rem">' + esc(a.dept) + '</td>'
      + '<td class="td-num">' + a.atrib + '</td>'
      + '<td class="td-num" style="color:#854d0e">' + a.pend + '</td>'
      + '<td class="td-pct"><div class="bar-wrap">'
        + '<div class="bar-track"><div class="bar-fill-aval" style="width:' + pctAval + '%"></div></div>'
        + '<span style="color:#1e40af;min-width:34px;text-align:right">' + pctAval + '%</span>'
      + '</div></td>'
      + '<td class="td-num" style="color:#166534">' + a.emit + '</td>'
      + '<td class="td-num" style="color:#1e40af">' + a.fav + '</td>'
      + '<td class="td-num" style="color:#991b1b">' + a.nf  + '</td>'
      + '<td class="td-pct"><div class="bar-wrap">'
        + '<div class="bar-track"><div class="bar-fill" style="width:' + pctFav + '%"></div></div>'
        + '<span style="min-width:34px;text-align:right">' + pctFav + '%</span>'
      + '</div></td>'
      + '</tr>';
  });

  document.getElementById('tbody-av').innerHTML = html;

  // Summary agregado
  var totAtrib = rows.reduce(function(s,a){ return s + a.atrib; }, 0);
  var totEmit  = rows.reduce(function(s,a){ return s + a.emit;  }, 0);
  var totPend  = rows.reduce(function(s,a){ return s + a.pend;  }, 0);
  var pctGeral = totAtrib > 0 ? Math.round(totEmit / totAtrib * 100) : 0;
  document.getElementById('hbadge-av').textContent = pctGeral + '% concluído · ' + rows.length + ' avaliador' + (rows.length !== 1 ? 'es' : '');
  var pctPend = totAtrib > 0 ? 100 - pctGeral : 0;
  var avFills = (pctGeral > 0 ? '<div style="height:100%;width:'+pctGeral+'%;background:#60a5fa;transition:width .3s"></div>' : '')
              + (pctPend  > 0 ? '<div style="height:100%;width:'+pctPend +'%;background:#e2e8f0;transition:width .3s"></div>' : '');
  var avLegend = '<div class="ideia-seg-item"><div class="ideia-seg-dot" style="background:#60a5fa"></div>'
    + '<span style="color:#1e293b;font-weight:700">'+totEmit+'</span>'
    + '<span style="color:#94a3b8">Emitidas</span>'
    + '<span style="color:#64748b;font-size:0.68rem">('+pctGeral+'%)</span></div>'
    + '<div class="ideia-seg-item"><div class="ideia-seg-dot" style="background:#e2e8f0;border:1px solid #cbd5e1"></div>'
    + '<span style="color:#1e293b;font-weight:700">'+totPend+'</span>'
    + '<span style="color:#94a3b8">Pendentes</span>'
    + '<span style="color:#64748b;font-size:0.68rem">('+pctPend+'%)</span></div>';
  document.getElementById('av-summary').innerHTML =
    '<div class="av-sum-nums">'
    + '<div class="av-sum-stat"><span class="av-sum-val">' + totAtrib + '</span><span class="av-sum-lbl">Avaliações</span></div>'
    + '<div class="av-sum-prog" style="display:flex;flex-direction:column;gap:6px">'
    + '<div class="ideia-seg-track">' + avFills + '</div>'
    + '<div class="ideia-seg-legend">' + avLegend + '</div>'
    + '</div>'
    + '</div>';
}

render();
</script>
</body>
</html>
