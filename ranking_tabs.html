<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ranking Unificado — Batalha de Ideias 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--borda:#e2e8f0;--cinza:#64748b;--txt:#1e293b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter Tight','Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:16px;}

header{background:#1e293b;color:#fff;padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:200;flex-wrap:wrap;}
header a{color:#94a3b8;text-decoration:none;font-size:0.8rem;flex-shrink:0;transition:color .12s;}
header a:hover{color:#fff;}
header h1{font-size:1rem;font-weight:700;flex:1;}
.hbadge{margin-left:auto;font-size:0.7rem;background:#334155;padding:3px 10px;border-radius:20px;color:#94a3b8;flex-shrink:0;}

/* ── Tabs ── */
.tab-bar{background:#fff;border-bottom:2px solid var(--borda);display:flex;gap:0;padding:0 24px;position:sticky;top:49px;z-index:190;}
.tab-btn{padding:12px 22px;font-size:0.82rem;font-weight:600;font-family:inherit;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;color:#64748b;transition:color .12s,border-color .12s;white-space:nowrap;}
.tab-btn:hover{color:var(--txt);}
.tab-btn.active{color:#1e293b;border-bottom-color:#4361ee;}
.tab-badge{font-size:0.65rem;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px;background:#e2e8f0;color:#64748b;}
.tab-btn.active .tab-badge{background:#4361ee;color:#fff;}

.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── Filters ── */
.filters{display:flex;gap:10px;padding:12px 20px;flex-wrap:wrap;align-items:flex-end;background:#fff;border-bottom:1px solid var(--borda);}
.f-group{flex:1 1 0;min-width:140px;max-width:210px;display:flex;flex-direction:column;gap:3px;}
.f-group.wide{flex:2 1 0;max-width:310px;}
.f-group>label{font-size:0.68rem;color:#64748b;font-weight:500;white-space:nowrap;}
.f-group>select,.f-group>input{width:100%;height:34px;padding:5px 8px;border:1px solid var(--borda);border-radius:6px;font-size:0.78rem;background:#fff;outline:none;color:var(--txt);font-family:inherit;}
.f-group>select:focus,.f-group>input:focus{border-color:#4361ee;}
.f-clear{height:34px;padding:5px 14px;background:#4361ee;color:#fff;border:none;border-radius:6px;font-size:0.78rem;font-family:inherit;cursor:pointer;align-self:flex-end;flex-shrink:0;}
.f-clear:hover{background:#3451d1;}
.f-stats{font-size:0.7rem;color:#64748b;align-self:flex-end;padding-bottom:6px;white-space:nowrap;}

/* ── Stats bar ── */
.stat-bar{background:#fff;border-bottom:1px solid var(--borda);padding:16px 24px;display:grid;grid-template-columns:1.4fr 0.8fr 1fr;gap:28px;}
.pb-col{display:flex;flex-direction:column;gap:4px;}
.pb-name{font-size:1.31rem;font-weight:700;}
.pb-cargo{font-size:0.9rem;color:var(--cinza);}
.pb-desc{font-size:0.97rem;color:#475569;line-height:1.6;margin-top:4px;}
.pb-sec-label{font-size:0.79rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--cinza);margin-bottom:7px;}
.pb-stats{display:flex;flex-direction:column;gap:8px;}
.pb-stat-row{display:flex;align-items:center;gap:8px;}
.pb-stat-badge{font-size:0.88rem;font-weight:700;padding:2px 10px;border-radius:20px;flex-shrink:0;min-width:38px;text-align:center;}
.pb-stat-lbl{font-size:0.88rem;color:var(--txt);}
.pb-stat-corte{font-size:0.75rem;color:#94a3b8;margin-left:4px;}
.pb-hbars{display:flex;flex-direction:column;gap:6px;margin-bottom:6px;}
.pb-hbar-row{display:flex;align-items:center;gap:10px;}
.pb-hbar-label{font-size:0.95rem;font-weight:700;color:var(--txt);min-width:170px;}
.pb-hbar-track{flex:1;background:#f1f5f9;border-radius:3px;height:9px;max-width:200px;}
.pb-hbar-fill{height:100%;border-radius:3px;transition:width .3s;}
.pb-hbar-val{font-size:0.95rem;font-weight:700;min-width:18px;text-align:right;}

/* ── Ranking rows ── */
#content{padding:18px 24px;}
.dp-intro{font-size:0.78rem;color:#475569;background:#fff;padding:10px 14px;border-radius:8px;margin-bottom:16px;border:1px solid var(--borda);line-height:1.5;}
.dp-section{margin-bottom:32px;}
.dp-section-hd{border-left:4px solid;padding:6px 0 6px 12px;margin-bottom:10px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.dp-sec-title{font-size:0.88rem;font-weight:700;}
.dp-sec-count{font-size:0.73rem;font-weight:600;color:var(--cinza);}
.dp-sec-desc{font-size:0.72rem;color:var(--cinza);}
.dp-axis-hdr{display:grid;grid-template-columns:5fr 4fr 220px;gap:12px;padding:2px 0 6px;border-bottom:1px solid #e2e8f0;margin-bottom:4px;}
.dp-axis-rank-hdr{font-size:0.68rem;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:0 12px;}
.dp-row{display:grid;grid-template-columns:5fr 4fr 220px;gap:12px;padding:5px 10px;margin:5px 0;border:1px solid #e2e8f0;border-left:4px solid #cbd5e1;align-items:center;cursor:pointer;border-radius:4px;background:#fff;}
.dp-row:hover{background:#eef2ff!important;}
.dp-label{min-width:0;}
.dp-rank-row{display:flex;align-items:baseline;gap:6px;margin-bottom:2px;}
.dp-rank-lbl{font-size:0.875rem;font-weight:700;color:#94a3b8;}
.dp-idea-id{font-size:0.875rem;font-weight:400;color:#94a3b8;}
.dp-ltitle{font-size:1.22rem;font-weight:700;color:var(--txt);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dp-lautor{font-size:0.81rem;color:#94a3b8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;align-items:start;}
.dp-chips{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.dp-chip{font-size:0.62rem;font-weight:600;padding:2px 5px;border-radius:3px;border:1px solid #CDCDCD;background:transparent;color:#64748b;white-space:nowrap;letter-spacing:.2px;}
.dp-chip-arena{border-color:#f97316;color:#c2410c;}
.dp-chip-tec{border-color:#0ea5e9;color:#0369a1;}
.dp-chip-ineleg{border-color:#dc2626;color:#dc2626;background:#fef2f2;}
.dp-tiebreak{font-size:0.6rem;font-weight:700;color:#1d4ed8;background:#eff6ff;border:1px solid #bfdbfe;border-radius:4px;padding:1px 6px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}

/* Score v1 (avg_total) */
.dp-score-v1{display:inline-flex;align-items:center;border-radius:6px;overflow:hidden;border:1px solid #d1d5db;margin-bottom:5px;flex-shrink:0;}
.dp-score-v1-badge{font-size:1.38rem;font-weight:800;color:#fff;padding:4px 12px;display:flex;align-items:center;justify-content:center;min-width:62px;letter-spacing:-.2px;}
.dp-score-v1-meta{background:#fff;display:flex;flex-direction:column;justify-content:center;padding:3px 10px;gap:2px;}
.dp-score-v1-row{font-size:0.63rem;color:#475569;white-space:nowrap;letter-spacing:.02em;}
.dp-score-v1-row b{color:#1e293b;font-weight:700;}

/* Score v2 (combined) */
.dp-score-v2{display:flex;align-items:stretch;border-radius:6px;overflow:hidden;border:1px solid #d1d5db;margin-bottom:5px;flex-shrink:0;width:fit-content;}
.dp-score-v2-badge{font-size:1.38rem;font-weight:800;color:#fff;padding:4px 12px;display:flex;align-items:center;justify-content:center;min-width:62px;letter-spacing:-.2px;}
.dp-score-v2-meta{background:#fff;display:flex;flex-direction:column;justify-content:center;padding:3px 10px;gap:2px;}
.dp-score-v2-row{font-size:0.63rem;color:#475569;white-space:nowrap;letter-spacing:.02em;}
.dp-score-v2-row b{color:#1e293b;font-weight:700;}

.dp-track-wrap{display:flex;flex-direction:column;gap:4px;}
.dp-track-row{display:flex;align-items:center;gap:6px;}
.dp-track-av-label{width:32px;font-size:0.775rem;font-weight:700;text-align:center;flex-shrink:0;}
.dp-axis-labels-row{display:flex;align-items:center;gap:6px;margin-bottom:2px;}
.dp-axis-labels-spacer{width:32px;flex-shrink:0;}
.dp-axis-labels{flex:1;display:flex;justify-content:space-between;font-size:0.75rem;color:#d2d2e6;font-weight:700;}
.dp-track{position:relative;flex:1;border-radius:30px;background:linear-gradient(to right,#f5f8fa,#f2f2f2);border:1px solid #e1e8ed;}
.dp-track-empty{flex:1;height:25px;border-radius:10px;background:#f8fafc;border:1px dashed #e2e8f0;}
.dp-mid-mark{position:absolute;left:50%;top:15%;width:1px;height:70%;background:#cbd5e1;}
.dp-dot{position:absolute;border-radius:50%;top:50%;transform:translate(-50%,-50%);opacity:.92;transition:opacity .1s,transform .1s;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:600;color:#fff;line-height:0;cursor:default;box-shadow:0 1px 3px rgba(0,0,0,.18);letter-spacing:0.2px;}
.dp-dot:hover{opacity:1;transform:translate(-50%,-50%) scale(1.15);z-index:5;}
.dp-right{display:flex;flex-direction:column;align-items:center;gap:5px;}
.dp-crits{display:flex;flex-direction:column;gap:2px;}
.dp-crit-row{display:flex;align-items:center;gap:3px;}
.dp-crit-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.dp-crit-lbl{font-size:0.69rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.3px;}
.dp-crit-total{display:inline-flex;align-items:center;justify-content:center;width:32px;height:27px;border-radius:4px;font-size:0.85rem;font-weight:700;flex-shrink:0;}
.dp-crit-total-lbl{width:32px;font-size:0.69rem;font-weight:700;color:#94a3b8;text-transform:uppercase;text-align:center;flex-shrink:0;}
.sc{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:27px;border-radius:4px;font-size:0.85rem;font-weight:700;padding:0 2px;}

.no-score-section{margin-bottom:20px;}
.no-score-hd{font-size:0.8rem;font-weight:600;color:#64748b;border-left:4px solid #cbd5e1;padding:4px 0 4px 12px;margin-bottom:8px;}
.no-score-subhd{font-size:0.72rem;font-weight:600;color:#92400e;padding:6px 0 4px 0;}
.no-score-subhd.red{color:#991b1b;}
.no-score-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.no-score-chip{font-size:0.72rem;background:#fff;border:1px solid var(--borda);border-radius:6px;padding:4px 8px;color:var(--cinza);}
.no-score-chip.na-impl{background:#fef3c7;color:#92400e;border-color:#fde68a;cursor:help;}
.no-score-chip.na-ader{background:#fee2e2;color:#991b1b;border-color:#fca5a5;cursor:help;}
.no-score-chip.na-ineleg{background:#fce7f3;color:#9d174d;border-color:#fbcfe8;cursor:help;}
.relatorios-section{margin-top:32px;padding:16px 20px;background:#fff;border:1px solid var(--borda);border-radius:10px;}
.relatorios-title{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--cinza);margin-bottom:12px;}
.relatorios-grid{display:flex;flex-wrap:wrap;gap:8px;}
.relatorio-card{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#f8fafc;border:1px solid var(--borda);border-radius:8px;text-decoration:none;color:var(--txt);transition:background .12s,border-color .12s;}
.relatorio-card:hover{background:#eef2ff;border-color:#c7d2fe;}
.relatorio-card .rel-icon{font-size:20px;flex-shrink:0;}
.relatorio-card .rel-info{display:flex;flex-direction:column;gap:1px;}
.relatorio-card .rel-nome{font-size:0.8rem;font-weight:600;color:#1e293b;}
.relatorio-card .rel-size{font-size:0.68rem;color:var(--cinza);}
.dp-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.dp-leg-item{display:flex;align-items:center;gap:5px;font-size:0.72rem;color:var(--cinza);}
.dp-leg-dot{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;}
.empty-state{padding:48px;text-align:center;color:var(--cinza);font-size:0.88rem;}

/* ── NÃO CLASSIFICADAS grid ── */
.nc-section-hd{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;border-left:4px solid #dc2626;padding:6px 0 6px 12px;margin-bottom:16px;}
.nc-section-title{font-size:0.95rem;font-weight:700;color:#dc2626;}
.nc-section-count{font-size:0.73rem;font-weight:600;color:var(--cinza);}
.nc-section-desc{font-size:0.72rem;color:var(--cinza);}
.nc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:32px;}
.nc-card{background:#fff;border:1px solid var(--borda);border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:6px;border-left:3px solid #dc2626;}
.nc-meta{display:inline-flex;align-items:center;justify-content:center;background:#dc2626;color:#fff;font-size:0.7rem;font-weight:600;letter-spacing:-.2px;padding:3px 10px;border-radius:5px;width:fit-content;}
.nc-title{font-size:0.88rem;font-weight:700;color:var(--txt);line-height:1.3;}
.nc-author{font-size:0.75rem;color:#94a3b8;}
.nc-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;}
.nc-badge{font-size:0.65rem;font-weight:600;padding:2px 7px;border-radius:4px;border:1px solid;white-space:nowrap;}

/* ── Painel de Metodologia ── */
.pb-col-metodo{flex:1.6;min-width:260px;max-width:360px;display:flex;flex-direction:column;gap:5px;font-size:0.8rem;}
.pb-metodo-title{font-size:1rem;font-weight:700;color:var(--txt);}
.pb-metodo-sub{font-size:0.72rem;color:var(--cinza);margin-bottom:2px;}
.pb-metodo-formula{font-family:monospace;font-size:0.78rem;background:#f1f5f9;color:#1e293b;padding:4px 8px;border-radius:5px;border-left:3px solid #4361ee;font-weight:600;}
.pb-metodo-desc{font-size:0.8rem;color:#475569;line-height:1.5;}
.pb-metodo-dot{font-size:0.75rem;color:var(--cinza);line-height:1.5;}
.pb-metodo-ref{font-size:0.7rem;color:#94a3b8;margin-top:2px;}
.material-symbols-outlined{font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 1,'wght' 700,'GRAD' 0,'opsz' 24;font-size:24px;line-height:1;display:inline-block;font-style:normal;font-weight:normal;letter-spacing:normal;text-transform:none;white-space:nowrap;word-wrap:normal;-webkit-font-feature-settings:'liga';-webkit-font-smoothing:antialiased;}
.ms-alert{font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;font-size:16px;vertical-align:middle;color:#d97706;margin-right:3px;line-height:1;font-style:normal;display:inline-block;-webkit-font-feature-settings:'liga';-webkit-font-smoothing:antialiased;}
</style>
</head>

function populateSelect(id, opts) {

  opts.forEach(function(o) { var el = document.createElement('option'); el.value=o; el.textContent=o; sel.appendChild(el); });
}
[1,2,3].forEach(function(t) {

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtNum(v) { if (v==null) return '—'; return String(v).replace('.',','); }
function dotPct(total) { return 2 + (total - 5) / 20 * 96; }
function firstInitial(name) {
  if (!name) return '?';
  var p = name.trim().split(/ +/);
  var ini = p[0].charAt(0).toUpperCase();
  if (p.length >= 3) ini += p[1].charAt(0).toUpperCase() + p[p.length-1].charAt(0).toUpperCase();
  else if (p.length === 2) ini += p[1].charAt(0).toUpperCase();
  return ini;
}
function shortName(name) {
  if (!name) return 'Avaliador';
  var parts = name.trim().split(/ +/);
  return parts.length === 1 ? parts[0] : parts[0] + ' ' + parts[parts.length-1];
}
function hlText(s, q) {
  if (!q) return esc(s);
  var idx = s.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return esc(s);
  return esc(s.slice(0,idx)) + '<mark style="background:#fef08a;border-radius:2px">' + esc(s.slice(idx,idx+q.length)) + '</mark>' + esc(s.slice(idx+q.length));
}

function matchesFilters(x, q, arena, tec, dept, av) {
  if (q) { var lq = q.toLowerCase(); if (String(x.id).indexOf(lq)<0 && (x.tit||'').toLowerCase().indexOf(lq)<0 && (x.aut||'').toLowerCase().indexOf(lq)<0) return false; }
  if (arena && (x.arenas||[]).indexOf(arena)<0) return false;
  if (tec   && (x.tecs||[]).indexOf(tec)<0)     return false;
  if (dept  && x.dept !== dept)                  return false;
  if (av) {
    var hasScore  = (x.sets||[]).some(function(s) { return s.av===av; });
    var isAssigned = (x.avsa||[]).indexOf(av)>=0;
    if (!hasScore && !isAssigned) return false;
  }
  return true;
}

// ── Dotplot row renderer ──
function renderDotplot(sets, avsa) {
  var MAX_SLOTS=3; var TRACK_H=25; var DOT_H=25;
  var scoredAvs = (sets||[]).map(function(s){return s.av;});
  var pendingAvs = (avsa||[]).filter(function(av){return scoredAvs.indexOf(av)<0;});
  var axisRow = '<div class="dp-axis-labels-row"><div class="dp-axis-labels-spacer"></div><div class="dp-axis-labels"><span>5</span><span>15</span><span>25</span></div></div>';
  var trackRows=''; var pendingIdx=0;
  for (var si=0;si<MAX_SLOTS;si++) {
    var tColor=DOT_COLORS[si]; var tSet=sets&&sets[si]?sets[si]:null; var avLabel='A'+(si+1);
    if (tSet) {
      var pct=dotPct(tSet.total); var init=firstInitial(tSet.av);
      var avAvgs=AV_CRIT_AVGS[tSet.av]||{};
      var critLine='Média Avaliação/Critério: '+CRITS.map(function(c){var v=avAvgs[c];return c+'('+(v!=null?v:'—')+')'}).join(' · ');
      var tip=(tSet.av||'')+(tSet.dept?' · '+tSet.dept:'')+'\n'+critLine;
      trackRows+='<div class="dp-track-row"><div class="dp-track-av-label" style="color:'+tColor+'">'+avLabel+'</div><div class="dp-track" style="height:'+TRACK_H+'px"><div class="dp-mid-mark"></div><div class="dp-dot" style="left:'+pct.toFixed(1)+'%;background:'+tColor+';width:'+DOT_H+'px;height:'+DOT_H+'px" title="'+esc(tip)+'">'+init+'</div></div></div>';
    } else {
      var pendingAv=pendingAvs[pendingIdx++]||null;
      if (pendingAv) {
        var pInit=firstInitial(pendingAv); var pTip=shortName(pendingAv)+' — Pendente';
        trackRows+='<div class="dp-track-row"><div class="dp-track-av-label" style="color:#94a3b8">'+avLabel+'</div><div class="dp-track" style="height:'+TRACK_H+'px"><div class="dp-mid-mark"></div><div class="dp-dot" style="left:2%;background:#bfbfbf;width:'+DOT_H+'px;height:'+DOT_H+'px" title="'+esc(pTip)+'">'+pInit+'</div></div></div>';
      } else {
        trackRows+='<div class="dp-track-row"><div class="dp-track-av-label" style="color:#e2e8f0">'+avLabel+'</div><div class="dp-track-empty"></div></div>';
      }
    }
  }
  return axisRow+trackRows;
}

function renderCrits(sets) {
  var MAX_SLOTS=3; var html='<div class="dp-crits">';
  for (var ci=0;ci<MAX_SLOTS;ci++) {
    var cSet=sets&&sets[ci]?sets[ci]:null; var cColor=DOT_COLORS[ci]||'#94a3b8'; var isFirst=ci===0;
    var totalLbl=isFirst?'<span class="dp-crit-total-lbl">P</span>':'<span class="dp-crit-total-lbl" style="visibility:hidden;display:none">P</span>';
    if (cSet) {
      var totalBadge='<div class="dp-crit-item">'+totalLbl+'<span class="dp-crit-total" style="background:'+cColor+';color:#fff">'+cSet.total+'</span></div>';
      var items=CRITS.map(function(c) {
        var v=(cSet[c]!==undefined&&cSet[c]!==null)?cSet[c]:null;
        var lbl=isFirst?'<span class="dp-crit-lbl">'+c+'</span>':'<span class="dp-crit-lbl" style="visibility:hidden;display:none">'+c+'</span>';
        return '<div class="dp-crit-item">'+lbl+'<span class="sc" style="background:'+cColor+'22;color:'+cColor+'">'+(v!==null?v:'–')+'</span></div>';
      }).join('');
      html+='<div class="dp-crit-row">'+totalBadge+items+'</div>';
    } else {
      var lbl=isFirst?'<span class="dp-crit-lbl">?</span>':'';
      html+='<div class="dp-crit-row"><div class="dp-crit-item">'+totalLbl+'<span class="dp-crit-total" style="background:#e2e8f0;color:#94a3b8">?</span></div>'+CRITS.map(function(c){var l=isFirst?'<span class="dp-crit-lbl">'+c+'</span>':'';return '<div class="dp-crit-item">'+l+'<span class="sc" style="background:#f1f5f9;color:#cbd5e1">–</span></div>';}).join('')+'</div>';
    }
  }
  return html+'</div>';
}

function chipArenas(arenas) {
  return (arenas||[]).map(function(a) {
    var short=a.indexOf('Efici')>=0?'EOA':a.indexOf('Neg')>=0?'NDE':a.indexOf('Seg')>=0?'SI':a.slice(0,8);
    return '<span class="dp-chip dp-chip-arena" title="'+esc(a)+'">'+short+'</span>';
  }).join('');
}
function chipTecs(tecs) {
  return (tecs||[]).filter(function(t){return t.toLowerCase().indexOf('não sei')<0;}).map(function(t) {
    var short=t.indexOf('Blockchain')>=0?'BLK':t.indexOf('Dados')>=0?'DA':t.indexOf('Hiper')>=0?'RPA':t.indexOf('IA')>=0?'IA':t.indexOf('Cloud')>=0?'CLOUD':t.indexOf('Segu')>=0?'SEG':t.slice(0,6).toUpperCase();
    return '<span class="dp-chip dp-chip-tec" title="'+esc(t)+'">'+short+'</span>';
  }).join('');
}

function trlChip(trl) {
  if (!trl) return '';
  var num = parseInt(trl.replace('TRL','').trim(), 10);
  var color = num <= 3 ? '#6b7280' : num <= 6 ? '#2563eb' : '#059669';
  var bg    = num <= 3 ? '#f3f4f6' : num <= 6 ? '#dbeafe' : '#d1fae5';
  var bord  = num <= 3 ? '#d1d5db' : num <= 6 ? '#93c5fd' : '#6ee7b7';
  return '<span class="dp-chip" style="border-color:'+bord+';color:'+color+';background:'+bg+'" title="Grau de maturidade percebido">'+esc(trl)+'</span>';
}

function tipoChip(tipo) {
  if (!tipo || tipo === 'CLT/BBTS') return '';
  var color = tipo.indexOf('Posto') >= 0 ? '#d97706' : '#dc2626';
  var bg    = tipo.indexOf('Posto') >= 0 ? '#fef3c7' : '#fee2e2';
  var border= tipo.indexOf('Posto') >= 0 ? '#fde68a' : '#fca5a5';
  return ' <span style="font-size:0.62rem;font-weight:600;color:'+color+';background:'+bg+';border:1px solid '+border+';border-radius:3px;padding:1px 5px;white-space:nowrap">'+esc(tipo)+'</span>';
}

// mode: 'v1' | 'v2' | 'ineleg'
function renderRow(x, q, mode) {
  var eRank = x.rank;
  var rankColor, scoreBadge;

  if (mode==='v1') {
    rankColor = eRank<=20?'#2cb75f':eRank<=50?'#60a5fa':'#99aabd';

    scoreBadge = (x.sets&&x.sets.length)
      ? '<div class="dp-score-v1"><div class="dp-score-v1-badge" style="background:'+rankColor+'">'+fmtNum(tot)+'</div>'
        +'<div class="dp-score-v1-meta"><span class="dp-score-v1-row">AVALIAÇÃO: <b>'+fmtNum(tot)+'</b></span>'
        +'<span class="dp-score-v1-row" style="color:#94a3b8">5 critérios · escala 1–5</span></div></div>'
      : '';
  } else if (mode==='v2') {
    rankColor = eRank<=20?'#2cb75f':eRank<=50?'#60a5fa':'#99aabd';
    var ader=x.ader!=null?x.ader:0; var comb=x.comb!=null?x.comb:0; var tot2=x.tot!=null?x.tot:0;
    scoreBadge = (x.sets&&x.sets.length)
      ? '<div class="dp-score-v2"><div class="dp-score-v2-badge" style="background:'+rankColor+'">'+fmtNum(comb)+'</div>'
        +'<div class="dp-score-v2-meta"><span class="dp-score-v2-row">ADERÊNCIA: <b>'+fmtNum(ader)+'</b></span>'
        +'<span class="dp-score-v2-row">AVALIAÇÃO: <b>'+fmtNum(tot2)+'</b></span></div></div>'
      : '';
  } else {
    // ineleg: badge âmbar/vermelho
    rankColor = '#f59e0b';
    var ader3=x.ader!=null?x.ader:0; var comb3=x.comb!=null?x.comb:0; var tot3=x.tot!=null?x.tot:0;
    scoreBadge = (x.sets&&x.sets.length)
      ? '<div class="dp-score-v2"><div class="dp-score-v2-badge" style="background:#dc2626">'+fmtNum(comb3)+'</div>'
        +'<div class="dp-score-v2-meta"><span class="dp-score-v2-row">ADERÊNCIA: <b>'+fmtNum(ader3)+'</b></span>'
        +'<span class="dp-score-v2-row">AVALIAÇÃO: <b>'+fmtNum(tot3)+'</b></span></div></div>'

  var hlTitle = q ? hlText(x.tit||'', q) : esc(x.tit||'');

  var hlAutor = multiAlert + (q ? hlText(x.aut||'', q) : esc(x.aut||'')) + (x.dept?' <span style="color:#cbd5e1">—</span> '+esc(x.dept):'') + tipoChip(x.tipo);
  var inelegLabel = x.ineleg_motivo || x.cargo_autor || x.empresa_autor || '';
  var cargoChip = (mode==='ineleg' && inelegLabel)
    ? '<span class="dp-chip dp-chip-ineleg">'+esc(inelegLabel)+'</span>' : '';

  return '<div class="dp-row" style="border-left-color:'+rankColor+'">'
    +'<div class="dp-label">'
    +'<div class="dp-rank-row"><span class="dp-rank-lbl">Rank #'+eRank+'</span><span class="dp-idea-id">ideia #'+x.id+'</span>'

function makeSectionHtml(title, color, items, q, mode, offset, showCorte, scoreKey) {
  var n=items.length;
  var avg=Math.round(items.reduce(function(s,x){return s+(x[scoreKey]||0);},0)/n*10)/10;
  var corte=items[n-1][scoreKey];
  var dynDesc=(showCorte?'Ponto de corte: '+fmtNum(corte)+' · ':'')+'Média: '+fmtNum(avg);
  var rows='';
  for (var i=0;i<items.length;i++) {
    var item=JSON.parse(JSON.stringify(items[i])); item.rank=offset+i+1;
    rows+=renderRow(item, q, mode);
  }
  return '<div class="dp-section">'
    +'<div class="dp-section-hd" style="border-color:'+color+'">'
    +'<span class="dp-sec-title" style="color:'+color+'">'+esc(title)+'</span>'
    +'<span class="dp-sec-count">'+n+' ideia'+(n!==1?'s':'')+'</span>'
    +'<span class="dp-sec-desc">'+dynDesc+'</span>'

    +rows+'</div>';
}

  var html='';
  if (hasFilter) {
    var f20=list.slice(0,20); var f2150=list.slice(20,50); var f51=list.slice(50);
    var suffix=' (filtrado)';
    if (f20.length)   html+=makeSectionHtml('Top 20'+suffix,   '#166534', f20,   q, mode, 0,  true,  scoreKey);
    if (f2150.length) html+=makeSectionHtml('21 a 50'+suffix,  '#1e40af', f2150, q, mode, 20, true,  scoreKey);
    if (f51.length)   html+=makeSectionHtml('51–'+list.length+suffix, '#64748b', f51, q, mode, 50, false, scoreKey);
  } else {
    var all20=list.slice(0,20); var all2150=list.slice(20,50); var all51=list.slice(50);
    if (all20.length)   html+=makeSectionHtml('Top 20',       '#166534', all20,   q, mode, 0,  true,  scoreKey);
    if (all2150.length) html+=makeSectionHtml('21 a 50',      '#1e40af', all2150, q, mode, 20, true,  scoreKey);
    if (all51.length)   html+=makeSectionHtml('51–'+list.length, '#64748b', all51, q, mode, 50, false, scoreKey);
  }
  return html;
}

function renderNaoAderentes(implList, reprovList, unscoreList) {
  var total=implList.length+reprovList.length+unscoreList.length;
  if (!total) return '';
  var html='<div class="no-score-section"><div class="no-score-hd">Não Aderentes — '+total+' ideia'+(total!==1?'s':'')+'</div>';
  if (implList.length) {
    html+='<div class="no-score-subhd">⚠ Implementação prévia — desqualificadas (REG691 · Elegibilidade) · '+implList.length+'</div><div class="no-score-grid">'
      +implList.map(function(x){return '<div class="no-score-chip na-impl" title="'+esc(x.nar||'')+'">'+x.id+' '+esc((x.tit||'').slice(0,45))+'</div>';}).join('')+'</div>';
  }
  if (reprovList.length) {
    html+='<div class="no-score-subhd red">⛔ Aderência reprovada · '+reprovList.length+'</div><div class="no-score-grid">'
      +reprovList.map(function(x){return '<div class="no-score-chip na-ader" title="'+esc(x.nara||'')+'">'+x.id+' '+esc((x.tit||'').slice(0,45))+'</div>';}).join('')+'</div>';
  }
  var reprovNs=unscoreList.filter(function(x){return x.nara;}); var semDesig=unscoreList.filter(function(x){return !x.nara;});
  if (reprovNs.length) {
    html+='<div class="no-score-subhd red">⛔ Aderência reprovada (sem avaliação) · '+reprovNs.length+'</div><div class="no-score-grid">'
      +reprovNs.map(function(x){return '<div class="no-score-chip na-ader" title="'+esc(x.nara||'')+'">'+x.id+' '+esc((x.tit||'').slice(0,45))+'</div>';}).join('')+'</div>';
  }
  if (semDesig.length) {
    html+='<div class="no-score-subhd">Sem designação de avaliadores · '+semDesig.length+'</div><div class="no-score-grid">'
      +semDesig.map(function(x){return '<div class="no-score-chip">'+x.id+' '+esc((x.tit||'').slice(0,45))+'</div>';}).join('')+'</div>';
  }
  return html+'</div>';
}

var MULTI_AUTHORS_TOP20 = (function() {

  todas: '#1d4ed8',
  top20: '#199f4a',

function buildStatBar(dist, critAvgs, champs, tabId) {
  var el=document.getElementById('statbar-'+tabId); if (!el) return;
  var m=METODO_INFO[tabId]||{};
  var barColor = tabId==='t1' ? '#4361ee' : '#0f766e';
  var champRows=(champs||[]).map(function(d){
    var cor=CAMP_COLORS[d.top]||'#1e293b';
    var txtCor=d.top==='top5'?'#1e293b':'#fff';
    return '<div style="padding:3px 0;display:flex;align-items:center;gap:8px">'
      +'<span style="background:'+cor+';color:'+txtCor+';font-size:1rem;font-weight:800;padding:4px 10px;border-radius:5px;min-width:34px;text-align:center;flex-shrink:0;line-height:1.3;align-self:stretch;display:flex;align-items:center;justify-content:center">'+d.n+'</span>'
      +'<div style="display:flex;flex-direction:column;justify-content:center;gap:1px">'
      +'<span style="font-size:0.55rem;font-weight:700;color:'+cor+';text-transform:uppercase;letter-spacing:.05em;line-height:1.2">'+d.label+'</span>'
      +'<span style="font-size:0.92rem;font-weight:700;color:#1e293b;line-height:1.2">'+(d.unit||'&mdash;')+'</span>'
      +'</div>'
      +'</div>';
  }).join('');
  var maxV=Math.max.apply(null,CRITS.map(function(c){return critAvgs[c]||0;}));
  var bars=CRITS.map(function(c){
    var v=critAvgs[c]||0; var pct=maxV>0?Math.round(v/5*100):0;
    return '<div class="pb-hbar-row">'
      +'<div class="pb-hbar-label">'+(CRIT_NOMES[c]||c)+'</div>'
      +'<div class="pb-hbar-track"><div class="pb-hbar-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>'
      +'<div class="pb-hbar-val" style="color:'+barColor+'">'+v+'</div>'
      +'</div>';
  }).join('');
  var col1='<div class="pb-col">'
    +'<div class="pb-name">'+m.titulo+'</div>'
    +'<div class="pb-cargo">'+m.subtitulo+'</div>'
    +'<div class="pb-metodo-formula" style="margin-top:8px">'+m.formula+'</div>'
    +'<div class="pb-desc" style="font-size:0.82rem;margin-top:6px">'+m.desc+'</div>'
    +'<div class="pb-metodo-ref" style="margin-top:6px">'+m.ref+'</div>'
    +'</div>';
  el.innerHTML='<div class="stat-bar">'
    +col1
    +'<div class="pb-col"><div class="pb-sec-label">Ranking de Unidades</div><div style="margin-top:4px">'+champRows+'</div></div>'
    +'<div class="pb-col"><div class="pb-sec-label">Médias por critério <span style="font-weight:400;text-transform:none;letter-spacing:0">(1–5)</span></div><div class="pb-hbars" style="margin-top:4px">'+bars+'</div></div>'
    +'</div>';
}
buildStatBar(DIST_T1, CRIT_AVGS, CHAMPS_T1, 't1');

// ── Render tabs ──
function renderTab(t) {
  var f=getF(t);
  var hasFilter=!!(f.q||f.arena||f.tec||f.dept||f.av);
  var el=document.getElementById('content-t'+t);

  if (t===1) {
    // CLASSIFICAÇÃO AEVO — combined (aderência + critérios)
    var list=DATA_T1.filter(function(x){return matchesFilters(x,f.q,f.arena,f.tec,f.dept,f.av);});
    var impl=DATA_IMPL.filter(function(x){return matchesFilters(x,f.q,f.arena,f.tec,f.dept,'');});
    var reprov=DATA_REPROV.filter(function(x){return matchesFilters(x,f.q,f.arena,f.tec,f.dept,'');});
    var unsc=DATA_UNSCORE.filter(function(x){return matchesFilters(x,f.q,f.arena,f.tec,f.dept,'');});
    var html='<div class="dp-intro">Pontuação combinada: <b>Aderência</b> (0–10) + <b>Avaliação</b> (5–25). Score máximo: 35. Ideias ordenadas por <b>combined</b>. Desempate: REG691 §5.4.2.1.</div>';
    html+='<div class="dp-legend"><div class="dp-leg-item"><div class="dp-leg-dot" style="background:#be185d">A1</div><span>1º avaliador</span></div><div class="dp-leg-item"><div class="dp-leg-dot" style="background:#7c3aed">A2</div><span>2º avaliador</span></div><div class="dp-leg-item"><div class="dp-leg-dot" style="background:#d97706">A3</div><span>3º avaliador</span></div><div class="dp-leg-item"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#2cb75f;vertical-align:middle"></span><span>Alta aderência (10)</span></div><div class="dp-leg-item"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#f59e0b;vertical-align:middle"></span><span>Aderência parcial (5)</span></div></div>';
    html+=renderScoredSections(list, f.q, 'v2', hasFilter, 'comb');
    html+=renderNaoAderentes(impl, reprov, unsc);
    el.innerHTML=html;
    var statsEl=document.getElementById('stats1');
    if (statsEl) statsEl.textContent=hasFilter?(list.length+' resultado'+(list.length!==1?'s':'')+'  (filtrado)'):(DATA_T1.length+' avaliadas');
  } else if (t===2) {
    // CLASSIFICAÇÃO HUB — avg_total (critérios puros)
    var list2=DATA_T2.filter(function(x){return matchesFilters(x,f.q,f.arena,f.tec,f.dept,f.av);});
    var impl2=DATA_IMPL.filter(function(x){return matchesFilters(x,f.q,f.arena,f.tec,f.dept,'');});
    var reprov2=DATA_REPROV.filter(function(x){return matchesFilters(x,f.q,f.arena,f.tec,f.dept,'');});
    var unsc2=DATA_UNSCORE.filter(function(x){return matchesFilters(x,f.q,f.arena,f.tec,f.dept,'');});
    var html2='<div class="dp-intro">Pontuação de avaliação: soma das médias por critério (5 critérios × escala 1–5 · máximo: 25). Ideias ordenadas por <b>avg_total</b>. Desempate: REG691 §5.4.2.1.</div>';
    html2+='<div class="dp-legend"><div class="dp-leg-item"><div class="dp-leg-dot" style="background:#be185d">A1</div><span>1º avaliador</span></div><div class="dp-leg-item"><div class="dp-leg-dot" style="background:#7c3aed">A2</div><span>2º avaliador</span></div><div class="dp-leg-item"><div class="dp-leg-dot" style="background:#d97706">A3</div><span>3º avaliador</span></div></div>';
    html2+=renderScoredSections(list2, f.q, 'v1', hasFilter, 'tot');
    html2+=renderNaoAderentes(impl2, reprov2, unsc2);
    el.innerHTML=html2;
    var statsEl2=document.getElementById('stats2');
    if (statsEl2) statsEl2.textContent=hasFilter?(list2.length+' resultado'+(list2.length!==1?'s':'')+'  (filtrado)'):(DATA_T2.length+' avaliadas');
  } else {
    // NÃO CLASSIFICADAS — grid unificado com badges por motivo
    var motivo=f.motivo||'';
    var _mf=function(x){return matchesFilters(x,f.q,f.arena,f.tec,'','');};
    var sc3    =(motivo===''||motivo==='ineleg')    ? DATA_T3_SC.filter(_mf)    : [];
    var un3    =(motivo===''||motivo==='ineleg')    ? DATA_T3_UN.filter(_mf)    : [];
    var impl3  =(motivo===''||motivo==='impl')      ? DATA_IMPL.filter(_mf)     : [];
    var reprov3=(motivo===''||motivo==='aderencia') ? DATA_REPROV.filter(_mf)   : [];
    var unsc3  =(motivo===''||motivo==='aderencia') ? DATA_UNSCORE.filter(_mf)  : [];
    var atop3  =(motivo===''||motivo==='autor_top') ? DATA_AUTOR_TOP.filter(_mf): [];
    var total3=sc3.length+un3.length+impl3.length+reprov3.length+unsc3.length+atop3.length;

    function ncCard(x, badges, borderColor) {
      var bc=borderColor||'#dc2626';
      var bhtml=badges.map(function(b){return '<span class="nc-badge" style="color:'+b.color+';background:'+b.bg+';border-color:'+b.bg+'">'+esc(b.label)+'</span>';}).join('');
      return '<div class="nc-card" style="border-left-color:'+bc+'">'
        +'<div class="nc-meta" style="background:'+bc+'">#'+x.id+'</div>'
        +'<div class="nc-title" title="'+esc(x.tit||'')+'">'+esc((x.tit||'').length>48?(x.tit||'').slice(0,48)+'…':(x.tit||''))+'</div>'
        +'<div class="nc-author">'+esc(x.aut||'')+(x.dept?' — '+esc(x.dept):'')+'</div>'
        +'<div class="nc-badges">'+bhtml+'</div>'
        +'</div>';
    }

    var B_INELEG   = {label:'Não Elegíveis',        color:'#fff',    bg:'#9d174d'};
    var B_SEM_AD   = {label:'Sem Aderência',        color:'#fff',    bg:'#dc2626'};
    var B_IMPL     = {label:'Implementação Prévia', color:'#fff',    bg:'#d97706'};
    var B_REG      = {label:'REG691 §5.4.1',        color:'#374151', bg:'#f3f4f6'};
    var B_AUTOR_TOP= {label:'Autor já nas Top',     color:'#fff',    bg:'#7c3aed'};

    var allCards='';
    sc3.forEach(function(x){
      var m=x.ineleg_motivo||x.cargo_autor||'Posto de Serviço ou Temporário';
      var b2={label:m,color:'#fff',bg:'#be185d'};
      allCards+=ncCard(x,[B_INELEG,b2],'#9d174d');
    });
    un3.forEach(function(x){
      var m=x.ineleg_motivo||x.cargo_autor||'Posto de Serviço ou Temporário';
      var b2={label:m,color:'#fff',bg:'#be185d'};
      allCards+=ncCard(x,[B_INELEG,b2],'#9d174d');
    });
    impl3.forEach(function(x){allCards+=ncCard(x,[B_IMPL,B_REG],'#d97706');});
    reprov3.forEach(function(x){allCards+=ncCard(x,[B_SEM_AD,B_REG],'#dc2626');});
    unsc3.forEach(function(x){allCards+=ncCard(x,[B_SEM_AD],'#dc2626');});
    atop3.forEach(function(x){
      var brank={label:x.nar||'REG691 §5.4.1',color:'#374151',bg:'#f3f4f6'};
      allCards+=ncCard(x,[B_AUTOR_TOP,brank],'#7c3aed');
    });

    var html3=!total3?'<div class="empty-state">Nenhuma ideia não classificada encontrada.</div>'
      :'<div class="nc-section-hd">'
        +'<span class="nc-section-title">Não Classificadas</span>'
        +'<span class="nc-section-count">'+total3+' ideia'+(total3!==1?'s':'')+'</span>'
        +'<span class="nc-section-desc">Não Elegíveis, Sem Aderência, Solução Implementada, em Implementação ou em Processo de Aquisição</span>'
        +'</div><div class="nc-grid">'+allCards+'</div>';
    // ── Relatórios para download ──
    var relHtml='';
    if (RELATORIOS && RELATORIOS.length) {
      var cards=RELATORIOS.map(function(r){
        return '<a class="relatorio-card" href="'+esc(r.nome)+'" download>'
          +'<span class="material-symbols-outlined rel-icon" style="font-size:22px;color:#16a34a">table_chart</span>'
          +'<div class="rel-info">'
          +'<span class="rel-nome">'+esc(r.nome)+'</span>'
          +'<span class="rel-size">'+esc(r.tamanho)+' · Excel</span>'
          +'</div>'
          +'</a>';
      }).join('');
      relHtml='<div class="relatorios-section">'
        +'<div class="relatorios-title"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;margin-right:4px">download</span>Planilhas disponíveis para download</div>'
        +'<div class="relatorios-grid">'+cards+'</div>'
        +'</div>';
    }
    el.innerHTML=html3+relHtml;
    var statsEl3=document.getElementById('stats3'); if(statsEl3) statsEl3.textContent=total3+' não classificada'+(total3!==1?'s':'');
  }
}

// ── Event listeners para filtros ──
[1,2,3].forEach(function(t) {
  ['q','arena','tec','dept','av','motivo'].forEach(function(f) {
    var el = document.getElementById(f+t);
    if (!el) return;
    var ev = el.tagName === 'INPUT' ? 'input' : 'change';
    el.addEventListener(ev, function() { renderTab(t); });
  });
});

renderTab(1); renderTab(2); renderTab(3);
