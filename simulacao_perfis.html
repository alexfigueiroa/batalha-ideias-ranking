    document.getElementById('comparison-view').style.display = 'none';
    renderProfileBar(pid);
    renderRanking(pid);
  }
  document.getElementById('hbadge').textContent = N + ' ideias';
}

// ---- weight and bias summary texts ----
function weightSummary(p) {
  if (p.id === 'baseline') return 'Todos os critérios têm peso igual (5/25). Nenhum aspecto é priorizado em detrimento de outro.';
  var entries = Object.entries(p.pesos).sort(function(a,b){ return b[1]-a[1]; });
  var top = entries[0], bot = entries[entries.length-1];
  return 'Maior peso: <strong>' + CRIT_NOMES[top[0]] + ' (' + top[1] + '/25)</strong>. '
       + 'Menor peso: ' + CRIT_NOMES[bot[0]] + ' (' + bot[1] + '/25).';
}
function biasSummary(p) {
  var pos = [], neg = [];
  Object.entries(p.bias).forEach(function(e) {
    if (e[1] > 0) pos.push(CRIT_NOMES[e[0]] + ' (+' + e[1] + ')');
    else if (e[1] < 0) neg.push(CRIT_NOMES[e[0]] + ' (' + e[1] + ')');
  });
  if (!pos.length && !neg.length) return 'Sem tendências aplicadas — scores calculados diretamente a partir dos dados, sem ajuste.';
  var parts = [];
  if (pos.length) parts.push('Avalia mais positivamente: <strong>' + pos.join(', ') + '</strong>.');
  if (neg.length) parts.push('É mais exigente em: ' + neg.join(', ') + '.');
  return parts.join(' ');
}
function biasSummaryPlain(p) {
  var pos = [], neg = [];
  Object.entries(p.bias).forEach(function(e) {
    if (e[1] > 0) pos.push(CRIT_NOMES[e[0]] + ' (+' + e[1] + ')');
    else if (e[1] < 0) neg.push(CRIT_NOMES[e[0]] + ' (' + e[1] + ')');
  });
  if (!pos.length && !neg.length) return 'Sem tendências';
  var parts = [];
  if (pos.length) parts.push('Avalia mais positivamente: ' + pos.join(', '));
  if (neg.length) parts.push('É mais exigente em: ' + neg.join(', '));
  return parts.join('.\n');
}

// ---- profile bar ----
function renderProfileBar(pid) {
  var p = perfil(pid);
  var bar = document.getElementById('profile-bar');
  var maxPeso = Math.max.apply(null, Object.values(p.pesos));

  // Horizontal bar chart
  var barsHtml = ['REL','INO','DES','VIA','FAC'].map(function(c) {
    var w = p.pesos[c];
    var pct = Math.round(w / maxPeso * 100);
    return '<div class="pb-hbar-row">'
      + '<div class="pb-hbar-label">' + CRIT_NOMES[c] + '</div>'
      + '<div class="pb-hbar-track"><div class="pb-hbar-fill" style="width:' + pct + '%;background:' + p.cor + '"></div></div>'
      + '<div class="pb-hbar-val" style="color:' + p.cor + '">' + w + '</div>'
      + '</div>';
  }).join('');

  // Bias badges
  var biasHtml = Object.entries(p.bias).map(function(e) {
    var c = e[0], v = e[1];
    if (v === 0) return '';
    var cls = v > 0 ? 'pos' : 'neg';
    var sign = v > 0 ? '+' : '';
    return '<span class="pb-bias ' + cls + '">' + CRIT_NOMES[c] + ' ' + sign + v + '</span>';
  }).filter(Boolean).join('');
  if (!biasHtml) biasHtml = '<span class="pb-bias neu">Sem tendências</span>';

  bar.innerHTML =
    // Coluna 1 — identidade
    '<div class="pb-col">'
    + '<div class="pb-name" style="color:' + p.cor + '">' + esc(p.nome) + '</div>'
    + '<div class="pb-cargo">' + esc(p.cargo) + '</div>'
    + '<div class="pb-desc">' + esc(p.descricao) + '</div>'
    + '</div>'
    // Coluna 2 — gráfico de pesos
    + '<div class="pb-col">'
    + '<div class="pb-sec-label">Pesos por critério <span style="font-weight:400;text-transform:none;letter-spacing:0">(soma = 25)</span></div>'
    + '<div class="pb-hbars">' + barsHtml + '</div>'
    + '<div class="pb-wtxt">' + weightSummary(p) + '</div>'
    + '</div>'
    // Coluna 3 — como este perfil analisa
    + '<div class="pb-col">'
    + '<div class="pb-sec-label">Como este perfil analisa</div>'
    + '<div class="pb-bias-big" style="color:' + p.cor + '">' + esc(biasSummaryPlain(p)) + '</div>'
    + '<div class="pb-biases" style="margin-top:10px">' + biasHtml + '</div>'
    + '</div>';
}

function renderProfileBarComp() {
  var bar = document.getElementById('profile-bar');
  if (!REAL_AVGS || !Object.keys(REAL_AVGS).length) { bar.innerHTML = ''; return; }
  var crits = ['REL','FAC','VIA','DES','INO'];
  var maxV = Math.max.apply(null, crits.map(function(c){ return REAL_AVGS[c]||0; }));
  var barsHtml = crits.map(function(c) {
    var v = REAL_AVGS[c] || 0;
    var pct = maxV > 0 ? Math.round(v / maxV * 100) : 0;

      + '<div class="pb-hbar-label">' + (CRIT_NOMES[c]||c) + '</div>'
      + '<div class="pb-hbar-track"><div class="pb-hbar-fill" style="width:' + pct + '%;background:#4361ee"></div></div>'
      + '<div class="pb-hbar-val" style="color:#4361ee">' + v + '</div>'
      + '</div>';
  }).join('');
  var nPerfis = REAL_PIDS ? REAL_PIDS.length : 0;
  bar.innerHTML =
    '<div class="pb-col">'
    + '<div class="pb-name">Comparação de Perfis</div>'
    + '<div class="pb-cargo">Todos os perfis · mesmas ideias · escala de rank</div>'
    + '<div class="pb-desc">Compara como cada perfil de avaliador posicionaria as ideias no ranking. '
    + 'Cada ponto representa a posição da ideia segundo aquele perfil — consenso indica robustez; '
    + 'dispersão indica que o resultado depende de quem avalia.</div>'
    + '</div>'
    + '<div class="pb-col">'
    + '<div class="pb-sec-label">Médias reais por critério <span style="font-weight:400;text-transform:none;letter-spacing:0">(escala 1–5)</span></div>'
    + '<div class="pb-hbars">' + barsHtml + '</div>'
    + '</div>'
    + '<div class="pb-col">'
    + '<div class="pb-sec-label">Perfis na comparação</div>'
    + '<div class="pb-stats">' + PERFIS.map(function(p) {
        return '<div class="pb-stat-row">'
          + '<span class="pb-stat-badge" style="background:' + p.cor + '22;color:' + p.cor + '">' + p.nome.charAt(0) + '</span>'
          + '<span class="pb-stat-lbl">' + esc(p.nome) + '</span>'
          + '</div>';
      }).join('') + '</div>'
    + '</div>';
}

// ---- ranking view ----
function getSearchVal() {
  var el = document.getElementById('q-ideia');
  return el ? el.value : '';
}
function getFilterArena() {
  var el = document.getElementById('f-arena');
  return el ? el.value : '';
}
function getFilterTec() {
  var el = document.getElementById('f-tec');
  return el ? el.value : '';
}
function getFilterDept() {
  var el = document.getElementById('f-dept');
  return el ? el.value : '';
}

function renderRanking(pid) {
  var q     = getSearchVal().toLowerCase();
  var arena = getFilterArena();
  var tec   = getFilterTec();
  var dept  = getFilterDept();

  var filtered = IDEIAS.filter(function(idea) {
    if (q && !(idea.titulo.toLowerCase().includes(q)
        || idea.autor.toLowerCase().includes(q)
        || idea.arena.toLowerCase().includes(q))) return false;
    if (arena && idea.arena !== arena) return false;
    if (dept  && idea.uo !== dept) return false;
    return true;
  });
  filtered.sort(function(a,b) {
    return a.scores[pid].rank - b.scores[pid].rank;
  });

  var statsEl = document.getElementById('f-stats-sim');
  if (statsEl) statsEl.textContent = filtered.length + ' / ' + N + ' ideias';

  var p = perfil(pid);

  var html = '<div class="tbl-wrap"><table>'
    + '<thead><tr>'
    + '<th class="c">#</th>'
    + '<th class="c" title="Diferença de posição em relação ao perfil Referência (pesos iguais)">Δ Ref.</th>'
    + '<th>Título</th>'
    + '<th>Arena</th>'
    + '<th class="c">REL</th><th class="c">INO</th><th class="c">DES</th><th class="c">VIA</th><th class="c">FAC</th>'
    + '<th class="c">Total</th>'
    + '</tr></thead>'
    + '<tbody>';

  filtered.forEach(function(idea) {
    var sc  = idea.scores[pid];
    var blr = idea.scores['baseline'].rank;
    var d   = blr - sc.rank;  // positive = rose vs baseline
    var rkCls = sc.rank <= 3 ? 'rk gold' : (sc.rank <= 10 ? 'rk silver' : 'rk');
    var arenaShort = idea.arena ? truncate(idea.arena, 22) : '—';

    var aderBadge = idea.resultado === 'ADERENTE'
      ? '<span class="ader-badge ok">Aderente</span>'
      : '<span class="ader-badge parc">Parc. aderente</span>';

    html += '<tr data-id="' + idea.id + '">'
      + '<td class="c"><span class="' + rkCls + '">' + sc.rank + '</span></td>'
      + '<td class="c">' + deltaHtml(d) + '</td>'
      + '<td><div class="t-title">' + esc(idea.titulo) + '</div>'
      +     '<div class="t-autor">' + esc(idea.autor) + '</div>'
      +     aderBadge
      +     aderDots(idea.aderencia) + '</td>'
      + '<td>' + (idea.arena ? '<span class="arena-chip">' + esc(arenaShort) + '</span>' : '—') + '</td>'
      + '<td class="c"><span class="' + scClass(sc.REL) + '">' + scLabel(sc.REL) + '</span></td>'
      + '<td class="c"><span class="' + scClass(sc.INO) + '">' + scLabel(sc.INO) + '</span></td>'
      + '<td class="c"><span class="' + scClass(sc.DES) + '">' + scLabel(sc.DES) + '</span></td>'
      + '<td class="c"><span class="' + scClass(sc.VIA) + '">' + scLabel(sc.VIA) + '</span></td>'
      + '<td class="c"><span class="' + scClass(sc.FAC) + '">' + scLabel(sc.FAC) + '</span></td>'
      + '<td class="c total-cell" style="color:' + p.cor + '">' + sc.total.toFixed(1) + '</td>'
      + '</tr>';
  });

  html += '</tbody></table></div>';

  var rv = document.getElementById('ranking-view');
  rv.innerHTML = html;

  // (filter events handled by static-filters bar)

  rv.querySelectorAll('tbody tr').forEach(function(tr) {
    tr.addEventListener('click', function() { openModal(parseInt(tr.dataset.id), pid); });
  });
}

// ---- comparison view ----
var REAL_PIDS = PERFIS.filter(function(p){ return p.id !== 'baseline'; }).map(function(p){ return p.id; });

function renderRealAvgsCard() {
  var crits = ['REL','FAC','VIA','DES','INO'];
  if (!REAL_AVGS || !Object.keys(REAL_AVGS).length) return '';
  var maxV = Math.max.apply(null, crits.map(function(c){ return REAL_AVGS[c] || 0; }));
  var rows = crits.map(function(c) {
    var v = REAL_AVGS[c] || 0;
    var pct = maxV > 0 ? Math.round(v / maxV * 100) : 0;
    return '<div class="pb-hbar-row">'
      + '<div class="pb-hbar-label">' + (CRIT_NOMES[c] || c) + '</div>'
      + '<div class="pb-hbar-track"><div class="pb-hbar-fill" style="width:' + pct + '%;background:#4361ee"></div></div>'
      + '<div class="pb-hbar-val" style="color:#4361ee">' + v + '</div>'
      + '</div>';
  }).join('');
  return '<div class="real-avgs-card">'
    + '<div class="pb-sec-label">Médias das avaliações reais por critério <span style="font-weight:400;text-transform:none;letter-spacing:0">(escala 1–5)</span></div>'
    + '<div class="pb-hbars">' + rows + '</div>'
    + '</div>';
}

function renderComparison() {
  var cv = document.getElementById('comparison-view');

  function avgRank(idea) {
    var ranks = REAL_PIDS.map(function(pid){ return idea.scores[pid].rank; });
    return ranks.reduce(function(a,b){return a+b;},0) / ranks.length;
  }
  function spreadOf(idea) {
    var ranks = REAL_PIDS.map(function(pid){ return idea.scores[pid].rank; });
    return Math.max.apply(null,ranks) - Math.min.apply(null,ranks);
  }

  // Categorize by consensus / controversy
  var half = N / 2;
  var positivo = [], controversas = [], negativo = [];
  IDEIAS.forEach(function(idea) {
    var ranks = REAL_PIDS.map(function(pid){ return idea.scores[pid].rank; });
    var allTop = ranks.every(function(r){ return r <= half; });
    var allBot = ranks.every(function(r){ return r >  half; });
    if      (allTop) positivo.push(idea);
    else if (allBot) negativo.push(idea);
    else             controversas.push(idea);
  });

  positivo.sort(function(a,b){    return avgRank(a)    - avgRank(b);    });
  negativo.sort(function(a,b){    return avgRank(a)    - avgRank(b);    });
  controversas.sort(function(a,b){ return spreadOf(b) - spreadOf(a); });

  // Legend (all profiles incl. baseline)
  var legendHtml = '<div class="dp-legend">'
    + PERFIS.map(function(p) {
        return '<div class="dp-leg-item">'
          + '<div class="dp-leg-dot" style="background:' + p.cor + '">' + p.nome.charAt(0) + '</div>'
          + '<span>' + esc(p.nome) + '</span>'
          + '</div>';
      }).join('')
    + '</div>';

  var AXIS_LABELS = '<div class="dp-axis-labels">'
    + '<span style="color:#991b1b;font-weight:700;font-size:0.72rem">Pior</span>'
    + '<span style="font-size:0.68rem">Médio</span>'
    + '<span style="color:#166534;font-weight:700;font-size:0.72rem">Melhor</span>'
    + '</div>';

  function axisHdr() {
    return '<div class="dp-axis-hdr">'
      + '<div class="dp-axis-rank-hdr">Ideia</div>'
      + '<div class="dp-axis-rank-hdr">Convergência de Avaliação</div>'
      + '<div class="dp-axis-rank-hdr">Rank médio · critérios</div>'
      + '</div>';
  }

  function renderSection(ideas, title, color, desc) {
    if (!ideas.length) return '';
    var rows = ideas.map(function(idea) {
      var dots = PERFIS.map(function(p) {
        var rank = idea.scores[p.id].rank;
        var pct  = (N - rank) / (N - 1) * 100;   // invertido: rank 1 = direita (Melhor)
        return '<div class="dp-dot" style="left:' + pct.toFixed(1) + '%;background:' + p.cor + '" title="' + esc(p.nome) + ': #' + rank + '">' + p.nome.charAt(0) + '</div>';
      }).join('');
      var avgR = REAL_PIDS.reduce(function(s,pid){ return s + idea.scores[pid].rank; }, 0) / REAL_PIDS.length;
      var critHtml = ['REL','INO','DES','VIA','FAC'].map(function(c) {
        var avg = Math.round(REAL_PIDS.reduce(function(s,pid){ return s + idea.scores[pid][c]; }, 0) / REAL_PIDS.length);
        return '<div class="dp-crit-item">'
          + '<span class="dp-crit-lbl">' + c + '</span>'
          + '<span class="sc sc-' + avg + '" style="width:20px;height:20px;font-size:0.65rem">' + avg + '</span>'
          + '</div>';
      }).join('');
      return '<div class="dp-row" data-id="' + idea.id + '">'
        + '<div class="dp-label">'
        + '<div class="dp-ltitle">' + esc(idea.titulo) + '</div>'
        + '<div class="dp-lautor">' + esc(idea.autor) + '</div>'
        + '</div>'
        + '<div style="display:flex;flex-direction:column;gap:2px">'
        + AXIS_LABELS
        + '<div class="dp-track">'
        + '<div class="dp-axis-line"></div>'
        + '<div class="dp-mid-mark"></div>'
        + dots
        + '</div>'
        + '</div>'
        + '<div class="dp-avgrank">'
        + '<div class="dp-avgrank-val">#' + Math.round(avgR) + '</div>'
        + '<div class="dp-avgrank-lbl">de ' + N + '</div>'
        + '<div class="dp-crit-row">' + critHtml + '</div>'
        + '</div>'
        + '</div>';
    }).join('');
    return '<div class="dp-section">'
      + '<div class="dp-section-hd" style="border-color:' + color + '">'
      + '<span class="dp-sec-title" style="color:' + color + '">' + title + '</span>'
      + '<span class="dp-sec-count">' + ideas.length + ' ideias</span>'
      + '<span class="dp-sec-desc">' + desc + '</span>'
      + '</div>'
      + axisHdr()
      + rows
      + '</div>';
  }

  var introHtml = '<div class="dp-intro">Cada linha representa uma ideia. Os pontos coloridos mostram onde cada avaliador a posicionaria no ranking — quanto mais à esquerda, melhor a posição. Pontos agrupados indicam consenso; pontos espalhados indicam divergência entre os perfis.</div>';

  var html = introHtml + legendHtml
    + renderSection(positivo,    'Consenso positivo',  '#166534', 'Todos os perfis posicionam no top 50%')
    + renderSection(controversas,'Controversas',        '#92400e', 'Perfis divergem — alguns colocam no topo, outros no fundo')
    + renderSection(negativo,    'Consenso negativo',  '#991b1b', 'Todos os perfis posicionam na metade inferior');

  cv.innerHTML = html;

  cv.querySelectorAll('.dp-row').forEach(function(row) {
    row.addEventListener('click', function() { openModal(parseInt(row.dataset.id), REAL_PIDS[0]); });
  });
}

// ---- modal ----
function openModal(id, pid) {
  var idea = IDEIAS.find(function(x){ return x.id === id; });
  if (!idea) return;

  var p = perfil(pid);

  // Base scores row
  var baseHtml = ['REL','INO','DES','VIA','FAC'].map(function(c) {
    var v = idea.base[c];
    return '<div class="base-item">'
      + '<span class="' + scClass(v) + '">' + v + '</span>'
      + '<span class="base-lbl">' + c + '</span>'
      + '</div>';
  }).join('');

  // Scores per profile cards
  var cardsHtml = PERFIS.map(function(pp) {
    var sc = idea.scores[pp.id];
    var critRows = ['REL','INO','DES','VIA','FAC'].map(function(c) {
      return '<div class="sc-card-row"><span>' + c + '</span>'
        + '<span class="' + scClass(sc[c]) + '" style="width:22px;height:22px;font-size:0.7rem">' + scLabel(sc[c]) + '</span></div>';
    }).join('');
    return '<div class="sc-card" style="border-top:3px solid ' + pp.cor + '">'
      + '<div class="sc-card-name" style="color:' + pp.cor + '">' + esc(pp.nome)
      + ' <span class="rank-badge">#' + sc.rank + '</span></div>'
      + critRows
      + '<div class="sc-card-total" style="color:' + pp.cor + '">' + sc.total.toFixed(1) + ' / 25</div>'
      + '</div>';
  }).join('');

  function field(label, txt) {
    if (!txt) return '';
    return '<div class="m-section">'
      + '<div class="m-sec-title">' + label + '</div>'
      + '<div class="m-text">' + esc(txt) + '</div>'
      + '</div>';
  }

  var mc = document.getElementById('modal-content');
  mc.innerHTML = '<div class="m-id">IDEIA #' + idea.id + ' &nbsp;·&nbsp; ' + esc(idea.resultado) + '</div>'
    + '<div class="m-title">' + esc(idea.titulo) + '</div>'
    + '<div class="m-meta">'
    + (idea.autor   ? '<span>' + esc(idea.autor)   + '</span>' : '')
    + (idea.empresa ? '<span>' + esc(idea.empresa) + '</span>' : '')
    + (idea.uo      ? '<span>' + esc(idea.uo)      + '</span>' : '')
    + (idea.arena   ? '<span style="color:#1e3a8a;font-weight:600">' + esc(idea.arena) + '</span>' : '')
    + (idea.trl     ? '<span>TRL ' + esc(idea.trl) + (idea.trl_fase ? ' — ' + esc(idea.trl_fase) : '') + '</span>' : '')
    + '</div>'
    + '<div class="m-section">'
    + '<div class="m-sec-title">Critérios de aderência (C1–C10)</div>'
    + '<div class="crit-grid">' + idea.aderencia.map(function(v,i) {
        var cls = !v ? 'na' : (v.toUpperCase().includes('REPROVADO') ? 'fail' : 'ok');
        var cor = cls === 'ok' ? '#22c55e' : (cls === 'fail' ? '#ef4444' : '#cbd5e1');
        return '<div class="crit-item"><div class="crit-dot" style="background:' + cor + '"></div>'
          + '<span style="color:' + (cls==='fail'?'#991b1b':cls==='ok'?'#166534':'#94a3b8') + ';font-weight:' + (cls!=='na'?'600':'400') + '">'
          + 'C' + (i+1) + ': ' + esc(v || 'não avaliado') + '</span></div>';
      }).join('') + '</div>'
    + '</div>'
    + '<div class="m-section">'
    + '<div class="m-sec-title">Scores base (proxy dos dados estruturados)</div>'
    + '<div class="base-row">' + baseHtml + '</div>'
    + '</div>'
    + '<div class="m-section">'
    + '<div class="m-sec-title">Pontuação por perfil</div>'
    + '<div class="scores-grid">' + cardsHtml + '</div>'
    + '</div>'
    + field('Proposta de solução', idea.sol)
    + field('Benefícios esperados', idea.ben)
    + field('Diferencial', idea.diferencial)
    + field('Indicadores', idea.indicadores)
    + field('Ganhos esperados', idea.ganhos);

  document.getElementById('modal').classList.remove('hidden');
}

document.getElementById('modal-close').addEventListener('click', function() {
  document.getElementById('modal').classList.add('hidden');
});
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.add('hidden');
});

// ---- init static filters ----
(function initStaticFilters() {
  var allArenas = Array.from(new Set(IDEIAS.map(function(x){ return x.arena; }).filter(Boolean))).sort();
  var allDepts  = Array.from(new Set(IDEIAS.map(function(x){ return x.uo; }).filter(Boolean))).sort();
  var selArena = document.getElementById('f-arena');
  var selDept  = document.getElementById('f-dept');
  if (selArena) allArenas.forEach(function(a){ var o=document.createElement('option');o.value=a;o.textContent=a;selArena.appendChild(o); });
  if (selDept)  allDepts.forEach(function(d){ var o=document.createElement('option');o.value=d;o.textContent=d;selDept.appendChild(o); });

  ['q-ideia','f-arena','f-tec','f-dept'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('input', function(){ switchTab(activePid); });
    if (el) el.addEventListener('change', function(){ switchTab(activePid); });
  });
  var btnClr = document.getElementById('btn-clear-filters');
  if (btnClr) btnClr.addEventListener('click', function(){
    var qi = document.getElementById('q-ideia');
    var fa = document.getElementById('f-arena');
    var ft = document.getElementById('f-tec');
    var fd = document.getElementById('f-dept');
    if(qi) qi.value=''; if(fa) fa.value=''; if(ft) ft.value=''; if(fd) fd.value='';
    switchTab(activePid);
  });
})();

// ---- init ----
switchTab(PERFIS[0].id);
