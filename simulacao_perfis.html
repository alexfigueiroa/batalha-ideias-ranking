titividade – criar soluções proprietárias diferenciadas, posicionando a BBTS como provedora estratégica de serviços inteligentes para o Banco do Brasil, seu conglomerado e clientes externos.", "ben": "•\tGovernança e Compliance: controle central de uso de IA, aderência à LGPD e normas regulatórias (Bacen, CVM, etc.).\n•\tEficiência de Custos: redução da dependência de APIs externas; maior previsibilidade financeira.\n•\tSegurança: dados sensíveis processados em ambiente proprietário.\n•\tEscalabilidade: múltiplas áreas e produtos atendidos por uma base comum.\n•\tProdutividade: redução do tempo de desenvolvimento de soluções (estimado em até 50%).\n•\tInovação: viabilização de novos produtos digitais com diferencial competitivo.", "diferencial": "Essa proposta prevê a criação de uma estrutura organizacional, tecnológica e processual que permitirá à BBTS atender tanto o Banco do Brasil (principal cliente) e seu conglomerado, quanto clientes externos, com segurança, eficiência e inovação contínua.", "indicadores": "Com o uso de agentes de IA especializados nos assuntos da BBTS, a gestão estratégica e tática terá em tempo real informações rápidas, consolidadas e ajustadas para viabilizar tomadas de decisão e ajustes estratégicos.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 129}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.02, "rank": 110}, "joao": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 2, "total": 13.52, "rank": 156}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.36, "rank": 105}, "laine": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.2, "rank": 131}, "dani": {"REL": 2, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.5, "rank": 133}, "manoel": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 146}}}, {"id": 198, "titulo": "NVR on Cloud", "autor": "Pedro Stefano Souto Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "7131", "arena": "Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Elaboração de um sistema de NVR online em nuvem para armazenamento e processamento de IA quando necessário.", "ben": "Melhora na percepção de segurança e sistema de backup para gravação e processamento de imagens das agencias.", "diferencial": "Hoje a gravação de imagens ocorre localmente nas agencias, sem um sistema de backup em caso de problema em um NVR", "indicadores": "nan", "ganhos": "Ganhos de segurança / conformidade / redução de risco", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 3, "DES": 3, "VIA": 3, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 3, "DES": 3, "VIA": 3, "FAC": 1, "total": 11.0, "rank": 224}, "alex": {"REL": 1, "INO": 4, "DES": 4, "VIA": 3, "FAC": 1, "total": 12.52, "rank": 224}, "joao": {"REL": 1, "INO": 3, "DES": 3, "VIA": 3, "FAC": 2, "total": 10.08, "rank": 223}, "rafael": {"REL": 1, "INO": 4, "DES": 3, "VIA": 3, "FAC": 1, "total": 13.16, "rank": 223}, "laine": {"REL": 1, "INO": 3, "DES": 4, "VIA": 3, "FAC": 1, "total": 14.0, "rank": 224}, "dani": {"REL": 2, "INO": 3, "DES": 3, "VIA": 3, "FAC": 1, "total": 12.52, "rank": 224}, "manoel": {"REL": 1, "INO": 3, "DES": 3, "VIA": 4, "FAC": 1, "total": 10.26, "rank": 223}}}, {"id": 199, "titulo": "BBTS GovChain - Plataforma Integrada de Governança da Cadeia de Valor", "autor": "Sergio Luiz Conceicao da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Secot", "arena": "Negócios Digitais Escaláveis", "trl": "3", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "O BBTS GovChain permitirá uma visão unificada e estratégica das operações, viabilizando o monitoramento centralizado de processos, indicadores, riscos, compliance e desempenho operacional. A plataforma será estruturada em módulos integrados e escaláveis, capazes de atender às demandas operacionais e estratégicas da organização.\nMais do que uma ferramenta, o BBTS GovChain se posiciona como um habilitador estratégico da transformação digital, conectando governança, operação e inteligência de dados em uma única plataforma, preparada para sustentar o crescimento, a inovação e a competitividade da organização.", "ben": "A implementação do BBTS GovChain representa um avanço significativo na gestão integrada da cadeia de valor, proporcionando ganhos concretos em eficiência, controle e governança. \n\nEntre os principais benefícios, destacam-se:\n\nCentralização das informações estratégicas da cadeia de valor: Consolidação de dados em uma única plataforma, garantindo uma visão integrada, padronizada e confiável das operações, eliminando silos informacionais.\n\nAumento da eficiência operacional: Automatização de processos e padronização de fluxos de trabalho, reduzindo esforços manuais, otimizando recursos e aumentando a produtividade das equipes.\n\nMelhoria da governança corporativa: Estruturação de controles, papéis e responsabilidades, alinhando as operações às melhores práticas de governança e fortalecendo a transparência institucional.\n\nMaior rastreabilidade e transparência dos processos: Monitoramento completo das atividades de ponta a ponta, permitindo identificar rapidamente desvios, gargalos e oportunidades de melhoria.\n\nMonitoramento em tempo real de indicadores: Disponibilização de dashboards e métricas atualizadas, possibilitando acompanhamento contínuo do desempenho e atuação proativa sobre riscos e resultados.\n\nRedução de retrabalho e falhas operacionais: Integração de sistemas e eliminação de redundâncias, minimizando erros humanos e aumentando a qualidade das entregas.\n\nApoio à tomada de decisão baseada em dados: Disponibilização de informações confiáveis e estruturadas, permitindo decisões mais ágeis, assertivas e orientadas por evidências.\n\nFortalecimento das ações de compliance e auditoria: Registro estruturado das operações, facilitando auditorias, garantindo conformidade regulatória e reduzindo riscos legais e reputacionais.\n\nIntegração entre áreas operacionais e estratégicas: Conexão entre diferentes áreas, promovendo maior alinhamento organizacional, colaboração e fluidez nos processos internos e externos.\n\nModernização tecnológica e digitalização de processos: Adoção de uma arquitetura digital inovadora, reduzindo dependência de processos manuais e posicionando a organização em um novo patamar de maturidade digital.", "diferencial": "O diferencial do BBTS GovChain está na integração entre governança corporativa, operação e inteligência analítica em uma única plataforma.\nEnquanto muitas soluções existentes atuam apenas de forma operacional ou isolada, o BBTS GovChain propõe a visão integrada ponta a ponta da cadeia de valor.\nA proposta busca transformar dados operacionais dispersos em inteligência corporativa estruturada.", "indicadores": "1. Indicadores operacionais: redução de retrabalho; falhas em processos; aumento da produtividade. 2. Indicadores de governança: índice de conformidade; número de não conformidades; nível de aderência aos processos internos; rastreabilidade das operações.  3. Indicadores estratégicos: nível de utilização da plataforma;  satisfação dos usuários; redução de custos operacionais;  índice de automação de processos.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 50}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 57}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 59}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 48}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 45}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 50}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 65}}}, {"id": 201, "titulo": "BBTS ID Trust – Identidade Digital Segura Nacional", "autor": "Paulo Luciano Goncalves da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GERED", "arena": "Segurança Integrada", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A solução proposta é o BBTS ID Trust, uma plataforma nacional de identidade digital segura que utiliza biometria, IA e blockchain para autenticação e registro imutável de acessos.\nO sistema será integrado ao Gov.br e à Carteira de Identidade Nacional, permitindo validação rápida e confiável de cidadãos e empresas.\nA implantação ocorrerá em fases-piloto, com expansão gradual para serviços públicos e privados, garantindo segurança, eficiência e confiança digital em todo o país.", "ben": "A implementação do BBTS ID Trust trará maior segurança e confiança nas transações digitais, reduzindo fraudes e custos operacionais.\nCidadãos terão acesso simplificado e protegido a serviços públicos e privados; empresas e órgãos governamentais ganharão eficiência e credibilidade.\nA BBTS se consolidará como referência nacional em identidade digital segura, fortalecendo sua imagem de inovação e liderança em segurança integrada.", "diferencial": "O BBTS ID Trust se diferencia por integrar tecnologias emergentes — biometria, IA e blockchain — em uma única plataforma nacional de autenticação segura.\nEnquanto soluções atuais são fragmentadas e setoriais, o projeto propõe um modelo unificado, escalável e interoperável, capaz de conectar serviços públicos e privados com alto nível de segurança e confiabilidade.É uma abordagem disruptiva e adaptada à realidade brasileira, que transforma a identidade digital em um ativo estratégico de confiança", "indicadores": "Redução de fraudes de identidade, aumento da adesão de usuários e melhoria da eficiência nos processos de autenticação digital.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 17.0, "rank": 78}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 17.32, "rank": 90}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 3, "total": 14.68, "rank": 87}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 18.64, "rank": 98}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 19.6, "rank": 103}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 17.9, "rank": 88}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.46, "rank": 90}}}, {"id": 202, "titulo": "Manual de Boas Práticas de Gestão de Estoques", "autor": "Vanilda Salustiano da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT PALMAS", "arena": "Eficiência Operacional e Automação,Segurança Integrada", "trl": "7", "trl_fase": "Testes Operacionais e Comercialização (TRL 7–9) — Solução pronta ou em operação", "sol": "A proposta consiste em desenvolver e implementar um Manual Integrado de Boas Práticas de Gestão de Estoques, transformando as diretrizes existentes em um modelo operacional padronizado, com procedimentos de fácil aplicação, acessível e replicável em todas as unidades da BBTS. A solução propõe: Padronização do layout dos estoques (endereçamento, sinalização e identificação); criação de identidade visual única BBTS; integração e simplificação de NI e PRO; inclusão de rotinas não documentadas; implementação de ferramentas de apoio (planilhas e controles) para consultas rápidas e melhor organização; criação de fluxos operacionais simplificados; definição clara de papéis e responsabilidades; disponibilização digital acessível; e capacitação para adoção do modelo.", "ben": "A implementação da padronização e do Manual de boas práticas de Gestão de Estoques trará melhorias significativas para pessoas, processos e resultados da empresa. \nPara os colaboradores, haverá maior clareza sobre como executar as atividades, reduzindo dúvidas, retrabalho e dependência de conhecimento informal. Isso proporcionará mais segurança, autonomia e melhor experiência no ambiente de trabalho. \nPara a empresa, os principais ganhos serão o aumento da eficiência operacional, com redução de tempo e custos, maior padronização entre unidades, melhoria na qualidade dos processos e fortalecimento da governança e conformidade com normas internas. \nPara os clientes e parceiros, a melhoria na organização e na gestão dos estoques refletirá em maior agilidade, confiabilidade e qualidade nos serviços prestados. \nDe forma geral, a ideia proporcionará: \nPadronização dos processos e rotinas de estoque  \nAumento da produtividade e eficiência operacional  \nRedução de erros, retrabalho e perdas  \nMelhoria da organização física dos ambientes  \nMaior clareza para os colaboradores (quem faz, como faz)  \nFortalecimento da governança e conformidade  \nCriação de identidade visual e operacional dos estoques BBTS  \nFacilidade no treinamento e integração de novos colaboradores  \nreferência clara para novos gestores \nBase estruturada para automação e transformação digital futura \nAlém disso, contribuirá para fortalecer a imagem da BBTS como uma organização eficiente, organizada e orientada à melhoria contínua.", "diferencial": "Atualmente, a BBTS não possui um manual integrado de gestão de estoques, levando cada unidade a adotar práticas próprias, o que gera falta de padronização e inconsistências. O diferencial desta proposta é a criação de um modelo operacional completo, padronizado e aplicável na prática, que organiza, simplifica e fortalece a gestão de estoques, garantindo identidade e fluxo uniforme entre todas as unidades.", "indicadores": "Já utilizamos o modelo no CAT Palmas, e podemos replicar para as outras unidades da BBTS.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "INDETERMINADO", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 4}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 4, "total": 19.0, "rank": 16}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 4, "total": 18.52, "rank": 32}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 5, "total": 17.48, "rank": 15}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 4, "total": 20.24, "rank": 20}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 4, "total": 20.4, "rank": 46}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 4, "FAC": 4, "total": 18.7, "rank": 51}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 16.86, "rank": 24}}}, {"id": 203, "titulo": "ECOSTOCK: LOGÍSTICA SEM DESPERDÍCIO", "autor": "Vanilda Salustiano da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT PALMAS", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A proposta consiste na aquisição e implantação de máquinas trituradoras de papelão nos estoques, possibilitando o reaproveitamento do papelão descartado como material de proteção para embalagens. \nO papelão que hoje seria descartado será transformado em material de enchimento e acomodação, substituindo parcialmente itens como plástico bolha e espumas.", "ben": "A implementação dessa solução trará ganhos expressivos para toda a cadeia operacional: \nRedução significativa dos custos com compra de materiais de embalagem \nDiminuição de custos logísticos decorrentes de reenvio de peças danificadas \nMaior eficiência no uso de recursos internos \nRedução de peças quebradas durante o transporte \nMenor índice de avarias no transporte \nMaior agilidade no atendimento (celeridade) \nRedução de retrabalho logístico \nDiminuição de custos com reparadores devido a peças danificadas \nOtimização do transporte (menos reenvios) \nFortalecimento das práticas de sustentabilidade (ASG)", "diferencial": "Aplica o conceito de economia circular dentro da operação\nTransforma um custo (descarte) em recurso produtivo\nIntegra redução de custos + melhoria da qualidade logística + sustentabilidade\nPossui alta escalabilidade e replicação em todos os estoques\nGera impacto rápido sem necessidade de grande investimento estrutural", "indicadores": "Pode comprar uma unidade - e fazer o piloto em um cat - para testar a viabilidade.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "INDETERMINADO", "PRESENTE"], "base": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 18.0, "rank": 51}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 19.42, "rank": 16}, "joao": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 16.08, "rank": 36}, "rafael": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 19.44, "rank": 61}, "laine": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 21.0, "rank": 20}, "dani": {"REL": 4, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 20.5, "rank": 14}, "manoel": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.46, "rank": 31}}}, {"id": 204, "titulo": "Otimização da Frota Operacional: Implantação de Veículos Utilitários Adaptados para Técnicos de Operações", "autor": "Marcia Cristina Leal Sobreira", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT CGR", "arena": "Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Substituir gradativamente (ou focar as novas aquisições/locações em) modelos de veículos na versão utilitária de fábrica (como o Chevrolet Onix Utilitário/Furgão ou similares). Esses veículos eliminam os bancos traseiros, substituindo-os por um compartimento de carga plano, robusto e equipado com divisórias e pontos de ancoragem (estruturas para amarrar peças e ferramentas). Além disso, contam com suporte superior otimizado para o transporte de escadas com maior agilidade e total segurança.", "ben": "Segurança (SSMA - Segurança, Saúde e Meio Ambiente): Mitigação do risco de acidentes com cargas soltas dentro do habitáculo do motorista e melhor fixação da escada. \n​Preservação do Patrimônio: Redução drástica de danos internos no veículo (rasgos em bancos, arranhões em plásticos), o que reduz custos de manutenção da frota ou penalidades na devolução de carros alugados.\n​Produtividade: Organização eficiente das ferramentas e peças no baú, facilitando o acesso do técnico e reduzindo o tempo de setup do atendimento. \n​Público-Alvo / Impactados: Técnicos de Operações, Equipe de Gestão de Frota e Área de Segurança do Trabalho.", "diferencial": "O diferencial está na aplicação de um veículo projetado de fábrica para carga (como o Onix Utilitário) em nossa rotina, eliminando improvisos nos bancos traseiros de carros comuns. A inovação simplifica o processo logístico ao introduzir travas profissionais e pontos de ancoragem para peças e escadas. Isso transforma o carro em uma extensão segura da bancada de trabalho, garantindo conformidade com as normas de SSMA, agilidade urbana e total preservação do patrimônio.", "indicadores": "Com os KPIs: ​Incidentes com Carga (Segurança): Monitorar a redução a zero de ocorrências com objetos soltos ou quedas de escadas. ​Manutenção e Depreciação (Financeiro): Comparar custos de reparos internos (rasgos/danos) entre a frota comum e a utilitária. ​Taxa de Sinistralidade (Financeiro): Reduzir multas por avarias na devolução dos carros às locadoras. ​Tempo de Setup (Produtividade): Medir a agilidade no manejo de ferramentas e escadas. ​Critério de Sucesso: Eliminar avarias internas nos carros, manter acidentes zerados e alcançar >85% de aprovação dos técnicos em ergonomia e segurança.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.0, "rank": 52}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.32, "rank": 18}, "joao": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 16.52, "rank": 31}, "rafael": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 19.64, "rank": 49}, "laine": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 21.2, "rank": 17}, "dani": {"REL": 4, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 20.32, "rank": 16}, "manoel": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.76, "rank": 27}}}, {"id": 205, "titulo": "Prontidão Operacional: Disponibilização de Escadas Permanentes nas Agências.", "autor": "Marcia Cristina Leal Sobreira", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT CGR", "arena": "Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Instituir como padrão que cada agência bancária possua uma escada própria, devidamente identificada, inventariada e armazenada em local seguro (como a sala técnica, almoxarifado ou área de autoatendimento/retaguarda). Dessa forma, o ferramental essencial de altura estará permanentemente disponível no local da prestação do serviço.  A proposta de um projeto-piloto, comprar escadas para uma microrregião de agências (ex: 5 a 10 agências) para medir a variação do tempo de atendimento e a satisfação da equipe antes do Roll-out (implantação global).", "ben": "Agilidade (SLA): Redução drástica no tempo de atendimento (MTTR), permitindo que qualquer chamado emergencial que surja ,seja atendido de imediato, sem dependência de transporte de logística externa.\n​Eficiência de Combustível e Frota: Elimina a necessidade de veículos maiores na frota diária apenas para transporte de escadas, gerando economia de combustível e permitindo o uso de modais mais ágeis ou veículos menores.\n​Segurança e Ergonomia: Evita o esforço repetitivo do técnico de subir, descer, tentar encaixar de forma segura num espaço inapropriado que os veículos comuns oferecem .", "diferencial": "O diferencial está na descentralização e no ganho de prontidão operacional. Em vez de tratar a escada como um ferramental individual que se desloca com o técnico, ela passa a ser um ativo fixo de infraestrutura da agência. A inovação simplifica o processo ao eliminar o gargalo logístico do transporte, garantindo que o recurso esteja disponível no autoatendimento para chamados programados ou emergenciais imediatos.", "indicadores": "Acompanhar os seguintes KPIs: ​Tempo Médio de Atendimento/Reparo (SLA/MTTR): Medir a redução do tempo de resposta, especialmente em chamados emergenciais. ​Eficiência Logística (Produtividade): Redução no número de visitas reagendadas por falta de equipamento adequado no ato do chamado. ​Ergonomia e Segurança (SSMA): Redução do esforço físico dos técnicos associado ao ato repetitivo de carregar/descarregar escadas dos veículos. ​Critério de Sucesso: Reduzir o tempo de atendimento de chamados em altura na agência, eliminar o retrabalho por falta de equipamento e obter alta satisfação da equipe", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 3, "I usca eficiência, padronização e excelência em suas operações. Essa estrutura tem como principal objetivo centralizar o conhecimento técnico, promover a integração entre áreas e garantir que processos e decisões sejam orientados por critérios técnicos consistentes.\nAo reunir profissionais especializados sob uma gestão dedicada, torna-se possível desenvolver diretrizes claras, implementar boas práticas e assegurar maior controle sobre a qualidade dos serviços e projetos.\nDessa forma, a Superintendência Técnica não apenas melhora o desempenho operacional, mas também agrega valor ao planejamento institucional de longo prazo.", "diferencial": "Setor técnico especializado.", "indicadores": "nan", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 2, "DES": 5, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 2, "DES": 5, "VIA": 4, "FAC": 1, "total": 13.0, "rank": 207}, "alex": {"REL": 1, "INO": 3, "DES": 5, "VIA": 4, "FAC": 1, "total": 14.02, "rank": 210}, "joao": {"REL": 1, "INO": 2, "DES": 5, "VIA": 4, "FAC": 2, "total": 11.48, "rank": 210}, "rafael": {"REL": 1, "INO": 3, "DES": 5, "VIA": 4, "FAC": 1, "total": 14.16, "rank": 214}, "laine": {"REL": 1, "INO": 2, "DES": 5, "VIA": 4, "FAC": 1, "total": 16.4, "rank": 205}, "dani": {"REL": 2, "INO": 2, "DES": 5, "VIA": 4, "FAC": 1, "total": 14.7, "rank": 207}, "manoel": {"REL": 1, "INO": 2, "DES": 5, "VIA": 5, "FAC": 1, "total": 12.06, "rank": 205}}}, {"id": 208, "titulo": "Ilhas Técnicas - Itec BBTS", "autor": "Fabio Muller", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT Florianópolis", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A criação de ilhas técnicas regionais", "ben": "A criação de ilhas técnicas regionais é uma estratégia essencial para descentralizar o conhecimento e aumentar a eficiência operacional. Essas estruturas permitem que cada regional tenha maior autonomia técnica, reduzindo a dependência de instâncias centrais e agilizando a resolução de demandas locais.\nAlém disso, as ilhas técnicas favorecem a padronização de procedimentos e a disseminação de boas práticas, garantindo que o nível de qualidade seja mantido em todas as unidades. Com equipes técnicas mais próximas da realidade regional, as decisões se tornam mais assertivas, considerando as particularidades de cada local.\nOutro benefício importante é o fortalecimento da capacidade de resposta, já que problemas podem ser tratados de forma mais rápida e eficaz. Assim, as ilhas técnicas contribuem não apenas para a melhoria do desempenho operacional, mas também para o desenvolvimento contínuo das equipes e para a consolidação de uma cultura técnica sólida em toda a organização.", "diferencial": "É uma estratégia essencial para descentralizar o conhecimento e aumentar a eficiência operacional.", "indicadores": "nan", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 3, "DES": 5, "VIA": 2, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 3, "DES": 5, "VIA": 2, "FAC": 1, "total": 12.0, "rank": 219}, "alex": { Padronização do processo operacional\n\nAumento da produtividade e agilidade administrativa", "diferencial": "A solução centraliza todo o processo em uma única plataforma simples e prática, automatizando tarefas hoje realizadas manualmente. Além disso, oferece armazenamento digital imediato dos comprovantes e geração automática das RDTs, reduzindo significativamente o esforço operacional. Já estou usando particularmente esse app que desenvolvi, e gostaria de disponibilizar para que outros técnicos de campo tivessem a mesma experiência que tenho. É realmente muito prático e funcional.", "indicadores": "Tempo médio para preenchimento de RDT  Tempo de fechamento administrativo  Quantidade de retrabalho em lançamentos  Índice de perda de comprovantes  Produtividade operacional da equipe técnica  Quantidade de RDTs geradas automaticamente", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 4}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 4, "total": 18.0, "rank": 55}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 4, "total": 17.82, "rank": 69}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 5, "total": 17.08, "rank": 18}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 4, "total": 19.44, "rank": 62}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 4, "total": 19.8, "rank": 88}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 4, "FAC": 4, "total": 17.72, "rank": 97}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 4, "total": 16.46, "rank": 32}}}, {"id": 223, "titulo": "Hub Inteligente Financeiro", "autor": "Gabrielle Borges Roquete De Melo", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "MATRIZ - GEEMP", "arena": "Negócios Digitais Escaláveis", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Criar uma plataforma inteligente de análise contextual e perfil financeiro capaz de recomendar soluções personalizadas para clientes PF e PJ, incluindo de agronegócios, considerando perfil, comportamento, momento financeiro e necessidades identificadas. A solução poderá apoiar tanto clientes quanto equipes comerciais na identificação de oportunidades e jornadas financeiras mais adequadas dentro dos produtos, serviços e materiais do BB.", "ben": "Maior personalização no relacionamento com clientes;\nMelhor direcionamento de produtos e serviços financeiros;\nAmpliação do potencial comercial do ecossistema BB;\nExpansão do portfólio digital da BBTS;\nAumento da satisfação e aderência dos clientes;\nApoio aos agentes comerciais na recomendação de soluções mais adequadas.", "diferencial": "A proposta utiliza IA contextual e análise comportamental para transformar o relacionamento financeiro em uma experiência personalizada, dinâmica e orientada por necessidades reais do cliente, relacionando a necessidade com as soluções de produtos e serviços do BB como crédito, renegociação, cursos, eventos, sorteios, consultoria de investimentos, dentre outros.", "indicadores": "Taxa de aderência às recomendações; Conversão de soluções ofertadas; NPS dos usuários; Engajamento na plataforma; Retenção de clientes; Volume de utilização da solução.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.  dos bens em tempo real\nDiminuição de perdas de ativos e maior segurança patrimonial\nOtimização do tempo das equipes envolvidas\nMelhoria nos processos de auditoria e conformidade\nCentralização das informações em um único sistema integrado\nAumento da responsabilidade dos gestores sobre os bens de suas unidades\n\nAlém disso, o uso de leitura por código de barras permitirá um inventário muito mais rápido, preciso e confiável, reduzindo esforço operacional e aumentando a produtividade.", "diferencial": "A proposta se diferencia por integrar, em uma única solução digital, todas as etapas do controle patrimonial, que atualmente são realizadas de forma manual e descentralizada.", "indicadores": "O sucesso da iniciativa poderá ser acompanhado por meio de indicadores operacionais, financeiros e de controle patrimonial. Além disso, com a implantação da leitura por código de barras, será possível medir o ganho de produtividade por meio da redução do esforço operacional e aumento da velocidade na execução dos inventários.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 133}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.02, "rank": 113}, "joao": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 2, "total": 13.52, "rank": 159}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.36, "rank": 109}, "laine": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.2, "rank": 134}, "dani": {"REL": 2, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.5, "rank": 136}, "manoel": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 149}}}, {"id": 226, "titulo": "Transição tecnológica:  Soldagem sem chumbo e adequação RoHS na BBTS.", "autor": "Dithamar Nascimento Santos", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "UOR 7421", "arena": "Eficiência Operacional e Automação,Segurança Integrada", "trl": "6", "trl_fase": "Desenvolvimento de Protótipos (TRL 4–6) — Testes em ambiente controlado/simulado", "sol": "Implemetar de forma gradual a descontinuidade da solda convencional (Sn Pb) por ligas Lead-Free ( sem chumbo) em toda BBTS.", "ben": "A idéia de descontinuar o uso de soldagem com chumbo na BBTS objetiva ganhos nas seguintes áreas:\n\n1-SOCIAL E SAÚDE: Elimina inalação de fumos e particulados sólidos ( CO² e SOx) reduzindo indicador  DALY / OMS garatindo conformidade com a NR-1.\n\n2-TÉCNICO OPERACIONAL: Melhora a peformace dos reparos em placas ( PCBs).  a solda Lead - Free entrega circutos mais leves e maior condutividade témica.\n\n3- AMBIENTAL E GONVERNANÇA: ( Valor de mercado / ASG ) : Adequar a BBTS a diretiva RoHS ( restrição ao uso de substâncias perigosas)  elevando a valorização da marca BBTS perante o mercado e os grandes cliente do ecossitema bancário.", "diferencial": "Alinhamento Institucional prático e agenda ASG/ESG saindo do papel e materializando -se  nas bancadas dos grupos de reparos ,laboratórios e uso geral da soldagem verde ( lead-free) nas dependências da BBTS.", "indicadores": "Os indicadores devem ser divididos em três áreas : indicador de saúde ocupacional,indicador performace ténica e indicador de sustentabilidade , saberemos do sucesso da idéia quando atingirmos 100% de substuição das ligas de solda (SnPb).,elevando o padrão tecnológico e ambiental da BBTS.", "ganhos": "Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRES a o BB, podendo gerar crédito de carbono. Redução do consumo de energia (kWh) gerando benefícios financeiros,  Redução da emissão de CO₂ (tCO₂e) da infraestrutura de TI, geração de crédito de carbono para conversão em benefícios fiscais. Redução de custos com energia e cloud. Retorno sobre investimento (ROI) da solução", "diferencial": "O SustainaIT se destaca por não ser apenas uma ferramenta de monitoramento, mas sim uma solução integrada de governança ambiental aplicada diretamente à operação de TI, conectando tecnologia, sustentabilidade e tomada de decisão que é algo ainda pouco explorado de forma estruturada no mercado.", "indicadores": "Redução do consumo de energia (kWh) gerando benefícios financeiros,  Redução da emissão de CO₂ (tCO₂e) da infraestrutura de TI, geração de crédito de carbono para conversão em benefícios fiscais. Redução de custos com energia e cloud. Retorno sobre investimento (ROI) da solução", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 134}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.02, "rank": 114}, "joao": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 2, "total": 13.52, "rank": 160}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.36, "rank": 110}, "laine": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.2, "rank": 135}, "dani": {"REL": 2, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.5, "rank": 137}, "manoel": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, rank": 206}}}, {"id": 230, "titulo": "Migração para o Mercado Livre de Energia", "autor": "Geyverson Durigon", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Dioge-Gecon", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A proposta consiste em estruturar um programa de migração da BBTS para o mercado livre de energia, transformando a gestão energética em um processo estratégico, com foco em redução de custos, sustentabilidade e maior controle operacional. Inicialmente, será realizado um diagnóstico do consumo energético, identificando unidades elegíveis para migração e analisando contratos atuais no mercado regulado. A partir disso, será conduzido o processo de adesão ao ambiente de contratação livre, incluindo a escolha de comercializadoras e negociação de contratos mais vantajosos.\nApós a migração, será implementado um modelo de gestão ativa de energia, com monitoramento contínuo do consumo, acompanhamento de preços e ajustes contratuais conforme o perfil de uso da empresa.", "ben": "Redução de Custos: Uma das principais vantagens do Mercado Livre de Energia é a redução de custos com a conta de energia. Preço único a qualquer hora do dia. Algumas empresas que migraram tiveram uma redução em suas contas de energia estimada por volta de 15% a 30%. Em 2024 a BBTS pagou de energia por volta de R$ 4,6 MM.\n Oferecer o serviço ou consultoria para as unidades do BB, podendo esse serviço entrar para o portifólio da BBTS.", "diferencial": "Vai além da migração: foco em gestão ativa\nNa maioria dos casos, empresas: migram para o mercado livre, fecham contratos fixos e não fazem gestão contínua. Nesta proposta: a energia passa a ser ativamente gerenciada com acompanhamento contínuo de consumo, preços e contratos. Diferencial: energia tratada como ativo estratégico, não apenas custo. Diferencial: energia tratada como ativo estratégico, não apenas custo.", "indicadores": "Redução do custo de energia (R$/MWh) Economia total anual (R$) Previsibilidade orçamentária (variação de custo ao longo do tempo)", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 16.0, "rank": 135}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 16.62, "rank": 154}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 3, "total": 14.28, "rank": 102}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 17.84, "rank": 150}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 19.0, "rank": 145}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 16.92, "rank": 148}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 14.06, "rank": 105}}}, {"id": 231, "titulo": "BBTS Pedala", "autor": "Ricardo de Moraes e Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Super CN, Gereg CO", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "BBTS Pedala – Não é tendência. É pressão. É posicionamento. É resultado.\nO cenário já mudou — e quem não se adapta, paga a conta.\nCustos crescentes com transporte, cobranças por indicadores ESG reais, aumento do absenteísmo e equipes cada vez menos engajadas não são hipóteses. São fatos. \nO BBTS Pedala surge como uma solução objetiva e inevitável: transformar um problema recorrente em vantagem competitiva mensurável.\nEstamos falando de um programa que converte deslocamento em redução de custo, comportamento em indicador ESG auditável e rotina em engajamento real — não retórico. \nAqui não há discurso vazio. Há entrega:\nRedução direta de despesas com benefícios tradicionais\nGeração comprovável de indicadores ambientais e sociais\nImpacto positivo na saúde e produtividade\nEngajamento sustentad", "ben": "Reduzir custos com vale-transporte\nIncentivar mobilidade sustentável\nPromover saúde e bem-estar dos colaboradores\nDiminuir emissão de CO₂\nFortalecer imagem ESG da empresa\nHabilitar certificações ambientais e sociais", "diferencial": "O BBTS Pedala não é mais um programa de benefício, é uma plataforma que converte comportamento em resultado mensurável, reduz custo e posiciona a empresa como líder em ESG na prática.", "indicadores": "Redução de custo com VT (%) Km pedalados/mês CO₂ evitado Nº de participantes ativos Engajamento (%) Absenteísmo (redução)", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 4, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 4, "VIA": 4, "FAC": 2, "total": 15.0, "rank": 175}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 16.02, "rank": 179}, "joao": {"REL": 1, "INO": 4, "DES": 4, "VIA": 4, "FAC": 3, "total": 13.68, "rank": 154}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 17.36, "rank": 167}, "laine": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 2, "total": 18.0, "rank": 178}, "dani": {"REL": 2, "INO": 4, "DES": 4, "VIA": 4, "FAC": 2, "total": 15.92, "rank": 181}, "manoel": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.66, "rank": 135}}}, {"id": 232, "titulo": "ARGRO - App de Registro e Gestão Rural Omnipresente",  "rank": 1}}}, {"id": 241, "titulo": "IA DE APOIO GERED - TechAssist IA", "autor": "Daniel Joao Borges", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GERED - SUPER SUL - GEREG SUL - CAT-FLO", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Criação de ferramenta IA (CHATBOOT via WhatsApp por exemplo) para acesso a procedimentos.", "ben": "Agilidade na resolução dos problemas, facilidade na busca de procedimentos e padronização nas formas de busca por procedimentos.", "diferencial": "Criação de uma ferramenta IA para apoio aos técnicos na busca automatizada de procedimentos para resolução dos problemas com os equipamentos em campo.", "indicadores": "Quantidade de atendimentos realizados pela ferramenta de Apoio IA", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 4, "VIA": 3, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 4, "VIA": 3, "FAC": 1, "total": 13.0, "rank": 210}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 3, "FAC": 1, "total": 15.12, "rank": 190}, "joao": {"REL": 1, "INO": 4, "DES": 4, "VIA": 3, "FAC": 2, "total": 11.08, "rank": 218}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 3, "FAC": 1, "total": 15.56, "rank": 194}, "laine": {"REL": 1, "INO": 4, "DES": 5, "VIA": 3, "FAC": 1, "total": 17.0, "rank": 190}, "dani": {"REL": 2, "INO": 4, "DES": 4, "VIA": 3, "FAC": 1, "total": 14.92, "rank": 194}, "manoel": {"REL": 1, "INO": 4, "DES": 4, "VIA": 4, "FAC": 1, "total": 11.06, "rank": 219}}}, {"id": 242, "titulo": "ALI‑BBTS: Tecnologia de Legibilidade Institucional", "autor": "Julio Cesar Torres Goncalves dos Santos", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CEPLAN", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A proposta consiste na criação da ALI-BBTS, uma tecnologia organizacional para auditar e estabilizar a forma como a instituição nomeia, mede e representa aquilo que governa. A solução identifica objetos mal definidos, conflitos semânticos entre áreas, indicadores frágeis e categorias que comprometem integração, automação, analytics e IA, convertendo essa fragilidade invisível em base técnica de reengenharia institucional. Ao final, a BBTS não apenas melhora sua operação: cria um modelo proprietário de governança ontológica com potencial de monetização pela venda da tecnologia como nova linha de serviço.", "ben": "A ALI-BBTS melhora a instituição em um nível que normalmente permanece intocado: a capacidade de nomear, classificar, medir e governar a própria realidade com consistência. Na prática, isso reduz retrabalho interpretativo, conflitos entre áreas, fragilidade de indicadores, falhas de integração, decisões baseadas em objetos mal definidos e automação construída sobre ambiguidades.\n\nPara as pessoas, a solução reduz a necessidade de tradução informal, diminui ruído operacional e melhora a clareza sobre aquilo que está sendo executado, medido e cobrado. Para a empresa, fortalece governança, aumenta a interoperabilidade entre áreas e sistemas, qualifica analytics, prepara o ambiente para inteligência artificial e reduz custo estrutural produzido por incoerência semântica.\n\nO ganho mais estratégico, porém, é outro: a ALI-BBTS transforma um problema invisível em ativo intelectual proprietário da BBTS. Cada aplicação gera ontologias, taxonomias, contratos semânticos, matrizes de coerência e frameworks reutilizáveis. Isso significa que a BBTS não apenas melhora sua operação — ela cria um modelo vendável. A tecnologia pode ser monetizada como nova linha de serviço especializada, com potencial de venda do método para outras organizações complexas, ampliando receita, posicionamento de mercado e autoridade da BBTS em um campo ainda pouco explorado.", "diferencial": "Enquanto soluções tradicionais tratam linguagem e classificação como apoio, a ALI as transforma em infraestrutura de governo. Seu diferencial está em tornar auditável a relação entre realidade e representação, corrigindo objetos mal definidos, inconsistências entre áreas e indicadores frágeis. Além disso, não é apenas solução interna: é um modelo proprietário, replicável e comercializável, com potencial de monetização pela venda da tecnologia como nova linha de serviço da BBTS.", "indicadores": "O sucesso será medido por indicadores próprios: redução do DLI (Déficit de Legibilidade Institucional), redução da ASE (Assimetria Semântica Estrutural) e redução de Objetos de Governo Mal Definidos (OGM), além do aumento da consistência entre norma, sistema, indicador e uso real. Também serão medidos redução de retrabalho interpretativo, aumento da confiabilidade dos indicadores e melhoria da interoperabilidade entre áreas. O principal indicador estratégico será a monetização do modelo, com geração de receita pela venda da ALI-BBTS como serviço e produto proprietário da BBTS.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 56}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 59}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 61}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 52}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 49}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 53}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 67}}}, {"id": 243, "titulo": "Estruturação de gestão de processos e mudanças com apoio de agente inteligente", "autor": "Joana Kelly Guimaraes Ribeiro", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "3000008020", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "01. Agente inteligente\nUtilização de um agente para leitura de normativos, identificação de lacunas e apoio na estruturação de processos mais completos e adequados à automação. Também permite priorizar iniciativas com base na estratégia corporativa e no nível de maturidade, além de apoiar a padronização, sugerir melhorias, indicar riscos e orientar a melhor abordagem tecnológica.\n02. Aculturamento\nImplementação de trilha de capacitação com teoria, estudos de caso e aplicação prática, visando desenvolver a maturidade das áreas na gestão de processos e na definição de soluções.", "ben": "Maior maturidade na gestão de processos da empresa;\nRedução de retrabalho e de tempo em desenvolvimento de soluções;\nMelhoria na comunicação entre negócio e TI;\nAumento da qualidade das especificações e das entregas;\nMelhor tomada de decisão sobre qual solução tecnológica utilizar;\nRedução de riscos operacionais decorrentes de processos mal definidos;\nPreservação e estruturação do conhecimento organizacional;\nAceleração de iniciativas de automação com maior efetividade.", "diferencial": "Hoje o mapeamento de processos é pouco padronizado, dependente de conhecimento individual e sem um método estruturado de evolução e priorização.\nA proposta se diferencia ao combinar estruturação de processos com apoio de um agente inteligente e aculturamento das áreas, promovendo padronização, identificação de lacunas e melhor tomada de decisão.\nO foco não é apenas mapear processos, mas elevar a maturidade organizacional e melhorar a qualidade das soluções implementadas.", "indicadores": "Quantidade de processos mapeados e estruturados; Redução do tempo de desenvolvimento de soluções; Taxa de sucesso das implementações (entregas dentro do esperado); Engajamento das áreas nas trilhas de capacitação (participação e conclusão dos treinamentos).", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 57}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 60}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 62}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 53}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 50}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 54}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 68}}}, {"id": 244, "titulo": "COBRA COMPUTADORES: Rede Nacional de Assistência Técnica em TI", "autor": "Julio Cesar Torres Goncalves dos Santos", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CEPLAN", "arena": "Negócios Digitais Escaláveis", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A proposta consiste na criação da COBRA COMPUTADORES, uma rede nacional de assistência técnica em equipamentos de informática, baseada na reutilização da infraestrutura, capilaridade e expertise já existentes na BBTS.\n\nA solução começa com a ativação de um piloto em regiões com maior ociosidade operacional, onde os técnicos passam a atender demandas de manutenção de computadores, monitores, impressoras e periféricos, tanto para clientes finais quanto para pequenas e médias empresas.\n\nA operação pode ser estruturada em múltiplos modelos: atendimento sob demanda, contratos recorrentes de suporte técnico, parcerias com fabricantes e integração com o varejo. Parte do estoque alienável pode ser utilizado como fonte de peças, upgrade ou revenda.", "ben": "A iniciativa reduz o impacto da queda na manutenção de ATMs ao reaproveitar a força de trabalho, a logística e a capilaridade já existentes na BBTS, diminuindo ociosidade e convertendo custo em produtividade.\n\nPara a empresa, gera uma nova linha de receita de curto prazo, aproveitando estrutura existente sem necessidade de grandes investimentos iniciais. Para os técnicos, amplia o campo de atuação e aumenta utilização operacional. Para clientes e parceiros, oferece um serviço de assistência técnica com padrão institucional, confiável e com cobertura nacional.\n\nO principal benefício estratégico é a monetização direta da capacidade instalada da BBTS. A operação permite a venda de serviços técnicos, contratos recorrentes com empresas, parcerias com fabricantes e varejistas e utilização de estoque alienável. Assim, a BBTS não apenas compensa a redução do ATM, mas cria um novo modelo de negócio baseado na comercialização de suporte técnico como serviço.", "diferencial": "Enquanto o mercado atual é fragmentado, local e com baixa padronização, a proposta cria uma operação com escala nacional, padrão institucional e confiabilidade, aproveitando um ativo que já está instalado.\n\nAlém disso, a ideia não parte da criação de um novo custo, mas da reconversão de um custo existente em receita. Em vez de construir uma operação do zero, utiliza estrutura ociosa para criar valor imediato. O diferencial, portanto, está na capacidade de transformar infraestrutura subutilizada.", "indicadores": "Redução da ociosidade técnica | aumento de produtividade operacional | receita gerada por assistência técnica | número de atendimentos realizados | contratos recorrentes firmados | utilização de estoque alienável | expansão geográfica do serviço.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 82}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.62, "rank": 76}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.12, "rank": 114}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.84, "rank": 80}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 68}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.5, "rank": 69}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.96, "rank": 119}}}, {"id": 245, "titulo": "Papai Noel da BBTS", "autor": "Adson Lopes de Oliveira", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT - BRASÍLIA", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "​A solução consiste em criar a campanha \"Papai Noel da BBTS: Conectando Magia e Tecnologia\", uma jornada digital e física estruturada em 4 etapas objetivas:", "ben": "Para os Colaboradores (As Pessoas):\n​Valorização e Reconhecimento: Sentimento profundo de acolhimento ao ver que a empresa se importa com a sua realidade familiar e com o bem-estar de seus filhos e netos.\n​Redução do Desgaste (Burnout): Ações que humanizam o ambiente corporativo e celebram as conquistas familiares ajudam a aliviar o estresse do final do ano, melhorando a saúde mental e o clima entre as equipes.\n​Orgulho de Pertencer: O colaborador passa a ser um promotor da marca BBTS dentro e fora de casa.\n​Para a Empresa (BBTS):\n​Retenção de Talentos (Redução de Turnover): Profissionais que sentem que suas famílias são valorizadas criam um vínculo de lealdade muito maior com a empresa, dificultando a perda de talentos para a concorrência.\n​Atração de Novos Talentos (Employer Branding): O compartilhamento espontâneo das famílias nas redes sociais (fotos dos kits, vídeos personalizados da IA e relatos de gratidão) gera uma publicidade orgânica e positiva, posicionando a BBTS no mercado de tecnologia como uma empresa altamente humanizada.\n​Aumento de Produtividade: Um time motivado e com o clima organizacional elevado entrega melhores resultados na ponta final de serviços e tecnologia.\n​Para os Familiares (Filhos e Netos):\n​Experiência Marcante: O recebimento de um presente de alto padrão, combinado com uma experiência tecnológica (como o vídeo personalizado do Papai Noel), cria memórias afetivas duradouras sobre o local onde seus pais/avós trabalham.\n​Estímulo ao Desenvolvimento: Dependendo do catálogo de presentes (focado em jogos educativos, Lego, livros, etc.), fomenta o aprendizado e a criatividade das crianças na primeira infância.", "diferencial": "​1. Uso de Tecnologia para Conexão Emocional (Hiperpersonalização):\nEm vez de uma mensagem padrão de fim de ano enviada por e-mail, utilizaremos Inteligência Artificial generativa (de vídeo e voz) integrada a uma plataforma interna. O colaborador cadastrará o nome da criança e uma conquista real dela no ano (ex: \"passou de ano\", \"apendeu a andar de bicicleta\"). A criança receberá no WhatsApp um vídeo personalizado do Papai Noel da BBTS conversando diretamente com ela. Isso eleva o projeto do nív", "indicadores": "Futuro", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 3, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 3, "FAC": 1, "total": 14.0, "rank": 194}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 3, "FAC": 1, "total": 15.72, "rank": 184}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 3, "FAC": 2, "total": 11.68, "rank": 208}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 3, "FAC": 1, "total": 16.04, "rank": 185}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 3, "FAC": 1, "total": 18.0, "rank": 179}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 3, "FAC": 1, "total": 15.92, "rank": 182}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 11.46, "rank": 218}}}, {"id": 246, "titulo": "Painel Executivo de Governança Digital", "autor": "Paulo Luciano Goncalves da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GERED", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A proposta consiste na criação do Painel Executivo de Governança Digital, uma plataforma integrada que consolida indicadores de segurança, eficiência e conformidade em tempo real.\nO sistema utilizará IA analítica, automação inteligente e integração multiCloud para monitorar riscos, auditorias e desempenho operacional, garantindo aderência contínua à LGPD e ISO 27001.\nO painel será o núcleo estratégico do ecossistema CyberBBTS, recebendo dados do CyberShield, CyberTrust e CyberOps, e oferecendo aos gestores públicos uma visão unificada e transparente da governança digital da BBTS.", "ben": "A implementação do Painel Executivo de Governança Digital permitirá à BBTS consolidar dados de segurança, eficiência e conformidade em um ambiente único e inteligente.\nCom integração ao CyberShield, CyberTrust e CyberOps, o painel garantirá aderência contínua à LGPD e ISO 27001, transparência institucional e agilidade na tomada de decisão.\nOs gestores públicos terão acesso a indicadores em tempo real, fortalecendo a governança e a confiança digital.\nOs colaboradores e parceiros ganharão eficiência operacional e redução de riscos.\nOs clientes e usuários se beneficiarão de maior proteção de dados e serviços mais confiáveis.\nEm escala nacional, o projeto posiciona a BBTS como referência em governança digital pública e inovação tecnológica.", "diferencial": "O Painel Executivo de Governança Digital integra IA, automação e blockchain para monitorar segurança e conformidade em tempo real, garantindo aderência à LGPD e ISO 27001.\nDiferente dos sistemas atuais, oferece governança proativa, transparente e inteligente.", "indicadores": "Indicadores: aderência à LGPD e ISO 27001, tempo médio de resposta a incidentes, eficiência operacional das equipes e satisfação dos gestores com transparência e governança digital.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"] úmulo em poucas pessoas;\n* sensação maior de valorização.\n\n⸻\n\nSensação de cuidado real\n\nO colaborador percebe que a empresa:\n\n* monitora riscos humanos;\n* atua preventivamente;\n* não espera o problema explodir.\n\nIsso melhora:\n\n* engajamento;\n* confiança;\n* clima organizacional.\n\n⸻\n\n1. Benefícios para gestores\n\nVisão em tempo real da saúde operacional\n\nHoje muitos gestores descobrem problemas tarde demais.\n\nCom o sistema:\n\n* conseguem agir preventivamente;\n* enxergam gargalos;\n* antecipam crises.\n\n⸻\n\nDecisão baseada em dados\n\nEm vez de percepção subjetiva:\n\n* a IA mostra indicadores reais;\n* tendência de sobrecarga;\n* risco operacional.\n\n⸻\n\nMelhor gestão das equipes\n\nO gestor consegue:\n\n* redistribuir demandas;\n* reforçar áreas críticas;\n* priorizar recursos.\n\n⸻\n\n1. Benefícios para a BBTS\n\nRedução de afastamentos\n\nBurnout e estresse geram:\n\n* absenteísmo;\n* afastamentos;\n* perda de produtividade.\n\nA prevenção reduz isso.\n\n⸻\n\nAumento de produtividade\n\nEquipes menos sobrecarregadas:\n\n* erram menos;\n* produzem melhor;\n* resolvem mais rápido.\n\n⸻\n\nMenos falhas operacionais\n\nSobrecarga aumenta:\n\n* erros;\n* retrabalho;\n* incidentes.\n\nA IA ajuda a reduzir risco operacional.\n\n⸻\n\nRetenção de talentos\n\nAmbientes mais saudáveis:\n\n* reduzem turnover;\n* preservam conhecimento técnico;\n* evitam perda de profissionais estratégicos.\n\n⸻\n\nFortalecimento da imagem institucional\n\nA BBTS passa a ser vista como:\n\n* empresa inovadora;\n* humana;\n* tecnológica;\n* alinhada a ESG/ASG.\n\n⸻\n\n1. Benefícios para os clientes\n\nEsse é um ponto MUITO importante:\nMesmo sendo uma solução interna, o cliente também ganha.\n\nServiços mais estáveis\n\nEquipes equilibradas entregam:\n\n* menos erros;\n* menos indisponibilidade;\n* atendimento melhor.\n\n⸻\n\nMaior continuidade operacional\n\nMenos sobrecarga significa:\n\n* menos falhas críticas;\n* mais estabilidade nos serviços bancários.\n\n⸻\n\nAtendimento mais eficiente\n\nFuncionários menos esgotados:\n\n* resolvem problemas mais rápido;\n* atendem melhor;\n* cometem menos falhas.\n\n⸻\n\nAmbiente mais previsível\n\nOperações equilibradas:\n\n* reduzem incidentes;\n* melhoram planejamento;\n* aumentam eficiência conjunta.\n\n⸻\n\nO maior benefício estratégico\n\nA ideia cria uma mudança cultural:\n\nsair do modelo reativo para o preventivo.\n\nHoje as empresas normalmente:\n\n* tratam o problema depois;\n* lidam com afastamentos depois;\n* apagam incêndio.\n\nEssa ideia propõe:\n\nprever antes.", "diferencial": "O grande diferencial da ideia não é apenas “monitorar bem-estar”.\nIsso algumas empresas já fazem.\n\nO que torna ela forte e inovadora é a forma como conecta:\n\n* IA preditiva;\n* operação crítica;\n* people analytics;\n* continuidade operacional;\n* prevenção de risco humano.\n\nAí sim ela fica diferente do mercado comum.", "indicadores": "Critérios claros de sucesso  Sucesso operacional: * redução de incidentes; * redução do TMR; * melhoria de SLA; * menos retrabalho. Sucesso humano: * menos afastamentos; * redução do absenteísmo; * melhora do clima; * menor turnover. Sucesso estratégico: * maior previsibilidade operacional; * melhor distribuição de carga; * prevenção de crises; * fortalecimento ESG. Exemplos de metas realistas.  pode usar números estimados como exemplo:  Em 6 meses:  * reduzir 15% das horas extras críticas; * reduzir 10% do retrabalho; * melhorar 8% o SLA;", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 84}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.62, "rank": 77}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.12, "rank": 115}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.84, "rank": 81}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 69}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.5, "rank": 70}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.96, "rank": 120}}}, {"id": 250, "titulo": "Plataforma de Gestão e Inteligência para Correspondentes Bancários (COBAN)", "autor": "Rhuandry de Oliveira", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "DITES/GEAPE UOR 3000005503", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolver uma plataforma web integrada de gestão para correspondentes bancários (COBAN), que centralize operações, clientes, financeiro e atendimento em um único ambiente digital.\nA solução permitirá:\n\nPadronizar processos\nOrganizar a carteira de clientes\nAutomatizar alertas, cobranças e controles\nDisponibilizar indicadores de performance em tempo real\nOferecer suporte inteligente por meio de IA\n\n\nA proposta é transformar uma operação hoje fragmentada em um sistema único, inteligente e orientado a dados, trazendo mais controle, eficiência e previsibilidade para a BBTS e toda a rede de correspondentes.", "ben": "A implementação da proposta traz ganhos claros e imediatos para todo o ecossistema:\n\nPara a BBTS:\nMaior controle, governança e visibilidade da operação, com redução de riscos e aumento da eficiência na gestão da rede.\n\nPara os Correspondentes (COBAN):\nMais organização, produtividade e autonomia, com ferramentas que facilitam a gestão da carteira, aumentam as vendas e reduzem a inadimplência.\n\nPara os clientes finais:\nAtendimento mais proativo, ágil e eficiente, com melhor acompanhamento de suas operações.\n\nPara o negócio como um todo:\nPadronização dos processos, uso inteligente de dados e escalabilidade sustentável da operação.\n\nO resultado é uma operação mais eficiente, previsível e orientada a resultados, gerando valor para todos os envolvidos.", "diferencial": "Diferente das soluções atuais, a proposta integra gestão, automação e IA em uma única plataforma, substituindo controles manuais. Vai além do ERP, tornando a operação dos correspondentes mais inteligente, padronizada e orientada a dados.", "indicadores": "Redução da inadimplência da carteira,  aumento da produção por correspondente,  tempo médio de resposta a demandas,  taxa de conversão de clientes,  engajamento dos usuários na plataforma", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.0, "rank": 85}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.32, "rank": 92}, "joao": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 3, "total": 14.92, "rank": 84}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.16, "rank": 65}, "laine": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.4, "rank": 127}, "dani": {"REL": 2, "INO": 4, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.7, "rank": 107}, "manoel": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.76, "rank": 85}}}, {"i iciente naquilo que faço, evitando novas necessidades de deslocamentos;\n- confiabilidade - umas das possibilidades, já que a proposta é restringir os acessos somente a conteúdos BBTS, seria o de manter GPS 100% do tempo ligado, e, consequentemente, ser esse o catalisador de dados de deslocamentos, acompanhamento e medição de outras despesas como uso de combustível, pedidos de passagens de transportes públicos e etc.;\n- saúde - telas maiores são melhores para visão, e isso impacta diretamente na saúde de nossos funcionários;\n- melhora da vida útil de aparelhos - se eu gasto menos horas manipulando o celular, terei maior durabilidade de bateria, e equipamento, já que tendo celular + tablet, me permite distribuir as funções de cada um, e fazer melhor gestão do recurso;", "diferencial": "Não existem tablets como solução na área técnica (campo).\nAtualmente o uso está restrito a alta gestão e estoques. Ampliar essa aplicação, seria favorável por todos os cenários já expostos.", "indicadores": "Pesquisas de satisfação, e acompanhamento e medição da melhora das respostas e qualidade de informações (erros no SIIGO, por exemplo, acompanhar o desempenho), melhor aplicabilidade de normas e procedimentos e acesso a procedimentos operacionais (BIT, Portal Agir, Afrânio).", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 140}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.02, "rank": 115}, "joao": {"REL": 1, "INO": 4, "DES": 5, "VI io e assegura a rastreabilidade dos itens, impedindo a finalização de ordens de serviço quando existirem peças vinculadas ainda em posse do técnico (na maleta) sem definição de uso, pois hoje o técnico em campo consegue fechar o chamado ou O.S. sem aplicar as peças solicitadas e em sua guarda, devolvendo em alguns caso as peças como ruins que foram para ele como boas e não utilizadas no referente chamado.", "indicadores": "CONTROLE DE ENTRADA DE NFE, RETORNO DE APLICAÇÕES, RASTREABILIDADE DOS ITENS, PEÇAS SEM DEFINIÇÃO DE USO...", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 16.0, "rank": 141}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 17.02, "rank": 116}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 13.28, "rank": 168}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 17.84, "rank": 151}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 19.4, "rank": 128}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 17.7, "rank": 108}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.26, "rank": 172}}}, {"id": 260, "titulo": "Projeto GENOMA BBTS – Plataforma Agro Digital de Seguros e Geoprocessamento", "autor": "Tatiana Coelho da Fonseca", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CESEC -Goiânia", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A BBTS apresenta uma plataforma digital integrada que reúne, em um único ambiente, seguros para equipamentos, serviços com drones, monitoramento por geoprocessamento e conexão com parceiros do agronegócio, atendendo empresas, condomínios de alto padrão e produtores rurais; por meio dessa solução, os usuários poderão contratar seguros, solicitar mapeamento aéreo e adquirir equipamentos diretamente na plataforma, enquanto a BBTS conecta clientes, técnicos e parceiros, permitindo uma análise de riscos mais precisa, maior eficiência operacional e melhor tomada de decisão baseada em dados. 4. Público-Alvo: Empresas de médio e grande porte, Condomínios residenciais de alto padrão, Produtores rurais e grandes fazendas, Empresas do agronegócio,Prestadores de serviços técnicos e operacionais", "ben": "A implementação da plataforma permitirá à BBTS transformar a gestão de riscos e sustentabilidade no Brasil, integrando seguros digitais, geoprocessamento com drones e análise inteligente de dados, gerando valor para empresas, profissionais e a sociedade.", "diferencial": "O diferencial da ideia está na integração de soluções que hoje funcionam separadamente. A proposta une seguros digitais, uso de drones para geoprocessamento e sustentabilidade em uma única plataforma, permitindo análise de riscos em tempo real. Além disso, cria um modelo inovador ao conectar empresas, técnicos e seguradoras, utilizando dados coletados em campo para tornar os seguros mais inteligentes, preventivos e personalizados.", "indicadores": "O sucesso será medido pelo crescimento da plataforma, pela satisfação dos usuários e pela capacidade de gerar valor por meio da redução de riscos, inovação tecnológica e sustentabilidade.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente
