ransparência. Dessa forma, a BBTS evolui para um modelo mais avançado.", "ben": "A implementação da solução proporcionará a otimização na busca de fornecedores, tornando o processo mais ágil, padronizado e eficiente. Haverá maior transparência e rastreabilidade em nível nacional, com acesso ao histórico de desempenho, qualidade dos serviços prestados e produtos adquiridos.\nAdicionalmente, a iniciativa trará ganhos relevantes como: redução do tempo de contratação, diminuição de retrabalho, aumento da assertividade na escolha de fornecedores, mitigação de riscos operacionais e melhoria na qualidade das entregas. Também permitirá decisões mais estratégicas, baseadas em dados reais, além de fortalecer a governança e possibilitar a criação de um modelo estruturado de gestão de fornecedores.", "diferencial": "O que torna essa ideia diferente não é o portal em si, mas a transformação do modelo, que deixa de ser descentralizado para se tornar centralizado, abandona a subjetividade em favor de decisões orientadas por dados, evolui de um enfoque puramente operacional para uma abordagem estratégica e substitui o conhecimento individual disperso por uma inteligência corporativa estruturada e compartilhada.", "indicadores": "O sucesso será comprovado quando o processo deixar de depender de esforço individual e passar a ser rápido, padronizado, baseado em dados e amplamente utilizado, com impacto claro em tempo, custo e qualidade.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 142}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 134}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": os.\n\nOs desafios relacionados à descentralização das demandas, à multiplicidade de soluções e à ausência de padronização já fazem parte da realidade operacional da companhia, impactando diretamente custos, produtividade, governança", "indicadores": "Indicadores: percentual de aderência aos padrões; redução de soluções fora da arquitetura homologada; reutilização de componentes compartilhados. Ganho de Eficiência Operacional  O sucesso será evidenciado pela melhoria dos fluxos operacionais e redução de desperdícios.  Indicadores: redução do tempo médio de atendimento; redução do retrabalho; redução do backlog; aumento da produtividade das equipes; redução do tempo de desenvolvimento e manutenção. Redução de Custos  A plataforma deverá contribuir para otimização dos recursos tecnológicos e operacionais.  Indicadores: redução de custos com m", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.0, "rank": 9}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.32, "rank": 5}, "joao": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 18.32, "rank": 10}, "rafael": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 21.24, "rank": 9}, "laine": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 22.0, "rank": 4}, "dani": {"REL": 4, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 21.5, "rank": 4}, "manoel": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.36, "rank": 6}}}, {"id" os e transformá-los em ambientes acolhedores através de design criativo, mobiliário básico de descanso (como pufes e poltronas), iluminação suave e elementos visuais que carreguem a essência e a identidade da empresa, sem a necessidade de reformas complexas.", "ben": "1. Clima Organizacional e GPTW: Melhora a percepção de cuidado da empresa com a saúde mental e o bem-estar dos colaboradores.\n2. Produtividade e Foco: Pausas de qualidade ajudam a aliviar o estresse, reduzindo a fadiga mental e aumentando a concentração no retorno às atividades técnicas.\n3. Custo-Benefício: Entrega um espaço de alto valor perceptivo para a equipe com um investimento financeiro mínimo (baixo custo de implantação).\n4. Integração: Estimula a socialização saudável e a troca de experiências entre os colaboradores durante os momentos de pausa.\n\n5. Descanso de Telas: No lugar teria a opção de descanso de telas com espaço para de troca de livros.", "diferencial": "O diferencial está na padronização de baixo custo aplicada à realidade de todas as nossas localidades. Em vez de reformas complexas e caras, inovamos na simplificação: usamos o design criativo, o reaproveitamento de espaços ociosos e elementos visuais da essência BBTS para criar um refúgio acolhedor. Isso descentraliza o cuidado com o bem-estar, garantindo que todo colaborador, independente do tamanho de sua base, tenha o mesmo acolhimento.", "indicadores": "Pesquisa de Clima/eNPS (Pessoas): Mensurar o impacto do espaço na satisfação e percepção de cuidado com a saúde mental dos colaboradores. Índice de Absenteísmo (Saúde): Monitorar a médio prazo se a redução do estresse diário reflete na diminuição de afastamentos. Custo de Implantação por Unidade (Financeiro): Avaliar a eficiência do orçamento utilizado para garantir o conceito de baixo custo. Critério de Sucesso: Implementar projeto-piloto em 3 unidades mantendo o orçamento abaixo do estimado, com taxa de utilização diária frequente e aprovação superior a 90% na pesquisa de rcado.", "ben": "A implementação da ideia proporcionará a criação de uma fonte contínua e estruturada de inovação, garantindo a geração de ideias com maior qualidade e aderência às necessidades do mercado. Como resultado, será possível promover a evolução das tecnologias já existentes, além de viabilizar o desenvolvimento e lançamento de novos produtos e soluções inovadoras. Os principais benefícios incluem o aumento da competitividade da BBTS, maior agilidade na adaptação às mudanças tecnológicas, fortalecimento do relacionamento com clientes e parceiros, e a consolidação da empresa como um agente relevante (Universidade) no ecossistema de inovação tecnológica.\nBENEFÍCIOS PARA O BANCO DO BRASIL (PATROCINADOR)\nAquisição de Clientes Futuros\nAcesso direto a estudantes de alto potencial\nFormação de relacionamento desde a universidade\nExpansão de Produtos Financeiros\nFortalecimento do programa de contas universitárias\nAmpliação para:\nContas para jovens e adolescentes (a partir de 8 anos)\nEducação financeira integrada ao programa\n Marketing e Posicionamento\nBranding forte dentro das universidades\nAssociação com inovação, tecnologia e futuro\nAlto impacto reputacional\n Ecossistema de Inovação", "diferencial": "Integração entre BB, BBTS e academia\nGeração de soluções que podem ser incorporadas ao banco\nAs iniciativas se complementam:\nBBTS Experience → gera talentos, novos produtos, inovação\nBanco do Brasil → monetiza relacionamento e amplia base de clientes", "indicadores": "Com a captação de inovação e ou talentos para companhia.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 1, "total": 15.0, "rank": 178}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 16.42, "rank": 164}, "joao": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 2, "total": 12.68, "rank": 190}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 17.36, "rank": 169}, "laine": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 1, "total": 18.4, "rank": 174}, "dani": {"REL": 2, "INO": 4, "DES": 5, "VIA": 4, "FAC": 1, "total": 16.7, "rank": 169}, "manoel": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 12.86, "rank": 188}}}, {"id": 268, "titulo": "PRODIVERSE+ REAL | Governança da Inclusão com Evidência e Accountability", "autor": "Erivan Lopes Alves", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Cesec", "arena": "Eficiência Operacional e Automação", "trl": "4", "trl_fase": "Desenvolvimento de Protótipos (TRL 4–6) — Testes em ambiente controlado/simulado", "sol": "Implementar o PRODIVERSE+ REAL, uma camada de governança que valida e garante a efetividade da inclusão na prática, baseada em quatro pilares:\n• Índice de Inclusão Real (IIR): mede a experiência de PCD e 60+ (participação, crescimento e satisfação)\n• Auditoria contínua: verifica se as políticas estão sendo aplicadas no dia a dia\n• Painel de transparência: disponibiliza indicadores por área (participação, promoções e solicitações)\n• Feedback invertido: avaliação da liderança por PCD e 60+, com impacto na gestão\nComplementarmente, prevê análise individual e revisão de decisões para garantir maior equidade e coerência nas práticas de inclusão.", "ben": "Fortalecimento da inclusão real no ambiente de trabalho, garantindo maior equidade e justiça organizacional\nAumento do engajamento e satisfação de PCD e colaboradores 60+\nMelhor aproveitamento de talentos internos em projetos e oportunidades estratégicas\nRedução de riscos jurídicos, reputacionais e de conformidade relacionados à inclusão\nMaior transparência e consistência nas decisões organizacionais\nMelhoria da eficiência operacional, com processos mais claros e padronizados\nFortalecimento da governança ESG e sustentação prática dos selos e reconhecimentos institucionais\nAlinhamento entre discurso institucional e prática, aumentando a credibilidade interna e externa", "diferencial": "Os modelos atuais focam em diretrizes e conformidade. A proposta mede a inclusão pela experiência real, amplia a transparência e vincula resultados à liderança, transformando inclusão declarada em prática monitorada e efetiva.", "indicadores": "Índice de Inclusão Real (IIR) por diretoria % de PCD e 60+ em projetos estratégicos Taxa de promoção desses públicos Índice de satisfação (pesquisa interna segmentada) Taxa de solicitações de adaptação aprovadas x negadas Tempo médio de resposta às solicitações Avaliação da liderança (feedback invertido) Gap entre inclusão percebida e indicadores institucionais", "ganhos": "Ganhos de segurança / conformidade / redução de risco", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 3}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 3, "total": 17.0, "rank": 88}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 17.22, "rank": 105}, "joao": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 4, "total": 15.92, "rank": 38}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 3, "total": 19.16, "rank": 66}, "laine": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 3, "total": 19.2, "rank": 137}, "dani": {"REL": 2, "INO": 4, "DES": 4, "VIA": 5, "FAC": 3, "total": 17.12, "rank": 141}, "manoel": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 3, "total": 15.56, "rank": 43}}}, {"id": 269, "titulo": "BBTS Fiscaliza", "autor": "Aline Ladislau da Silva", "empresa": "BB Tecnologia e Servicos S.A.", "uo": "3000003141", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Criação do ecossistema \"BBTS Fiscaliza\", uma plataforma de gestão e validação documental autônoma. \nO sistema atua de forma offline: os fornecedores carregam os arquivos brutos gerados para o governo (XMLs do e-Social e guias do FGTS Digital). A plataforma decodifica essas obrigações e cruza automaticamente os dados com as planilhas de custos e do cadastro dos postos no SGPS. A solução emitirá pré-notificações automáticas em caso de divergência, e o fiscal administrativo passará a atuar 100% por exceção, analisando apenas os casos sinalizados com erro, acelerando o fluxo de avaliação da documentação fiscal e trabalhista e o fluxo de liberação financeira dos saldos das contas de provisionamento.", "ben": "Para a Empresa (BBTS): Mitigação drástica de riscos trabalhistas por meio da varredura integral (100%) da massa documental, redução de custos operacionais e liberação da equipe para atuação analítica.  \n\nPara os Parceiros/Fornecedores: Redução drástica no tempo de liberação dos saldos das contas de provisionamento, destravando o fluxo financeiro com agilidade e transparência.  \n\nPara o Mercado: Criação de um ativo de software (produto SaaS) rentável que a BBTS poderá oferecer a outras estatais e órgãos públicos que sofrem com o mesmo problema.", "diferencial": "O mercado público hoje atua com base na força bruta: contratam-se consultorias milionárias para colocar humanos para ler papéis (ex: Petrobras gasta R$ 18,6 milhões nesse formato). O diferencial do BBTS Fiscaliza é a independência tecnológica. Não precisamos criar integrações (APIs) complexas e instáveis com os sistemas do governo. A nossa inteligência atua de forma \"offline\", ingerindo e cruzando os layouts padronizados (XMLs) que o fornecedor já é obrigado a gerar para a Receita Federal.", "indicadores": "Cobertura: Quantidade (e % de aumento) de funcionários com documentação fiscalizada na competência.  Tempo de Análise: Redução do Tempo Médio de Atendimento (TMA) na liberação do saldo das contas de provisionamento.  Otimização: Quantidade de horas/FTEs liberados das atividades de conferência manual para tarefas estratégicas.  Conformidade: Índice de gestão e acompanhamento tempestivo da documentação recebida.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 59}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 62}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 64}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 55}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 52}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 56}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 70}}}, {"id": 270, "titulo": "SIGO Inteligente: Inventário Sem Toque em Agências", "autor": "Hausbleno Moreira Porto", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT SP", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A solução consiste em evoluir o aplicativo SIGO para realizar capturas automáticas por aproximação, eliminando a digitação manual e a necessidade de contato visual com os equipamentos de segurança eletrônica nas agências. Para resolver o problema de forma simples, barata e escalável, utilizaremos uma Estratégia Híbrida de Identificação: Etiquetas Inteligentes 2 em 1: Substituiremos as plaquetas tradicionais por adesivos híbridos, que possuem um QR Code impresso por fora e um microchip de rádio (RFID) embutido por dentro.", "ben": "A implementação das Etiquetas Híbridas (QR Code + RFID) integradas ao aplicativo SIGO gerará impactos positivos significativos para todos os envolvidos na operação: Ganho de Produtividade Comercial: Segurança Operacional Reforçada: Aumento drástico da Eficiência Logística: Confiabilidade Absoluta de Dados.", "diferencial": "O grande diferencial desta proposta não é a tecnologia em si, mas a sua aplicação estratégica no contexto de segurança máxima bancária e a simplificação drástica do processo.\nA Abordagem Híbrida de Baixo Custo (QR Code + RFID), O Conceito de \"Inventário por Barreira\" (Sem Toque e Sem Visão),Foco na Produtividade do Cliente Final (BB).", "indicadores": "Tempo Médio de Inventário por Agência (TMI), Taxa de Produtividade Logística do Técnico (TPL),Índice de Acidentes e Incidentes em Altura (IA), Acurácia da Base SIGO (ABS): Mede o percentual de divergências ou erros de digitação de números de série identificados após o inventário.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 146}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 136}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 146}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 135}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 109}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 127}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 157}}}, {"id": 271, "titulo": "BBTS SmartCalc", "autor": "Aline Ladislau da Silva", "empresa": "BB Tecnologia e Servicos S.A.", "uo": "3000003141", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Criação do sistema \"BBTS SmartCalc\", uma plataforma focada na gestão inteligente e integrada de atualizações de custos. Em vez de preencher planilhas avulsas, o fornecedor utiliza o portal estruturado, que vincula, item a item, os custos aos respectivos atos normativos. A plataforma permitirá o acompanhamento das datas-bases, facilitando a aplicação de reajustes sistêmicos, inclusive para múltiplos postos simultaneamente. O sistema gera os ofícios automaticamente e, após a validação das regras de negócio pela Dicof, exporta a base tratada diretamente para os sistemas de cálculo de retroativos, conectando o pedido do fornecedor à cobrança do cliente final de forma ágil e rastreável.", "ben": "Para a Empresa (BBTS): Elevação da maturidade da gestão de contratos. A Dicof substitui a auditoria manual de planilhas por um painel de controle preditivo, permitindo orquestrar os calendários de reajustes de forma sistêmica. Isso otimiza o tempo da equipe e blinda a integridade matemática e legal dos cálculos.\n\nPara os Fornecedores: Maior clareza e fluidez no processo. O portal com regras estruturadas elimina o vai-e-vem de correções de planilhas, garantindo validações mais rápidas e previsibilidade nos repasses.\n\nPara os Clientes da BBTS: Aceleração do ciclo do negócio. A otimização e automação da base de cálculos permite que a BBTS solicite e aplique as repactuações junto aos seus clientes finais com muito mais velocidade, segurança documental e transparência.", "diferencial": "O diferencial é a simplificação do processo por uma abordagem inédita: evoluir de um modelo reativo para um ecossistema preditivo. Em vez de corrigir falhas em planilhas Excel, a BBTS dita a estrutura dos dados na origem via portal inteligente. Essa aplicação tecnológica gera alta eficiência operacional e expressiva redução de custos. A solução automatiza calendários sindicais e conecta o fornecedor direto ao faturamento do cliente, garantindo agilidade e governança.", "indicadores": "1. Tempo de Ciclo (SLA de Apuração): Redução do tempo médio desde o gatilho da repactuação (ou envio pelo fornecedor) até a validação final do novo custo. 2. First Time Yield (Qualidade na Origem): Redução drástica da taxa de devolução de processos por quebra de fórmulas ou ausência de normativos. 3. SLA de Repasse ao Cliente Final: Redução do tempo de trânsito entre a atualização do custo interno da BBTS e a efetiva cobrança da repactuação junto aos nossos clientes. 4. Otimização de FTEs: Quantidade de horas analíticas da equipe liberadas da conferência manual de planilhas.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 60}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 63}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 65}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 56}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 53}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 57}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 71}}}, {"id": 272, "titulo": "Plataforma Digital de Inclusão e Engajamento Social para o Banco do Brasil", "autor": "Hausbleno Moreira Porto", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT SP", "arena": "Negócios Digitais Escaláveis", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A solução consiste em desenvolver uma plataforma digital integrada, customizada para o Banco do Brasil, que promova diversidade, inclusão e engajamento social. Essa plataforma reunirá módulos para capacitação e educação, marketplace de produtos e serviços inclusivos, ferramentas de suporte e bem-estar, além de funcionalidades para eventos e reconhecimento de práticas inclusivas. A plataforma será acessível via web e app, com interface segura e intuitiva, permitindo que colaboradores, clientes e parceiros participem ativamente, gerando valor social e econômico. A BBTS será responsável pelo desenvolvimento, operação e comercialização da plataforma, criando novas fontes de receita por meio de assinaturas, comissões, cursos e eventos.", "ben": "A implementação da plataforma digital de inclusão e engajamento social trará diversos benefícios para todos os envolvidos:\n\nPara o Banco do Brasil: fortalecimento das políticas de diversidade, inclusão e responsabilidade social, maior engajamento dos colaboradores e clientes, melhoria da imagem institucional e alinhamento com metas ESG.\n\nPara a BBTS: diversificação e aumento da receita por meio de serviços digitais inovadores, fortalecimento da parceria com o Banco do Brasil, posicionamento como empresa inovadora e socialmente responsável.\n\nPara os colaboradores: acesso a conteúdos educativos, capacitação, suporte especializado e um ambiente seguro para expressão e desenvolvimento pessoal e profissional.\n\nPara os clientes e parceiros: oferta de produtos e serviços inclusivos, participação em eventos e programas de apoio, além de maior conexão com as causas sociais.\n\nPara a sociedade: promoção real de inclusão, combate à discriminação e fortalecimento de uma cultura organizacional mais diversa, justa e acolhedora.", "diferencial": "Essa ideia se diferencia por integrar, em uma única plataforma digital, múltiplos aspectos da diversidade e inclusão — educação, engajamento, marketplace, suporte e eventos — de forma customizada para o Banco do Brasil, aproveitando o relacionamento e conhecimento profundo da BBTS sobre o cliente. Além disso, utiliza tecnologias avançadas como inteligência artificial para personalização do conteúdo e análise de engajamento, gamificação para incentivar práticas inclusivas e dashboards analíticos.", "indicadores": "Indicadores de Engajamento, Indicadores de Impacto Social e Inclusão,  Indicadores Financeiros e de Receita, Indicadores Operacionais.  A iniciativa será considerada bem-sucedida se:  Atingir metas pré-definidas para os indicadores de engajamento, como crescimento consistente no número de usuários ativos e participação em eventos. Demonstrar impacto positivo na cultura organizacional do Banco do Brasil, com aumento da percepção de inclusão e adoção de práticas inclusivas. Gerar receita sustentável para a BBTS, com crescimento contínuo e diversificação das fontes de receita.", "ganhos": "Ganhos financeiros (receita / novos negócios)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 147}, "alex": {"REL": 1, "INO": ência de scripts e parametrizações\nNão aprende sozinho\nAtua de forma reativa\n\nProposta (Autonomous Enterprise Platform)\n\nDecisão inteligente com IA\nAutoaprendizado contínuo\nCapacidade preditiva (antecipação de falhas)\nExecução autônoma sem intervenção humana\nIntegração ponta a ponta (infraestrutura, aplicações, processos)\n\nDiferencial principal: Sai da automação de tarefas → para automação de decisões", "indicadores": "Operacionais: MTTR (Mean Time to Repair) – tempo médio de resolução MTBF, (Mean Time Between Failures) e % de incidentes resolvidos automaticamente. Financeiros: Redução de custos operacionais, (%) Custo por transação/processo ROI da automação. Eficiência: Taxa de automação de processos, (%) Redução de intervenção humana e (%) Tempo de execução de processos. Experiência: SLA cumprido, (%) Índice de satisfação do cliente (NPS ou CSAT) e Tempo de indisponibilidade (downtime).", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 89}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.62, "rank": 78}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.12, "rank": 116}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.84, "rank": 84}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 70}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.5, "rank": 71}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.96, "rank": 121}}}, {"id": 274, "titulo": "BBTS DTO - Digital Twin Operacional, para Infraestrutura Crítica", "autor": "Denis Salgado Gomes Mattos Medina", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "3000008023", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Implementar uma plataforma de Digital Twin Operacional, que:\n\n\nReplica digitalmente ambientes físicos e tecnológicos: Agências, Data centers e Redes e ativos críticos.\n\nIntegra dados em tempo real: Sensores IoT, Sistemas de monitoramento e Logs de aplicações e segurança.\n\nSimula cenários: Falhas de infraestrutura, Ataques cibernéticos e Picos de demanda.\n\nAplica IA para análise preditiva: Identifica riscos antes de acontecerem e Recomenda ações corretivas.\n\nGera insights acionáveis: Ajustes automáticos ou assistidos e Otimização contínua da operação.", "ben": "Para a empresa (BBTS / BB): Redução de falhas e indisponibilidade, Melhor planejamento de capacidade e infraestrutura e Aumento da eficiência operacional e segurança\n\nPara as pessoas: Tomada de decisão mais assertiva baseada em simulação, Menor atuação em incidentes críticos e Maior foco em análise e estratégia.\n\nPara clientes: Serviços mais estáveis e confiáveis, Redução de indisponibilidades e Melhor experiência digital.\n\nPara parceiros: Integração mais eficiente com ambientes monitorados e Maior previsibilidade operacional.", "diferencial": "O que existe hoje: Monitoramento tradicional (APM, NOC, SOC), Ferramentas isoladas (infra, segurança, redes) e Simulações limitadas ou manuais.\n\nProposta inovadora: Integração completa: físico + digital + segurança + operação, Simulação contínua e automatizada, Uso de IA para previsão e decisão e Visão holística em tempo real.\n\nDiferencial chave: Não é só monitorar → é simular o futuro da operação antes que ele aconteça", "indicadores": "Indicadores (KPIs): Operacionais: MTTR (tempo médio de recuperação), MTBF (tempo médio entre falhas), % de incidentes previstos vs ocorridos.  Resiliência: Taxa de indisponibilidade (downtime), Tempo de detecção de incidentes, Número de eventos críticos evitados. Eficiência:  Redução de falhas operacionais, (%) Tempo de resposta a incidentes, (%) Taxa de utilização de capacidade. Segurança:  Número de ataques simulados vs mitigados, Tempo de resposta a ameaças, Redução de vulnerabilidades exploráveis. Financeiros:  Redução de custos operacionais, ROI da solução, Custo por incidente evitado.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 90}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.62, "rank": 79}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.12, "rank": 117}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.84, "rank": 85}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 71}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.5, "rank": 72}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.96, "rank": 122}}}, {"id": 275, "titulo": "UX de Acesso a Documentos Corporativos — Modernização da Experiência de Entrada ao DocNix", "autor": "Luis Guilherme Brant Oliveira", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CESID", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Modernização da página de acesso aos documentos corporativos, com foco em experiência do usuário (UX), substituindo o modelo baseado em categorias institucionais por uma navegação mais intuitiva, orientada à necessidade e de fácil utilização.\nA proposta não altera a estrutura ou governança do DocNix, atuando exclusivamente na melhoria da experiência de entrada e consumo dos documentos.", "ben": "redução do tempo para localização de documentos\nmelhoria significativa da experiência do usuário (UX)\naumento do uso do DocNix\nredução de erros de navegação\nmaior autonomia dos colaboradores\naumento da produtividade operacional\nmelhor aproveitamento dos documentos já existentes", "diferencial": "Atualmente, o acesso aos documentos é baseado em uma estrutura organizacional e categorização institucional, exigindo conhecimento prévio do sistema.\nO diferencial desta proposta é transformar a experiência de acesso, permitindo que o usuário encontre o que precisa de forma mais simples e intuitiva, sem depender da estrutura interna.\nImportante:\n\nDiferentemente de propostas focadas em inteligência artificial para consulta de documentos, esta solução atua na experiência de entrada, simplifican", "indicadores": "tempo médio para acesso aos documentos, taxa de utilização da página de entrada, redução do tempo de navegação, nível de satisfação dos usuários", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 16.0, "rank": 148}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 16.62, "rank": 156}, "joao": {"REL
