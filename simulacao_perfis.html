<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulação de Perfis — Batalha de Ideias 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root { --bg:#f8fafc; --borda:#e2e8f0; --cinza:#64748b; --txt:#1e293b; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter Tight','Segoe UI',sans-serif; background:var(--bg); color:var(--txt); font-size:16px; }

  /* Header */
  header { background:#1e293b; color:#fff; padding:12px 24px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:200; }
  header a { color:#94a3b8; text-decoration:none; font-size:0.8rem; flex-shrink:0; }
  header a:hover { color:#fff; }
  header h1 { font-size:1rem; font-weight:700; flex:1; }
  header .hbadge { margin-left:auto; font-size:0.7rem; background:#334155; padding:3px 10px; border-radius:20px; color:#94a3b8; flex-shrink:0; }

  /* Tabs */
  .tabs-bar { background:#fff; border-bottom:2px solid var(--borda); display:flex; gap:2px; padding:0 20px; overflow-x:auto; }
  .tab-btn {
    padding:10px 15px; border:none; background:transparent; cursor:pointer;
    font-family:inherit; font-size:0.8rem; font-weight:600; color:var(--cinza);
    border-bottom:3px solid transparent; margin-bottom:-2px; white-space:nowrap;
    transition:color .12s, border-color .12s;
  }
  .tab-btn:hover { color:var(--txt); }
  .tab-btn.active { color:var(--tab-c,#1e293b); border-bottom-color:var(--tab-c,#1e293b); }

  /* Profile bar */
  #profile-bar {
    background:#fff; border-bottom:1px solid var(--borda);
    padding:16px 24px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:28px;
  }
  .pb-col { display:flex; flex-direction:column; gap:4px; }
  .pb-name  { font-size:1.31rem; font-weight:700; }
  .pb-cargo { font-size:0.9rem; color:var(--cinza); }
  .pb-desc  { font-size:0.97rem; color:#475569; line-height:1.6; margin-top:8px; }
  .pb-sec-label { font-size:0.79rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--cinza); margin-bottom:7px; }
  .pb-hbars { display:flex; flex-direction:column; gap:6px; margin-bottom:6px; }
  .pb-hbar-row { display:flex; align-items:center; gap:10px; }
  .pb-hbar-label { font-size:0.95rem; font-weight:700; color:var(--txt); min-width:170px; }
  .pb-hbar-track { flex:1; background:#f1f5f9; border-radius:3px; height:9px; max-width:200px; }
  .pb-hbar-fill  { height:100%; border-radius:3px; transition:width .3s; }
  .pb-hbar-val   { font-size:0.95rem; font-weight:700; min-width:18px; text-align:right; }
  .pb-wtxt { font-size:0.74rem; color:#475569; line-height:1.5; margin-bottom:4px; }
  .pb-biases { display:flex; gap:4px; flex-wrap:wrap; }
  .pb-bias-big { font-size:1.05rem; font-weight:700; line-height:1.55; }
  .pb-bias { font-size:0.72rem; padding:3px 8px; border-radius:5px; font-weight:700; white-space:nowrap; }
  .pb-bias.pos { background:#dcfce7; color:#166534; }
  .pb-bias.neg { background:#fee2e2; color:#991b1b; }
  .pb-bias.neu { background:#f1f5f9; color:#64748b; }
  .pb-stats { display:flex; flex-direction:column; gap:8px; margin-top:2px; }
  .pb-stat-row { display:flex; align-items:center; gap:8px; }
  .pb-stat-badge { font-size:0.78rem; font-weight:700; padding:2px 9px; border-radius:20px; flex-shrink:0; min-width:26px; text-align:center; }
  .pb-stat-lbl { font-size:0.76rem; color:var(--txt); }

  /* Content */
  #content { padding:18px 24px; }

  /* Search row */
  .search-row { display:flex; gap:10px; margin-bottom:14px; align-items:center; flex-wrap:wrap; }
  .search-input {
    padding:7px 12px; border:1px solid var(--borda); border-radius:8px;
    font-family:inherit; font-size:0.82rem; width:260px; background:#fff;
  }
  .search-input:focus { outline:none; border-color:#94a3b8; }
  .stats-lbl { font-size:0.74rem; color:var(--cinza); }

  /* ── Filtros padronizados ── */
  .filters {
    display: flex; gap: 10px; padding: 12px 24px;
    flex-wrap: wrap; align-items: flex-end; background: #fff;
    border-bottom: 1px solid var(--borda);
  }
  .f-group {
    flex: 1 1 0; min-width: 140px; max-width: 210px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .f-group.wide { flex: 2 1 0; max-width: 310px; }
  .f-group > label {
    font-size: 0.68rem; color: #64748b; font-weight: 500; white-space: nowrap;
  }
  .f-group > select,
  .f-group > input {
    width: 100%; height: 34px; padding: 5px 8px;
    border: 1px solid var(--borda); border-radius: 6px;
    font-size: 0.78rem; background: #fff; outline: none; color: var(--txt);
    font-family: inherit;
  }
  .f-group > select:focus,
  .f-group > input:focus { border-color: #4361ee; }
  .f-clear {
    height: 34px; padding: 5px 14px; background: #4361ee; color: #fff;
    border: none; border-radius: 6px; font-size: 0.78rem; font-family: inherit;
    cursor: pointer; align-self: flex-end; flex-shrink: 0;
  }
  .f-clear:hover { background: #3451d1; }
  .f-stats {
    font-size: 0.7rem; color: var(--cinza); align-self: flex-end;
    padding-bottom: 6px; white-space: nowrap;
  }

  /* Sort controls (comparison) */
  .sort-btns { display:flex; gap:6px; margin-bottom:12px; }
  .sort-btn {
    padding:5px 11px; border:1px solid var(--borda); border-radius:6px;
    background:#fff; cursor:pointer; font-family:inherit; font-size:0.73rem; font-weight:600; color:var(--cinza);
  }
  .sort-btn.active { background:#1e293b; color:#fff; border-color:#1e293b; }

  /* Table */
  .tbl-wrap { overflow-x:auto; border-radius:10px; border:1px solid var(--borda); background:#fff; }
  table { width:100%; border-collapse:collapse; }
  thead th {
    background:#f8fafc; padding:8px 10px; text-align:left;
    font-size:0.7rem; font-weight:700; color:var(--cinza);
    text-transform:uppercase; letter-spacing:.4px;
    border-bottom:1px solid var(--borda); white-space:nowrap;
  }
  thead th.c { text-align:center; }
  tbody tr { border-bottom:1px solid #f1f5f9; cursor:pointer; transition:background .1s; }
  tbody tr:hover { background:#f8fafc; }
  tbody tr:last-child { border-bottom:none; }
  tbody td { padding:8px 10px; font-size:0.82rem; vertical-align:middle; }
  tbody td.c { text-align:center; }

  /* Rank */
  .rk { font-size:0.9rem; font-weight:700; color:var(--cinza); }
  .rk.gold { color:#d97706; }
  .rk.silver { color:#64748b; }

  /* Delta */
  .delta { font-size:0.72rem; font-weight:700; padding:2px 5px; border-radius:4px; white-space:nowrap; display:inline-block; }
  .delta.up   { color:#166534; background:#dcfce7; }
  .delta.down { color:#991b1b; background:#fee2e2; }
  .delta.zero { color:#64748b; background:#f1f5f9; }

  /* Title cell */
  .t-title { font-weight:600; font-size:0.9rem; line-height:1.3; }
  .t-autor  { font-size:0.68rem; color:var(--cinza); margin-top:2px; }

  /* Arena chip */
  .arena-chip { font-size:0.65rem; padding:2px 7px; border-radius:10px; background:#e8f0fe; color:#1e3a8a; font-weight:600; white-space:nowrap; }

  /* Score cell */
  .sc { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:5px; font-size:0.75rem; font-weight:700; color:#fff; }
  .sc-1 { background:#ef4444; }
  .sc-2 { background:#f97316; }
  .sc-3 { background:#eab308; color:#78350f; }
  .sc-4 { background:#84cc16; color:#1a2e05; }
  .sc-5 { background:#22c55e; color:#052e16; }

  /* Total */
  .total-cell { font-size:0.88rem; font-weight:700; }

  /* Aderência mini dots */
  .ader-dots { display:flex; gap:2px; flex-wrap:wrap; margin-top:4px; max-width:88px; }
  .ader-dot  { width:7px; height:7px; border-radius:2px; flex-shrink:0; }
  .ader-dot.ok   { background:#22c55e; }
  .ader-dot.fail { background:#ef4444; }
  .ader-dot.na   { background:#cbd5e1; }
  .ader-badge { font-size:0.62rem; font-weight:700; padding:1px 5px; border-radius:4px; display:inline-block; margin-top:3px; }
  .ader-badge.ok { background:#dcfce7; color:#166534; }
  .ader-badge.parc { background:#fef9c3; color:#854d0e; }

  /* C-dot legend in modal */
  .crit-grid { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .crit-item { display:flex; align-items:center; gap:4px; font-size:0.72rem; }
  .crit-dot  { width:10px; height:10px; border-radius:2px; flex-shrink:0; }

  /* Dot plot — aba Comparação */
  .dp-intro { font-size:0.78rem; color:#475569; background:#f8fafc; padding:10px 14px; border-radius:8px; margin-bottom:16px; border:1px solid var(--borda); line-height:1.5; }
  .dp-legend { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:20px; }
  .dp-leg-item { display:flex; align-items:center; gap:5px; font-size:0.72rem; color:var(--cinza); }
  .dp-leg-dot  { width:24px; height:24px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#fff; }
  .dp-section  { margin-bottom:32px; }
  .dp-section-hd { border-left:4px solid; padding:4px 0 4px 12px; margin-bottom:8px; display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .dp-sec-title { font-size:0.85rem; font-weight:700; }
  .dp-sec-count { font-size:0.72rem; font-weight:600; color:var(--cinza); }
  .dp-sec-desc  { font-size:0.72rem; color:var(--cinza); }
  .dp-axis-hdr  { display:grid; grid-template-columns:4fr 5fr 170px; gap:12px; padding:2px 0 6px; align-items:center; }
  .dp-axis-labels { display:flex; justify-content:space-between; font-size:0.62rem; color:#94a3b8; }
  .dp-axis-rank-hdr { font-size:0.62rem; color:#94a3b8; text-align:center; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
  .dp-row { display:grid; grid-template-columns:4fr 5fr 170px; gap:12px; padding:5px 0; border-bottom:1px solid #E1E8ED; cursor:context-menu; align-items:flex-end; }
  .dp-row:hover { background:#f8fafc; }
  .dp-label  { min-width:0; }
  .dp-ltitle { font-size:1.375rem; font-weight:700; color:var(--txt); line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dp-lautor { font-size:0.65rem; color:#94a3b8; margin-top:2px; }
  .dp-track  { position:relative; height:34px; border-radius:15px; background:linear-gradient(to right, #F5F8FA, #F2F2F2); border:1px solid #E1E8ED; }
  .dp-axis-line { position:absolute; top:50%; left:0; right:0; height:2px; background:linear-gradient(to left, #F5F8FA, #F2F2F2); }
  .dp-mid-mark  { position:absolute; left:50%; top:4px; width:1px; height:26px; background:#cbd5e1; }
  .dp-dot { position:absolute; width:26px; height:26px; border-radius:50%; top:50%; transform:translate(-50%,-50%); opacity:0.9; transition:opacity .1s, transform .1s; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#fff; line-height:1; }
  .dp-dot:hover { opacity:1; transform:translate(-50%,-50%) scale(1.3); z-index:5; }
  .dp-avgrank { text-align:center; }
  .dp-avgrank-val { font-size:0.78rem; font-weight:700; color:var(--cinza); }
  .dp-avgrank-lbl { font-size:0.6rem; color:#94a3b8; margin-bottom:4px; }
  .dp-crit-row { display:flex; gap:4px; justify-content:center; margin-top:4px; }
  .dp-crit-item { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .dp-crit-lbl  { font-size:0.55rem; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:.3px; }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:flex-start; justify-content:center; padding:24px 16px; overflow-y:auto; z-index:999; }
  .modal-overlay.hidden { display:none; }
  .modal-box { background:#fff; border-radius:14px; width:100%; max-width:780px; box-shadow:0 20px 60px rgba(0,0,0,.2); padding:28px; position:relative; margin:auto; }
  .modal-close { position:absolute; top:16px; right:16px; background:#f1f5f9; border:none; cursor:pointer; width:30px; height:30px; border-radius:50%; font-size:1rem; color:var(--cinza); display:flex; align-items:center; justify-content:center; }
  .modal-close:hover { background:#e2e8f0; }
  .m-id { font-size:0.7rem; color:var(--cinza); font-weight:600; letter-spacing:.5px; }
  .m-title { font-size:1.05rem; font-weight:700; margin:4px 0 8px; line-height:1.3; }
  .m-meta { font-size:0.76rem; color:var(--cinza); display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; }
  .m-sec-title { font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--cinza); margin-bottom:6px; }
  .m-text { font-size:0.8rem; line-height:1.55; color:var(--txt); background:#f8fafc; padding:10px 12px; border-radius:6px; }
  .m-section { margin-top:16px; }

  /* Modal base scores */
  .base-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .base-item { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .base-lbl { font-size:0.62rem; font-weight:700; color:var(--cinza); }

  /* Modal scores grid */
  .scores-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; margin-top:10px; }
  .sc-card { border:1px solid var(--borda); border-radius:8px; padding:10px 12px; }
  .sc-card-name { font-size:0.7rem; font-weight:700; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
  .sc-card-row { display:flex; justify-content:space-between; align-items:center; font-size:0.7rem; margin-bottom:2px; color:var(--cinza); }
  .sc-card-total { font-size:0.88rem; font-weight:700; text-align:right; margin-top:6px; padding-top:6px; border-top:1px solid var(--borda); }
  .rank-badge { font-size:0.65rem; font-weight:700; padding:1px 5px; border-radius:8px; background:#f1f5f9; color:var(--cinza); }

  /* Real avgs card */

.nav-icon { font-size:18px; vertical-align:middle; margin-right:4px;
  font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; }
</style>
</head>

</header>

<div class="tabs-bar" id="tabs-bar"></div>
<div id="profile-bar"></div>

<div class="filters" id="static-filters">
  <div class="f-group wide">
    <label for="q-ideia">Buscar ideia</label>
    <input type="text" id="q-ideia" placeholder="ID, título, autor...">
  </div>
  <div class="f-group">
    <label for="f-arena">Arena</label>
    <select id="f-arena"><option value="">Todas</option></select>
  </div>
  <div class="f-group">

    <label for="f-dept">Departamento (Autor)</label>
    <select id="f-dept"><option value="">Todos</option></select>
  </div>

<script>
const IDEIAS = [{"id": 35, "titulo": "Digital Twin ou Gêmeo Digital", "autor": "Leonardo Henrique Marcon de Biagi", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT BAU", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Proposta de solução (alto nível)\nA proposta consiste na criação de um Digital Twin do Controlador de Chamados, utilizando Inteligência Artificial, Machine Learning e bases RAG (Retrieval-Augmented Generation) para transformar a operação atual em um modelo inteligente, preditivo e orientado por dados.\nO sistema integrará dados já existentes (chamados, SLAs, localização de técnicos, histórico, contratos e manuais) e utilizará:\n\nRAG (bases de conhecimento) para consultar, em tempo real, contratos, manuais técnicos e regras operacionais, garantindo decisões aderentes às normas e acordos\nMachine Learning para aprender continuamente com o histórico de atendimentos, ajustando priorizações, tempos estimados e padrões de decisão\nIA para analisar cenários, simular alternativas e recomendar ações ope", "ben": "O que será melhorado com a implementação da ideia\nA implementação do Digital Twin do Controlador de Chamados trará ganhos significativos para todos os envolvidos, ao transformar decisões operacionais críticas em um processo mais inteligente, previsível e orientado por dados.\nPara a empresa (BBTS/BB):\n\nRedução de riscos operacionais e de descumprimento de SLA\nPadronização da tomada de decisão, reduzindo dependência de افراد específicos\nAumento da eficiência na distribuição de chamados e uso dos recursos\nOperação mais escalável, sustentável e resiliente\nMaior capacidade de antecipar problemas e agir preventivamente\n\nPara as pessoas (controladores e técnicos):\n\nApoio inteligente à tomada de decisão, reduzindo sobrecarga cognitiva\nMenor desgaste operacional e melhor equilíbrio na distribuição de atividades\nDirecionamento mais assertivo das ordens de serviço\nEvolução contínua baseada em aprendizado do próprio trabalho realizado\n\nPara os clientes:\n\nMaior cumprimento de SLAs e melhoria na qualidade do atendimento\nRedução no tempo de atendimento e de resolução\nComunicação mais clara e embasada sobre prazos e riscos\nAumento da confiabilidade no serviço prestado\n\nPara parceiros e operação de campo:\n\nMelhoria na roteirização e logística (menos deslocamentos desnecessários)\nMelhor aproveitamento de peças, recursos e tempo\nMaior previsibilidade das demandas e planejamento operacional\n\nGanho estrutural (o diferencial da solução):\nA criação de um fluxo de dados vivo com capacidade de simulação, previsão e recomendação permite que a operação passe de um modelo reativo para um modelo preditivo e otimizado.\nAlém disso, o modelo mantém o humano no centro do processo, garantindo segurança e qualidade:\n\nO sistema sugere\nO controlador valida\nO modelo aprende continuamente\n\nIsso resulta em uma operação mais inteligente a cada ciclo, com ganho cumulativo de eficiência, qualidade e redução de risco.", "diferencial": "O principal diferencial está na evolução do modelo atual, que hoje é altamente dependente de decisão humana isolada, para um modelo inteligente, colaborativo e orientado por dados, baseado em um Digital Twin operacional.\nDiferente das soluções tradicionais, que apenas exibem informações ou automatizam regras fixas, essa proposta:\n\n\nIntegra RAG + IA + Machine Learning de forma orquestrada\nNão é apenas consulta ou automação.", "indicadores": "% de cumprimento de SLA Tempo médio de atendimento (TMA) Tempo médio de deslocamento Taxa de retrabalho / retorno técnico Tempo de resolução no primeiro atendimento (First Time Fix Rate)", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 22}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 37}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 41}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 27}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 24}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 31}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 47}}}, {"id": 36, "titulo": "Expertise sob Demanda: Transformando Dados Técnicos em Respostas Estratégicas", "autor": "Julio Cesar Alves da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT CARIOCA", "arena": "Eficiência Operacional e Automação", "trl": "4", "trl_fase": "Desenvolvimento de Protótipos (TRL 4–6) — Testes em ambiente controlado/simulado", "sol": "Criei uma solução de IA focada em transformar nossa base de dados técnica em um assistente de campo em tempo real. O objetivo é dar ao técnico, em qualquer lugar do Brasil, uma resposta precisa sobre equipamentos específicos — de TAA Diebold a sistemas de Nobreak — sem que ele precise garimpar manuais extensos.", "ben": "Se aprovado, o próximo passo é escalar essa base e integrar novas funcionalidades para que o conhecimento da empresa esteja sempre na palma da mão de quem está na ponta.\n\nA Solução: Base de Conhecimento Inteligente\nApresento minha ferramenta não apenas como um \"chat\", mas como um Assistente Especialista.\n\nCuradoria de Dados: A IA foi alimentada com dados específicos de cada equipamento (manuais, códigos de erro, procedimentos técnicos).\n\nInterface Intuitiva: Respostas rápidas e coerentes através de linguagem natural, facilitando a consulta sob pressão no campo.", "diferencial": "O Plano Piloto (Resultados Reais)\n\nSegmentação Estratégica: Mostre que você organizou a base por verticais: DOSA, DOSI, DOCA, TAA (Diebold, Perto, OKI), PGDM, Nobreaks e Recicladoras.\n\nFeedback Positivo: Metódo foi utilizado nos grupos corporativos. \"O operacional validou a ferramenta como um facilitador de diagnóstico.\"", "indicadores": "Durante o plano piloto, segmentamos os principais contratos (como DOSA, DOCA e as Recicladoras) e o resultado nos grupos operacionais foi imediato: as consultas ficaram mais rápidas e as respostas mais assertivas.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 19.0, "rank": 10}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 18.52, "rank": 30}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 16.92, "rank": 19}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 20.44, "rank": 11}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 20.8, "rank": 21}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 19.1, "rank": 29}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 16.36, "rank": 33}}}, {"id": 37, "titulo": "Leitura por voz para comunicação interna inclusiva", "autor": "Roberta Cristina Alves Fagundes", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Diafi/Gepes/Unibbts", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Implementação de recurso de leitura por voz integrado à intranet corporativa, permitindo que os conteúdos escritos possam ser convertidos automaticamente em áudio.\nCada matéria publicada passaria a conter um botão de \"ouvir\", possibilitando que o empregado escute o conteúdo onde e quando preferir, seja no computador ou no celular. A solução seria mais uma forma de acesso à informação, respeitando diferentes ritmos, realidades e necessidades.", "ben": "- O acesso à informação será ampliado e poderá alcançar todos os perfis de empregados;\n- Pessoas com deficiência visual, dislexia, neurodivergências ou dificuldades de leitura serão alcançadas pelos conteúdos;\n- Maior possibilidade de consumir conteúdos enquanto realizam outras atividades;\n- Maior efetividade na comunicação  e aumento do engajamento nas matérias da intranet;\n- Redução de retrabalho e dúvidas decorrentes da falta de informação; \n- Fortalecimento da imagem da BBTS como empresa inclusiva e inovadora.", "diferencial": "A principal diferença é por tratar a acessibilidade como um padrão, e não como exceção. A leitura por voz não é um recurso exclusivo para um público específico, mas um recurso que pode estar disponível para todos e todas.\nA ideia é aplicar uma tecnologia já consolidada de forma simples, integrada ao cotidiano da intranet, ampliando o alcance da comunicação interna, porém, sem criar processos complexos.", "indicadores": "Percentual de matérias com recurso de áudio habilitado; número de acessos e reproduções do áudio por matéria; tempo médio de escuta dos conteúdos.", "ganhos": "Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 16.0, "rank": 104}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 16.62, "rank": 144}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 3, "total": 14.28, "rank": 96}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 17.84, "rank": 141}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 19.0, "rank": 139}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 16.92, "rank": 142}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 14.06, "rank": 99}}}, {"id": 38, "titulo": "Plataforma de Coordenação Operacional de Agentes Físicos", "autor": "Marcus Paulo do Espirito Santo Martins", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CECOF", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A proposta consiste em desenvolver uma plataforma de orquestração operacional que complementa os sistemas existentes, conectando o planejamento à execução em tempo real.\nA solução permite transformar dados (oriundo de sistemas, sensores ou ações humanas) em demandas qualificadas e coordenar automaticamente a execução por diferentes agentes - sejam humanos, robôs ou sistemas.\nCom isso, cria-se uma capacidade organizacional: a coordenação inteligente da execução operacional, orientada a dados e com potencial de aprendizado contínuo.", "ben": "•\tAumento da eficiência e da produtividade operacional;\n•\tRedução de retrabalho e falhas operacionais;\n•\tMelhoria no uso de recursos humanos e automatizados;\n•\tAumento da visibilidade e controle em tempo real;\n•\tRedução de custos operacionais ao longo do tempo;\n•\tGeração de dados estruturados para tomada de decisão;\n•\tEvolução do portfólio digital da BBTS", "diferencial": "A solução não substitui sistemas existentes, mas atua como uma camada de orquestração inteligente focada na execução física em tempo real.\nDiferentemente de ferramentas tradicionais de workflow ou automação, que operam predominantemente no ambiente digital, esta proposta atua diretamente na coordenação da execução no mundo físico, integrando múltiplos agentes de forma dinâmica e orientada a contexto.\nSeu diferencial está na capacidade de tratar pessoas, sistemas e robôs como agentes operacionais", "indicadores": "Deve proporcionar: Redução do tempo médio de execução de demandas; Aumento da produtividade por operação; Redução da necessidade de intervenções manuais; Aumento da taxa de utilização de recursos (humanos e automatizados); Redução de falhas e retrabalho; Melhoria nos indicadores de eficiência operacional.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 64}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.62, "rank": 70}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.12, "rank": 108}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.84, "rank": 69}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 57}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.5, "rank": 63}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.96, "rank": 112}}}, {"id": 39, "titulo": "Super TOA", "autor": "Flavio Celso Machado", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT CURITIBA", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolver ou integrar uma plataforma única (super app ou extensão do TOA) que centralize todas as funcionalidades necessárias ao técnico de campo, incluindo:\n\nIntegração com estoque\nConsulta de disponibilidade de peças em tempo real\nVisualização de fotos e especificações dos itens\nSolicitação de reposição diretamente na ferramenta\n\nBase de conhecimento técnica\nManuais técnicos vinculados ao tipo de chamado\nProcedimentos padronizados passo a passo\nHistórico de soluções aplicadas\n\nChecklist digital integrado\n\nPreenchimento obrigatório diretamente na atividade\nPadronização de execução e qualidade\nEliminação de uso de plataformas externas\n\n\n\nInterface unificada\nTodas as informações do chamado + recursos adicionais em um único ambiente\nNavegação simples e otimizada para uso em campo", "ben": "BENEFÍCIOS\nA implementação de uma solução integrada trará ganhos expressivos para todos os envolvidos:\nPara os técnicos de campo\nRedução de tempo na execução dos atendimentos (menos trocas de sistema)\nAcesso rápido a peças, manuais, fotos e procedimentos em um único local\nMaior assertividade no diagnóstico e resolução no primeiro atendimento\nMenor retrabalho e menos dependência de suporte externo\n\nPara a empresa\nAumento da produtividade operacional\nRedução de custos com deslocamentos e retornos (revisitas)\nPadronização dos processos de atendimento\nMelhor controle de estoque e utilização de peças\nCentralização das informações e histórico de serviços\nPara os clientes\n\nRedução do tempo de atendimento\nMaior qualidade e consistência no serviço prestado\nMaior índice de resolução no primeiro chamado (First Time Fix)\n\nPara a gestão\n\nMelhor tomada de decisão baseada em dados\nVisibilidade em tempo real da operação\nControle mais eficiente de SLA e performance", "diferencial": "Centralização total da operação: elimina a necessidade de múltiplos sistemas (TOA + estoque + manuais + checklist)\nExperiência integrada: o técnico não precisa alternar entre plataformas\nContextualização inteligente: informações (manuais, peças, procedimentos) aparecem automaticamente conforme o tipo de chamado\nFoco no usuário de campo: solução pensada especificamente para a realidade operacional do técnico\nDigitalização completa do processo: elimina controles paralelos e manuais", "indicadores": "TMA (Tempo Médio de Atendimento), FTF (First Time Fix Rate),NPS", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 16.0, "rank": 105}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 17.02, "rank": 106}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 13.28, "rank": 164}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 17.84, "rank": 142}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 19.4, "rank": 119}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 17.7, "rank": 101}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.26, "rank": 165}}}, {"id": 40, "titulo": "CITEC - Centro de informação/interação técnica.", "autor": "Pedro Stefano Souto Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "7131", "arena": "Eficiência Operacional e Automação", "trl": "6", "trl_fase": "Desenvolvimento de Protótipos (TRL 4–6) — Testes em ambiente controlado/simulado", "sol": "Elaboração de um aplicativo com conceito de offline first em que os dados de manuais, fotos de pecas dicas e etc possam ser consultadas de forma offline se necessário. Além disso que elas se atualizem de forma automática sem a interferência do técnico. Fazer o uso de visão computacional permitindo que os técnicos possam ter um auxilio na identificação de pecas em campo.", "ben": "Aumento da produtividade em campo, garantindo que o técnico tenha acesso a informações de maneira atualizadas de forma automatizada, além disso permitir que o técnico possa confirmar via foto se código da peca solicitada e realmente a que ele, tendo uma oportunidade comparar o item real com uma foto comparativa. \nAlém disso em casos que o técnico não souber uma referencia para a pesquisar sobre a peça, fazer o uso de visão computacional para identificar o código da peca corretamente. Val mencionar a redução de custos com transporte de pecas que podem ser solicitadas equivocadamente que afeta não somente financeiramente a empresa com o custo do transporte da mesma como o  impacto em prazos de outros chamados que a peca transportada poderia atender/solicitar no chamado.", "diferencial": "Ter de forma centralizada um local para consulta de informações que funciona de forma offline além de permitir um controle maior na rastreabilidade na logística de peças  parta atendimento e melhora do fluxo de reembolso de valores. Além disso o uso de tecnologias contemporâneas para  aumento da produtividade técnica e por consequência redução  do custos operacionais.", "indicadores": "Percepção de valor agregado junto aos tecnicos, metricas de uso ( quantidade de pessoas que usam o apicativo no dia a dia), analise quatidade de pecas pedidas de maneira equivocada (redução)", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 20.0, "rank": 3}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 19.12, "rank": 20}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 5, "total": 18.32, "rank": 5}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 21.24, "rank": 4}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 21.2, "rank": 13}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 19.5, "rank": 23}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 17.56, "rank": 10}}}, {"id": 41, "titulo": "PICOC-BBTS – Plataforma Inteligente de Continuidade e Custo de Incidentes", "autor": "Andre Elias Ribeiro Morais", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Geric", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Criar a PICOC-BBTS – Plataforma Inteligente de Continuidade e Operações Críticas, uma solução digital que integra dados operacionais já existentes na BBTS (monitoramento, chamados, assistência técnica, contratos e SLAs) para:\n\nRegistrar incidentes de forma estruturada e única;\nCorrelacionar falhas técnicas, tempo de indisponibilidade e serviços afetados;\nEstimar o custo do incidente, considerando tempo de parada, tipo de serviço, recursos mobilizados, riscos contratuais e impacto operacional indireto;\nGerar painéis e relatórios para GCN, risco, auditoria e gestão.\n\nA solução não depende de acesso direto às aplicações do BB, trabalhando com dados operacionais disponíveis e modelos de impacto estimado, podendo iniciar como piloto e evoluir de forma incremental.", "ben": "Com a implementação da ideia, espera-se:\n\nVisibilidade clara e padronizada do impacto e custo estimado dos incidentes, mesmo quando a aplicação afetada é do BB;\nMelhoria na gestão de Continuidade de Negócios (GCN) e Risco Operacional;\nApoio à tomada de decisão de gestores da BBTS e do BB;\nRedução de recorrência de incidentes críticos;\nFortalecimento da BBTS como parceira estratégica, indo além da execução operacional;\nGeração de evidências para auditorias internas, regulatórias e de conformidade normativa.", "diferencial": "O diferencial está na mensuração estruturada do custo do incidente, mesmo quando a BBTS não possui acesso às aplicações do Banco do Brasil, além da integração entre operação, continuidade, risco e auditoria em uma única visão.\nA proposta transforma dados operacionais existentes em inteligência estratégica, alinhada às normas de GCN e risco, indo além do simples cumprimento de SLA técnico.", "indicadores": "Quantidade de incidentes críticos; Tempo médio de recuperação (MTTR); Custo estimado por incidente; Redução de reincidência de falhas; Grau de aderência aos planos de continuidade; Percentual de incidentes com análise de impacto registrada.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 65}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.62, "rank": 71}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.12, "rank": 109}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.84, "rank": 70}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 58}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.5, "rank": 64}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.96, "rank": 113}}}, {"id": 44, "titulo": "QR Code patrimonial para rastreio de equipamentos de Outsourcing", "autor": "Victor Moreira Ramos", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GERED\\COMOT\\CEMAN SPO", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Cada equipamento BBTS contaria com um QR Code único ligado ao Siigo para faturamento e, possivelmente, a um aplicativo constando todo o histórico desde a instalação. Gerando assim um relatório contendo todas as intervenções técnicas, o QR Code também pode ser utilizado na realização do inventário anual de ativos de outsourcing como forma de simplificar a validação de que o equipamento está realmente em funcionamento na agência.", "ben": "Unificar o histórico dos equipamentos evitando perda de informações e inconsistências.", "diferencial": "Hoje, com os números de patrimônio, nós temos apenas a identificação do equipamento. O QR Code irá contar a história patrimonial de cada bem. Teremos histórico de funcionamento, movimentações, intervenções técnicas, remanejamentos entre outras informações pertinentes ao alcance das mãos dos nossos técnicos.", "indicadores": "Operacionais, Logísticos, Manutenção, Patrimoniais, Produtividade, Sustentabilidade, Gestão", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 3, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 3, "VIA": 4, "FAC": 1, "total": 14.0, "rank": 183}, "alex": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 14.92, "rank": 191}, "joao": {"REL": 1, "INO": 5, "DES": 3, "VIA": 4, "FAC": 2, "total": 12.48, "rank": 191}, "rafael": {"REL": 1, "INO": 5, "DES": 3, "VIA": 4, "FAC": 1, "total": 16.24, "rank": 184}, "laine": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 16.8, "rank": 192}, "dani": {"REL": 2, "INO": 5, "DES": 3, "VIA": 4, "FAC": 1, "total": 15.32, "rank": 191}, "manoel": {"REL": 1, "INO": 5, "DES": 3, "VIA": 5, "FAC": 1, "total": 12.46, "rank": 192}}}, {"id": 45, "titulo": "Baixa de Peças em Teste aplicadas", "autor": "Marcio Ferreira", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT-VIT", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Essa etapa será efetuada por outro setor. Acredito que o setor de TI junto com Dilog", "ben": "Redução de tempo gasto, por não ter que preencher o forms ou preencher poucos campos. \nFuncionários poderão executar outras atividades e somente conferir no dia posterior se a peça foi dado baixo\nCAT, ficará dentro da meta do EFICAT, pois não a peça não aparecerá pendente no outro dia", "diferencial": "temos que fazer manualmente tudo, preenchendo o forms, cada campo", "indicadores": "acompanhamento no painel de logística", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "INDETERMINADO", "PRESENTE"], "base": {"REL": 1, "INO": 3, "DES": 4, "VIA": 3, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 3, "DES": 4, "VIA": 3, "FAC": 2, "total": 13.0, "rank": 197}, "alex": {"REL": 1, "INO": 4, "DES": 5, "VIA": 3, "FAC": 2, "total": 14.22, "rank": 208}, "joao": {"REL": 1, "INO": 3, "DES": 4, "VIA": 3, "FAC": 3, "total": 11.88, "rank": 198}, "rafael": {"REL": 1, "INO": 4, "DES": 4, "VIA": 3, "FAC": 2, "total": 14.76, "rank": 207}, "laine": {"REL": 1, "INO": 3, "DES": 5, "VIA": 3, "FAC": 2, "total": 16.2, "rank": 206}, "dani": {"REL": 2, "INO": 3, "DES": 4, "VIA": 3, "FAC": 2, "total": 14.12, "rank": 209}, "manoel": {"REL": 1, "INO": 3, "DES": 4, "VIA": 4, "FAC": 2, "total": 11.86, "rank": 208}}}, {"id": 46, "titulo": "BBTS Trust Ledger: Infraestrutura Descentralizada de Integridade para IoT e Operações Digitais", "autor": "Rodrigo Gontyjo Ribeiro Rodrigues", "empresa": "Cobra Tecnologia", "uo": "DIDES", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A solução consiste em implementar uma rede Blockchain gerenciada que funcionará como um barramento de integridade para toda a empresa. A proposta integra o PSIM e outros sensores IoT da BBTS a essa rede, registrando automaticamente as assinaturas digitais (hashes) de cada evento crítico em um registro distribuído e imutável. Paralelamente, será criada uma camada de Tokenização de Ativos, onde serviços de infraestrutura são convertidos em tokens digitais. Isso permite a gestão programável de contratos via Smart Contracts, automatizando pagamentos e auditorias, e abrindo a possibilidade de investimento externo para a modernização tecnológica e escalabilidade da BBTS.", "ben": "Imutabilidade Transversal: Garante que nenhum registro de sensor, log de acesso ou indicador de disponibilidade possa ser alterado, blindando a integridade das operações da BBTS e do Banco do Brasil.\n\nSegurança e Conformidade: Redução drástica de riscos operacionais ao utilizar identidades digitais imutáveis para cada dispositivo IoT, impedindo acessos não autorizados e fortalecendo a segurança integrada.\n\nNovo Modelo de Receita: Geração de novos negócios através da tokenização, permitindo que investidores ou o público comprem \"tokens de utilidade\" para financiar a expansão da infraestrutura em troca de benefícios ou participação nos ganhos de eficiência.\n\nDiferencial Estratégico: Posiciona a BBTS como líder em \"Trust as a Service\", elevando o valor percebido do PSIM e de outros produtos core para clientes de alta segurança.", "diferencial": "Diferente das soluções de monitoramento convencionais que dependem de bancos de dados centrais vulneráveis, o BBTS Trust Ledger introduz o conceito de Confiança Zero (Zero Trust) na camada de dados da organização. Em vez de apenas visualizar o que acontece (como no PSIM tradicional), passamos a provar criptograficamente que o evento ocorreu e não foi alterado. Além disso, a inovação vai além da técnica ao propor um modelo de Economia Digital, onde a infraestrutura deixa de ser um custo estático", "indicadores": "Adoção Técnica: Integração completa e estável com o produto PSIM, provando que a tecnologia é factível no ambiente real da BBTS / Validação Estratégica: Reconhecimento da banca (composta pela Diretoria Executiva e especialistas) de que a solução blinda a reputação da empresa e gera valor para o Banco do Brasil. / Maturidade (TRL): Progressão da ideia do nível conceitual (TRL 1/2) para um protótipo funcional em ambiente operacional (TRL 7), conforme a escala definida no regulamento. / Engajamento Financeiro: Conclusão do primeiro ciclo de captação ou venda de tokens de utilidade, validando o mo", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["NÃO ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 23}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 38}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 42}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 28}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 25}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 32}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 48}}}, {"id": 48, "titulo": "Agente de Valor - Política de Participação em Resultados Individuais ou Em Grupo", "autor": "Abner Lucas Sande Lopes", "empresa": "Cobra Tecnologia", "uo": "DITES", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Ideia: Criar uma política permanente onde qualquer colaborador ou contratado que implementar uma solução com impacto financeiro e de valor comprovado recebe uma participação proporcional ao que gerou.\n \nComo funciona: Solução implementada → Monitoramento (30/60/90 dias) → Validação pelo Financeiro e áreas relacionadas → 5% do impacto gerado vai para quem provou o resultado\n \nPor que vale: A empresa só divide o que já ganhou. Retém 95% de tudo, e cria uma cultura onde gerar valor e resultado vira hábito.", "ben": "Todas as pessoas ligadas direta ou indiretamente a BBTS que gerarem algum resultado financeiramente mensurável e que seja possível comprovar, estarão aptos e serão beneficiados.\n\nIsso criará um hábito para gerar valor para empresa.", "diferencial": "Essa será uma política permanente, e ajudará a empresa a manter grandes talentos, que muitas vezes buscam oportunidades internacionais por falta de reconhecimento.\nE vai incentivar a real geração de valor.", "indicadores": "Se a política for aprovada pelo conselho e os colaborações ficarem incentivados.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["NÃO ELEGÍVEL", "PRESENTE", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 4, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 4, "VIA": 4, "FAC": 2, "total": 15.0, "rank": 159}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 16.02, "rank": 177}, "joao": {"REL": 1, "INO": 4, "DES": 4, "VIA": 4, "FAC": 3, "total": 13.68, "rank": 152}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 17.36, "rank": 163}, "laine": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 2, "total": 18.0, "rank": 176}, "dani": {"REL": 2, "INO": 4, "DES": 4, "VIA": 4, "FAC": 2, "total": 15.92, "rank": 179}, "manoel": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.66, "rank": 132}}}, {"id": 49, "titulo": "Plataforma de criação de agentes de IA", "autor": "Lucas Sousa Borges", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GEAPE/SUPOT/CEDIG", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolvimento de uma Plataforma de criação de agentes de IA que permite que qualquer colaborador crie, configure e publique seus próprios agentes de IA com:\nStudio de criação facilitada, hub de conexões (endpoint com o PANDA, por exemplo), biblioteca de agentes", "ben": "1. Autonomia sem dependência técnica: A BBTS já possui agentes de IA como a DUDA, o César e a TAATI que apoiam os colaboradores em assuntos específicos, no entanto, temos muito potencial para criar mais agentes que possam dar suporte cada vez maior para a maioria dos processos da organização.\n2. Aumento de produtividade real no dia a dia: Facilitando a criação de agentes de IA abre-se um enorme leque de possibilidades tanto para os processos e produtos internos da BBTS quanto externos.\n3. Redução de custos operacionais reduzindo a quantidade de licenças do Copilot studio.\n4. Escala na adoção de IA, que é um tendencia de mercado e posiciona a BBTS na vanguarda.\n5. Redução na demanda de TI para demandas de baixa e média complexidade, permitindo que a TI foque em iniciativas de maior valor estratégico\n6. Centralização de segurança e Governança", "diferencial": "A plataforma tem o potencial de se tornar um HUB conectando agentes de IA com dados tratados na plataforma PANDA, por exemplo.\nA plataforma pode ser tornar um produto para que a BBTS possa vender para outras empresas do conglomerado BB ou do mercado.\nFaz a democratização do uso de IA acelerando a maturidade digital em processos e promove o aprendizado orgânico no uso de IA.", "indicadores": "Taxa de adoção pelos colaboradores, verificação do nível de satisfação, reflexo na pesquisa de clima organizcional", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 15.0, "rank": 160}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 16.32, "rank": 165}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 12.88, "rank": 177}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 17.04, "rank": 170}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 18.8, "rank": 151}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 16.72, "rank": 156}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 12.86, "rank": 180}}}, {"id": 50, "titulo": "Conexão Libras", "autor": "Maria do Carmo Antunes de Oliveira", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Superintendência Sudeste (UOR 4032)", "arena": "Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Permitir a comunicação entre pessoas PCD (deficiências auditivas, parciais ou totais), através da geração de voz X linguagem de sinais e linguagem de sinais X voz - com soluções fáceis, acessíveis e seguras, disponibilizadas a todos que atuam \"na e junto\" a BBTS, de forma segura, ágil, empática e acessível.", "ben": "- proximidade nas relações;\n- empatia;\n- agilidade nas comunicações;\n- eficiência e qualidade - uma vez que possam ser compreendidas as insatisfações, dúvidas, expectativas do cliente, é muito mais tranquilo que as soluções estejam mais bem direcionadas;\n- segurança com as informações e dados, uma vez que a solução é gerada dentro da BBTS, e o uso seria feito pelos funcionários e colaboradores BBTS (mesmo nas relações junto ao BB), garantindo a qualidade e a segurança desses dados sensíveis;\n- possibilidade de ampliação e venda da solução para o BB e outros parceiros, com foco nas especificidades desse mercado de tecnologia bancária;\n- ter uma solução com a cara e o coração da BBTS;", "diferencial": "Nas opções vistas, não identifiquei nenhuma ação de traduzir Libras em Voz, nem a opção de tornar uma mensagem assim armazenada para ser acessada posteriormente pelo seu receptor.", "indicadores": "Pode ser solicitado ao fim de cada interação uma avaliação, assim como o teams, whatsapp, disponibiliza ao fim de uma chamada, 5 estrelinhas para você avaliar a qualidade daquela chamada.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos d
