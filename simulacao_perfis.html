squisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Construir uma solução customizada para a solução\nDesenvolver equipe para atualização continua dos robôs de captura\nFormar e treinar pessoas quanto ao uso da I.A \nDesenvolvimento de agentes para apoio nas tomadas de decisão e triagem de oportunidades", "ben": "Ter a captura automatizada de licitações\nTer a captura através de funil de venda de oportunidade de empresas publicas\nAumento na formação de parcerias e novos negócios\nCapacitação de time especializado e participação otimizada em certames\nAumento da lucratividade da BBTS\nMelhora salarial para os empregados e novas oportunidades.", "diferencial": "Não existe nada como isto na empresa. O aumento de oportunidades e receitas já é esperado da V1 do projeto.\nCom o passar do tempo e apoio da I.A as pessoas passam a ter mais oportunidade para focar em tarefas mais analíticas como esta.", "indicadores": "Receita; Número de novos contratos; Evolução Comercial;", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 2, "total": 16.0, "rank": 121}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 16.72, "rank": 142}, "joao": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 3, "total": 14.08, "rank": 127}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 18.16, "rank": 116}, "laine": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 2, "total": 18.6, "rank": 163}, "dani": {"REL": 2, "INO": 4, "DES": 5, "VIA": 4, "FAC": 2, "total": 16.9, "rank": 154}, "manoel": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.06, "rank": 103}}}, {"id": 151, "titulo": "Gestão de frota - Gamificação", "autor": "Angelo Rafael Rosseto", "empresa": "BB Tecnologia e Servicos S.A.", "uo": "CAT-JOI", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Criação de um software capaz de realizar a leitura e interpretação dos dados de telemetria dos veículos da frota BBTS, transformando essas informações em painéis e dashboards com pontuações baseadas no padrão de condução esperado para cada condutor.\nComportamentos como acelerações e frenagens bruscas, excesso de velocidade e tempo com o veículo ligado sem deslocamento impactam negativamente a pontuação, enquanto práticas alinhadas aos padrões definidos contribuem para o aumento das notas. Com o uso de inteligência artificial, é possível diferenciar situações de trânsito intenso de desperdícios, como por exemplo o veículo parado com o motor ligado consumindo combustível.\nA partir dessas informações, é gerado um ranking de desempenho, permitindo tanto o reconhecimento dos melhores condutores", "ben": "Uma boa gestão de frota contribui diretamente para a redução do consumo de combustível (ASG) para a empresa, dos custos com manutenções para os parceiros e da ocorrência de acidentes para os funcionários.\nAlém disso, em processos de renovação de contratos ou novas contratações, torna-se possível negociar condições mais vantajosas junto aos fornecedores ao apresentar históricos detalhados da frota, como manutenções e sinistros. Esses mesmos dados também permitem obter melhores condições na renovação de seguros, seja por meio de descontos ou negociações mais favoráveis.\nConsiderando um universo de mais de 700 veículos, mesmo uma pequena redução no consumo de combustível por unidade representa um impacto significativo em economia total.", "diferencial": "Atualmente, a BBTS não possui um controle estruturado de frota, baseando-se apenas no consumo médio, que pode ser influenciado por fatores como relevo, trânsito e modelo dos veículos.\nCom essa aplicação, abre-se uma nova forma de gestão, permitindo análises individualizadas e mais precisas, identificando exatamente os pontos que necessitam de atuação.\nAlém disso, a solução não depende de um tipo específico de veículo, mas sim do comportamento humano, focando diretamente no principal fator de imp", "indicadores": "Redução do consumo de combustível em diferentes níveis (por veículo, unidade, regional e nacional), diminuição dos custos de manutenção e/ou do tempo de permanência em oficina, redução do número de acidentes e disponibilização de uma ferramenta estratégica para negociação mais eficiente com fornecedores.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 40}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 50}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 52}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 40}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 38}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 43}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 58}}}, {"id": 152, "titulo": "Facilita ai", "autor": "Janaina Ferreira Diniz", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CEOBE", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Uma possível solução seria a criação de uma automação, por meio de macros, que capture o MCI do cliente, verifique a operação cadastrada no sistema e identifique se ela existe e está liberada.\nCaso a operação não exista ou não esteja liberada, a automação já realizaria a abertura da ocorrência automaticamente. Dessa forma, o gestor ficaria responsável apenas por direcionar a demanda para tratativa após a resolução da pendência.", "ben": "Não vamos perde tempo verificando algo que não vai sair no dia.", "diferencial": "Não existe essa automação para esse tipo de situação na atualização de calculo, e tudo feito manualmente", "indicadores": "Quando as operações estiverem com  a ocorrência aberta.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 3, "DES": 3, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 3, "DES": 3, "VIA": 4, "FAC": 1, "total": 12.0, "rank": 214}, "alex": {"REL": 1, "INO": 4, "DES": 4, "VIA": 4, "FAC": 1, "total": 13.12, "rank": 215}, "joao": {"REL": 1, "INO": 3, "DES": 3, "VIA": 4, "FAC": 2, "total": 11.28, "rank": 212}, "rafael": {"REL": 1, "INO": 4, "DES": 3, "VIA": 4, "FAC": 1, "total": 14.16, "rank": 211}, "laine": {"REL": 1, "INO": 3, "DES": 4, "VIA": 4, "FAC": 1, "total": 14.8, "rank": 218}, "dani": {"REL": 2, "INO": 3, "DES": 3, "VIA": 4, "FAC": 1, "total": 13.32, "rank": 215}, "manoel": {"REL": 1, "INO": 3, "DES": 3, "VIA": 5, "FAC": 1, "total": 11.66, "rank": 211}}}, {"id": 154, "titulo": "BBTS Payment Enablement – Infraestrutura de Pagamentos como Serviço", "autor": "Andre Elias Ribeiro Morais", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Geric", "arena": "Negócios Digitais Escaláveis", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Criar uma oferta de “Pagamento como Serviço” (Payment Enablement), na qual a BBTS fornece infraestrutura, operação e serviços de suporte para meios de pagamento, enquanto parceiros financeiros (como o Banco do Brasil) realizam a parte bancária e financeira.\nA BBTS atuará em:\n\nGestão e operação de dispositivos (POS, smart POS, QR Code, Tap on Phone);\nLogística, instalação, manutenção e suporte técnico em nível nacional;\nIntegração operacional com adquirentes e parceiros financeiros;\nMonitoramento e operação contínua dos serviços;\nSuporte a plataformas que desejam embarcar meios de pagamento.\n\nA solução permite que clientes tenham meios de pagamento funcionando de forma simples e escalável, enquanto a BBTS monetiza a operação.\n\nTem muita aderência e players entrantes nesse mercado.", "ben": "Geração de nova receita recorrente baseada em serviços operacionais (não financeiros);\nAumento do ticket médio de contratos existentes por meio de serviços adicionais;\nPosicionamento da BBTS em uma tendência crescente (embedded finance);\nFortalecimento da relação com o Banco do Brasil, atuando de forma complementar;\nRedução de complexidade para clientes, com solução integrada (“one-stop service”);\nExpansão para novos mercados (plataformas digitais, serviços públicos, marketplaces).", "diferencial": "A proposta não concorre com bancos ou adquirentes, mas atua como camada operacional independente, viabilizando meios de pagamento para terceiros.\nO diferencial está em:\nSeparação clara entre operação (BBTS) e financeiro (BB/mercado);\nUso da capilaridade e operação nacional da BBTS para escalar serviços;\nModelo “as a service”, com receita recorrente;\nFoco em simplificar o uso de pagamentos por plataformas que não são financeiras.", "indicadores": "Receita gerada por cliente/contrato; Quantidade de dispositivos gerenciados; Número de plataformas habilitadas; Crescimento da base de clientes; Taxa de adesão a serviços adicionais; Custo operacional por ponto atendido.", "ganhos": "Ganhos financeiros (receita / novos negócios)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 122}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 127}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 137}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 126}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 99}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 118}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 142}}}, {"id": 155, "titulo": "Porque nenhuma das tecnologias criadas na BBTS são mais importantes que as mentes que as criaram.", "autor": "Dithamar Nascimento Santos", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "UOR-7421", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Criar e estabelecer um índice mensurável de harmonização humana ou indice de felicidade ( IH²) para manutenção preditiva do capital humano. Ferramenta métrica que correlaciona segurança pscicológica, dominio tecnológico em conformidade com a NR-1,agindo como agente de prevenção da oscilação da produtividade e saúde mental", "ben": "O indice de harmonização ( IH²) transforma o clima organizacional em dados mensuráveis ,permitindo que a liderança tome decisões baseado em fatos, monitora a saúde da máquina mestra - o humano- tornado-se  uma ferramenta de estabilidade emocional.", "diferencial": "Há uma busca incansável para otimizar ferramentas, nossa ideia é otimizar o colaborador. (humanos).", "indicadores": "Não podemos  gerenciar o que não se mede , portanto , uma formula empirica que se adapte mais proximo possivel   da  realidade.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 3, "DES": 4, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 3, "DES": 4, "VIA": 4, "FAC": 1, "total": 13.0, "rank": 204}, "alex": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 1, "total": 14.52, "rank": 201}, "joao": {"REL": 1, "INO": 3, "DES": 4, "VIA": 4, "FAC": 2, "total": 11.68, "rank": 205}, "rafael": {"REL": 1, "INO": 4, "DES": 4, "VIA": 4, "FAC": 1, "total": 14.96, "rank": 201}, "laine": {"REL": 1, "INO": 3, "DES": 5, "VIA": 4, "FAC": 1, "total": 16.8, "rank": 198}, "dani": {"REL": 2, "INO": 3, "DES": 4, "VIA": 4, "FAC": 1, "total": 14.72, "rank": 202}, "manoel": {"REL": 1, "INO": 3, "DES": 4, "VIA": 5, "FAC": 1, "total": 12.06, "rank": 202}}}, {"id": 156, "titulo": "Aplicativo Consórcio BBTS", "autor": "Emilio Affonso Carello", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Gecor", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Propõe-se o desenvolvimento de um aplicativo mobile dedicado aos parceiros comerciais, que centralize e simplifique todo o processo de simulação e contratação de consórcios para clientes, permitindo atuação ágil e totalmente digital durante o atendimento.", "ben": "Oportunidades identificadas\n\nEmpoderamento do parceiro comercial, permitindo atuação 100% mobile com autonomia para simular e contratar propostas em tempo real.\nAumento da conversão de vendas, aproveitando o momento do atendimento presencial ou remoto.\nRedução do tempo de fechamento, com jornadas simplificadas e integradas.\nPadronização e qualidade nas propostas, com regras de negócio embarcadas no aplicativo.\nMelhoria da experiência do cliente final, com respostas rápidas, simulações claras e contratação imediata.\nAmpliação da atuação comercial, permitindo que parceiros operem de qualquer lugar.", "diferencial": "O diferencial está em transformar um processo hoje fragmentado e pouco ágil em uma experiência integrada, mobile e orientada ao parceiro, aumentando produtividade, qualidade da venda e taxa de conversão — alinhado às melhores práticas do mercado digital.\n\n\nAgilidade na conversão: permite simular múltiplos cenários e fechar a contratação no mo", "indicadores": "A iniciativa será considerada bem-sucedida se:  Aumentar a conversão de vendas e reduzir o tempo de contratação; Elevar a produtividade e adesão dos parceiros; Melhorar a experiência de atendimento (mais rápida e fluida); Gerar incremento relevante no volume de negócios de consórcio.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 15.0, "rank": 169}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 16.32, "rank": 169}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 12.88, "rank": 180}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 17.04, "rank": 172}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 18.8, "rank": 154}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 16.72, "rank": 159}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 12.86, "rank": 184}}}, {"id": 157, "titulo": "Extensão do Raid Five", "autor": "Mailton Carlos da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Gered / Cat JPa", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A solução não é simples nem de explicar pois teremos que testa-la com protótipos em laboratório, teremos que ter uma equipe multi-disciplinar com matemático, devs, gestores de redes, engenheiros de software. Precisaremos desenvolver um algorítmo de recuperação de dados em disco, em servidores, em data centers...", "ben": "A melhoria dar-se-a pela mesma lógica da não interrupção da internet, ou seja, mesmo que um disco, servidor, datacenter, seja danificado ou perca sua comunicação, os dados/sistema permanecerão ativos pois os outros 4 \"fatores\" permanecerão ativos...\n\nCom uma tecnologia de \"não interrupção\" nesses moldes poderemos manter dados/serviços sempre ativos em tempo real e On-Line, ou seja sem interrupção o que geraria um valor agregado de imensa monta para a empresa que dominar essa tecnologia, tendo um diferencial competitivo de alto valor agregado.", "diferencial": "O que já existe é o Raid Five (recuperação dos dados de um disco através da utilização de um algorítmo que recupera os dados de um disco danificado). A nova proposta é amplia-la para recuperação semelhante de servidores e extensível a data centers espalhados pelo país e/ou mundo.", "indicadores": "Testes em laboratório poderão simular a operação e sua funcionalidade.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 4, "DES": 5, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 3, "INO": 4, "DES": 5, "VIA": 4, "FAC": 1, "total": 17.0, "rank": 74}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 18.82, "rank": 26}, "joao": {"REL": 3, "INO": 4, "DES": 5, "VIA": 4, "FAC": 2, "total": 15.48, "rank": 69}, "rafael": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 18.96, "rank": 67}, "laine": {"REL": 3, "INO": 4, "DES": 5, "VIA": 4, "FAC": 1, "total": 20.0, "rank": 81}, "dani": {"REL": 4, "INO": 4, "DES": 5, "VIA": 4, "FAC": 1, "total": 19.5, "rank": 25}, "manoel": {"REL": 3, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.06, "rank": 36}}}, {"id": 158, "titulo": "BBTS CyberTrust – Conformidade e Confiança Digital", "autor": "Paulo Luciano Goncalves da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GERED", "arena": "Eficiência Operacional e Automação,Segurança Integrada", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A solução proposta é o CyberTrust, uma plataforma de conformidade e confiança digital ativa que automatiza auditorias e garante rastreabilidade dos processos regulatórios.\nPor meio de Inteligência Artificial regulatória, automação inteligente (RPA) e blockchain, o sistema verifica continuamente a aderência às normas (LGPD, ISO 27001, Basileia III), identifica não conformidades e gera relatórios executivos em tempo real.\n\nO CyberTrust atua como uma camada de governança digital integrada, conectando-se ao CyberOps (operações seguras) e ao CyberShield (defesa ativa), formando um ecossistema completo de segurança e conformidade.\nEssa abordagem transforma a BBTS de uma postura reativa para uma governança proativa, fortalecendo a credibilidade institucional e reduzindo riscos regulatórios.", "ben": "A implementação do CyberTrust trará benefícios diretos e mensuráveis para a BBTS, seus clientes e parceiros.\nAo automatizar auditorias e garantir rastreabilidade via blockchain, a plataforma reduzirá significativamente o tempo e o custo dos processos de conformidade, aumentando a eficiência operacional e a confiabilidade institucional.\nPara as equipes internas, o CyberTrust simplifica o trabalho de governança e segurança, permitindo foco em decisões estratégicas em vez de tarefas repetitivas.\nPara os clientes e parceiros, reforça a transparência e a confiança nas operações da BBTS, assegurando aderência contínua às normas da LGPD, ISO 27001 e demais regulamentações.\nNo nível corporativo, posiciona a BBTS como referência nacional em confiança digital, fortalecendo sua imagem de inovação e responsabilidade tecnológica.\nEm síntese, o CyberTrust promove uma cultura de governança proativa, reduz riscos regulatórios e amplia a credibilidade da BBTS no mercado financeiro e tecnológico.", "diferencial": "Aplicação de IA regulatória e blockchain para auditorias automatizadas e rastreáveis em tempo real.\nTransforma a conformidade reativa em governança digital contínua e proativa, antecipando riscos e garantindo transparência.\nIntegra-se ao CyberOps e CyberShield, formando um ecossistema completo de segurança e confiança digital, posicionando a BBTS como referência em inovação e governança tecnológica.", "indicadores": "Para medir o sucesso do CyberTrust, serão utilizados indicadores que avaliam eficiência, segurança e conformidade. O desempenho será observado pela redução do tempo médio de auditoria digital, aumento da precisão da IA na detecção de não conformidades e maior rastreabilidade dos registros via blockchain. Também serão considerados o nível de aderência contínua às normas LGPD e ISO 27001, a economia de recursos nas equipes de governança e a percepção de transparência e confiança institucional, comprovando a evolução da BBTS rumo à governança digital proativa e confiável.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 41}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 51}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 53}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 41}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 39}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 44}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 59}}}, {"id": 159, "titulo": "BBTS CyberShield & CyberAcademy", "autor": "Paulo Luciano Goncalves da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GERED", "arena": "Eficiência Operacional e Automação,Segurança Integrada", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolver uma plataforma integrada de defesa digital ativa e capacitação contínua, composta pelo BBTS CyberShield e pela CyberAcademy BBTS.\n  o fortalecimento da resiliência digital e a ampliação do portfólio da BBTS, consolidando sua posição como referência em defesa e inovação tecnológica.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 42}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 52}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 54}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 42}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 40}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 45}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 60}}}, {"id": 160, "titulo": "BBTS SenseAccess – Plataforma Inteligente de Acessibilidade Corporativa", "autor": "Moises Ferreira dos Santos", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CATFOR", "arena": "Eficiência Operacional e Automação", "trl": "3", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Criar um sistema inteligente de acessibilidade corporativa utilizando sensores sonoros, táteis e IoT para auxiliar colaboradores com necessidades especiais dentro dos ambientes da BBTS e clientes atendidos pela empresa.", "ben": "Para a BBTS\n    • fortalecimento da cultura inclusiva;\n    • inovação social com impacto real;\n    • melhoria da imagem institucional;\n    • aderência às te na empresa: o sistema consulta a base de dados de afinidades. \nDesta forma, as vagas externas só serão abertas para setores específicos cujas necessidades não puderam ser supridas com o reaproveitamento e valorização dos talentos já existentes na casa.", "diferencial": "não existe hoje nada para todos os cargos. Um técnico administrativo formado em logística, pode ser utiilizado em CATs na entrega de peças. Assim, aproveitamos eficiência em todos os cargos.", "indicadores": "o que não existe, deve ser bom tentar", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 4, "DES": 5, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 3, "INO": 4, "DES": 5, "VIA": 4, "FAC": 2, "total": 18.0, "rank": 43}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 19.12, "rank": 23}, "joao": {"REL": 3, "INO": 4, "DES": 5, "VIA": 4, "FAC": 3, "total": 16.88, "rank": 27}, "rafael": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 19.76, "rank": 26}, "laine": {"REL": 3, "INO": 4, "DES": 5, "VIA": 4, "FAC": 2, "total": 20.2, "rank": 64}, "dani": {"REL": 4, "INO": 4, "DES": 5, "VIA": 4, "FAC": 2, "total": 19.7, "rank": 19}, "manoel": {"REL": 3, "INO": 4, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.26, "rank": 16}}}, {"id": 166, "titulo": "Estoque Inteligente", "autor": "Pedro Stefano Souto Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "7131", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Elabora um ": 13.92, "rank": 212}, "manoel": {"REL": 1, "INO": 3, "DES": 4, "VIA": 4, "FAC": 1, "total": 10.66, "rank": 220}}}, {"id": 172, "titulo": "Painel Operacional", "autor": "Adolfo Felipe de Souza Santos", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT-BAR", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Painel, simples, facil e dinamico, com todas as metas que o CAT tem que alcançar para ser diamante, mostrando TAA, demais bens, DOSI, DOSA, etc. E dando foco aos pontos que a empresa quer alcançar.", "ben": "Com um painel criado especialmente para o CAT, podemos ter melhor visibilidade tendo foco naquilo que a empresa quer alcançar, EX: se nesse semestre a empresa tem como foco as vistorias, ela coloca em destaque essa parte do painel.", "diferencial": "É a simplificação do que existe, hoje temos diversos paineis espalhados que são de \"donos\" diversos, parando e voltando dependendo de quando a pessoa atualiza.", "indicadores": "a extinção de diversos paineis, concentrando tudo em apenas um.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 4, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 4, "VIA": 4, "FAC": 1, "total": 14.0, "rank": 189}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 15.72, "rank": 182}, "joao": {"REL": 1, "INO": 4, "DES": 4, "VIA": 4, "FAC": 2, "total": 12.28, "rank": 193}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 16.56, "rank": 180}, "laine": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 1, "total": 17.8, "rank": 182}, "dani": {"REL": 2, "INO": 4, "DES": 4, "VIA": 4, "FAC": 1, "total": 15.72, "rank": 184}, "manoel": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 1, "total": 12.46, "rank": 194}}}, {"id": 173, "titulo": "Automação ICMS 6.2: Integração Inteligente do Painel Tributário ao RI no Oracle EBS", "autor": "Claudia Lucia Ribeiro Correa", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CESEC-FIN", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolvimento de uma esteira de automação inteligente (RPA/API) focada no fluxo de ICMS e no lançamento do tipo 6.2 no EBS. A solução operará de forma integrada, em 04 etapas automáticas: Triagem e Consulta: o robô identifica o novo ID de ICMS no PT e dispara um card interativo no Teams do responsável, solicitando a permissão para validação em um clique; Download e Dupla Checagem: autorizado no Teams, o sist. faz o download da guia e, utilizando tecnologia de leitura de documentos (OCR), cruza os dados e a valida; Input no ERP: se a conferência sistêmica estiver correta, a automação acessa o EBS e executa o input direto dos dados do RI na tela de lançamento 6.2; Gestão de Exceções: havendo divergência entre a guia e o PT, o robô trava o processo e notifica o colaborador para análise.", "ben": "Eficiência Operacional de Ponta a Ponta: Eliminação do tempo de espera passivo por respostas manuais no Teams e fim do preenchimento manual de RIs no EBS, acelerando drasticamente a rotina diária.  \nRisco Zero em Auditoria e Conformidade: Substituição da conferência visual humana por uma validação sistêmica de valores e Estados (UF), mitigando totalmente o erro humano de digitação em chaves fiscais complexas.  \nGovernança Digital: Manutenção das alçadas de decisão existentes através de cards interativos automáticos no Teams, garantindo que nenhum RI seja lançado sem o devido 'sinal verde' do responsável.  \nFoco Estratégico: Redução do estresse diário da equipe administrativa e fiscal, permitindo que os colaboradores atuem apenas no tratamento de divergências e exceções fiscais, e não na digitação massiva de guias.", "diferencial": "O que torna o Automação ICMS 6.2 diferente das soluções tradicionais ou do cenário atual na empresa é que ele não tenta ser apenas um \"robô genérico\" que repete cliques, ele foi desenhado como uma solução cirúrgica para um processo fragmentado. O foco no tipo 6.2 (de maior incidência), a combinação de tecnologias (RPA + API + Inteligência de Dados) e o ser humano no controle (card interativo no Teams e colaborador na gestão de exceções) comprovam a novidade da solução encontrada.", "indicadores": "Tempo Médio de Atendimento (SLA): Redução do tempo total gasto entre a identificação do ID no Painel Tributário e a efetivação do lançamento do RI (tipo 6.2) no Oracle EBS. Taxa de Erro Operacional: Redução para 0% no índice de falhas humanas ou digitação incorreta de chaves fiscais, valores e Estados (UF). Índice de Retenção de Fechamento: Diminuição no volume de guias rejeitadas pelo ERP no final do mês devido a inconsistências. Nível de Automação: Percentual de guias de ICMS processadas de ponta a ponta sem necessidade de digitação manual (meta de 100% para os casos de checagem perfeita).", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 17.0, "rank": 75}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.22, "rank": 101}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 3, "total": 15.12, "rank": 75}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 18.84, "rank": 76}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.8, "rank": 87}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 17.72, "rank": 96}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 14.76, "rank": 82}}}, {"id": 174, "titulo": "PROJETO – CONSULTOR DE MAQUIAGEM COM INTELIGÊNCIA ARTIFICIAL (IA BEAUTY CONSULTANT)", "autor": "Josiane Cristina Soares Ribas", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GERED -CEMAN CURITIBA", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolver um equipamento inteligente em formato de espelho interativo, que utilize inteligência artificial para analisar características do rosto e da pele do cliente, simular maquiagens em tempo real e recomendar produtos personalizados.\nA solução será integrada ao estoque da loja, permitindo sugestões alinhadas aos produtos disponíveis e proporcionando uma experiência rápida, autônoma e inovadora.\nO objetivo é melhorar a tomada de decisão do cliente, aumentar as vendas e otimizar o atendimento nas lojas.", "ben": "O projeto melhora a experiência do cliente com atendimento personalizado e mais segurança na escolha, aumentando as vendas e o ticket médio das lojas.\nReduz custos operacionais, traz inovação ao varejo e cria novas receitas para a BBTS.\nTambém gera oportunidades de financiamento pelo Banco do Brasil e fortalece parcerias com marcas. Para a BBTS, abre uma nova linha de receita com venda de equipamentos, assinaturas, manutenção e serviços de IA, além de posicionar a empresa como inovadora no uso de tecnologia no varejo.\nPara o Banco do Brasil, cria oportunidades de financiamento para lojistas, ampliando a oferta de crédito e fortalecendo o relacionamento com pequenas e médias empresas. Para parceiros e marcas, gera novas oportunidades de exposição, aumento nas vendas e desenvolvimento de ações conjuntas com tecnologia e personalização.", "diferencial": "O IA Beauty Consultant se diferencia porque aplica tecnologias já conhecidas em um contexto totalmente novo: um equipamento físico, acessível, simples e pensado para lojas pequenas e médias, algo que não existe no Brasil.", "indicadores": "Taxa de adoção do equipamento (número de lojas usando). •     CrescO protótipo mostrou valor na prática, com aumento de vendas, maior ticket médio e boa aceitação das clientes, além de interesse de outras lojas. A BBTS valida um produto escalável, com baixo custo, alta margem e possibilidade de vendas em volume. O mercado já demonstra demanda, com interesse de redes, marcas e lojistas. O produto também cria nova receita para a BBTS (venda, assinatura, manutenção e parcerias). Além disso, o Banco do Brasil identifica potencial de financiamento, tornando o produto uma porta de entrada para PMEs.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 4, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 3, "INO": 4, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 76}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.72, "rank": 29}, "joao": {"REL": 3, "INO": 4, "DES": 4, "VIA": 5, "FAC": 2, "total": 15.92, "rank": 37}, "rafael": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 19.16, "rank": 63}, "laine": {"REL": 3, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 65}, "dani": {"REL": 4, "INO": 4, "DES": 4, "VIA": 5, "FAC": 1, "total": 19.32, "rank": 28}, "manoel": {"REL": 3, "INO": 4, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.36, "rank": 34}}}, {"id": 175, "titulo": "Aplicativo de E‑commerce Agrícola Internacional-AgroBridge BB", "autor": "Josiane Cristina Soares Ribas", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GERED -CEMAN CURITIBA", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolver um aplicativo que conecte produtores rurais a compradores internacionais, permitindo a venda de produtos, gestão de negociações e acesso a informações de exportação em um único ambiente.\nA solução também integrará serviços do Banco do Brasil, como crédito e financiamento, além de ferramentas de gestão e suporte ao produtor, facilitando todo o processo comercial e operacional.\nO objetivo é simplificar a exportação, ampliar mercados e digitalizar o agronegócio de forma integrada e acessível.", "ben": "A solução amplia o acesso dos produtores ao mercado internacional, aumenta vendas e melhora a eficiência.\nPara o Banco do Brasil e a BBTS, gera novas receitas e fortalece o relacionamento com clientes.\nTambém traz mais transparência, organização e integração para todo o ecossistema do agronegócio.", "diferencial": "Desenvolver um aplicativo que conecte produtores rurais a compradores internacionais, permitindo a venda de produtos, gestão de negociações e acesso a informações de exportação em um único ambiente.\nA solução também integrará serviços do Banco do Brasil, como crédito e financiamento, além de ferramentas de gestão e suporte ao produtor, facilitando todo o processo comercial e operacional.\nO objetivo é simplificar a exportação, ampliar mercados e digitalizar o agronegócio de forma integrada e aces", "indicadores": "Volume de vendas internacionais realizadas pelos produtores Quantidade de usuários ativos (produtores e compradores) Número de negociações fechadas na plataforma Aumento de acesso ao crédito via Banco do Brasil Nível de satisfação dos usuários (feedback/NPS) Tempo de fechamento de negociações (ganho de eficiência) Receita gerada para BBTS e BB", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.0, "rank": 44}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.32, "rank": 17}, "joao": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 16.52, "rank": 30}, "rafael": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 19.64, "rank": 43}, "laine": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 21.2, "rank": 15}, "dani": {"REL": 4, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 20.32, "rank": 15}, "manoel": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.76, "rank": 26}}}, {"id": 176, "titulo": "SLIP Digital", "autor": "Lauro Cesar Martins de Sousa", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT-CUI", "arena": "Eficiência Operacional e Automação", "trl": "6", "trl_fase": "Desenvolvimento de Protótipos (TRL 4–6) — Testes em ambiente controlado/simulado", "sol": "A proposta consiste na substituição do uso de documentos físicos no processo logístico do estoque por um modelo totalmente digital, no qual slips de separação e notas fiscais passem a ser disponibilizados e utilizados diretamente por meio de dispositivos móveis ou coletores de dados.\nNesse modelo, os documentos gerados pelo sistema passam a ser armazenados em ambiente digital e acessados em tempo real pelos operadores, eliminando a necessidade de impressão e manuseio de papel. A execução das atividades de separação e conferência passa a ser feita com base nessas informações digitais, com possibilidade de validação por meio de códigos de barras ou outros mecanismos de conferência automatizada.\nA solução prevê uma implantação gradual, iniciando por um projeto piloto em uma área específica do", "ben": "A implementação da digitalização dos slips de separação e notas fiscais no estoque trará ganhos relevantes em múltiplas dimensões da operação, impactando positivamente colaboradores, empresa e clientes.\n\n1-Redução de custos operacionais\nEliminação ou redução significativa de gastos com papel, toner, impressoras e manutenção\nDiminuição de custos indiretos relacionados ao retrabalho e erro operacional\nRedução de necessidade de arquivamento físico\n\n2-Aumento de eficiência e produtividade\nEliminação de etapas manuais (imprimir, distribuir e organizar documentos)\nAgilidade no processo de separação e conferência de materiais\n\n3-Redução de erros operacionais\n\nDiminuição de falhas humanas (troca de documentos, extravios, leitura incorreta)\nPossibilidade de validação por código de barras ou QR Code\nMaior assertividade na separação de itens\n\n4-Melhoria na rastreabilidade e controle\n\nRegistro digital de todas as movimentações\nFacilidade de auditoria e acompanhamento de processos\nAumento da transparência operacional\n\n5-Melhoria na experiência dos colaboradores\n\nRedução de atividades repetitivas e operacionais\nUso de tecnologia que facilita a execução das tarefas\nProcesso mais organizado, intuitivo e confiável\n\n6-Impacto positivo para clientes e parceiros\n\nMaior qualidade na separação e entrega de materiais\nRedução de erros que impactam diretamente o cliente\nMaior confiabilidade nos processos logísticos\n\n7-Alinhamento com práticas sustentáveis (ESG)\n\nRedução do consumo de papel e insumos\nMenor geração de resíduos\nContribuição direta para metas ambientais da empresa\n\n8-Evolução tecnológica da operação\n\nModernização dos processos logísticos\nBase para futuras automações e integração com sistemas\nAlinhamento com práticas de mercado e transformação digital\nAcesso imediato às informações por meio digital", "diferencial": "O diferencial da proposta está na mudança do modelo operacional, saindo de um processo baseado em documentos físicos para um fluxo totalmente digital, integrado e orientado por dados em tempo real. O diferencial da proposta está na transformação do processo como um todo, e não apenas na substituição do papel, promovendo uma operação mais digital, eficiente e orientada por dados.", "indicadores": "1-Indicadores de eficiência operacional  Tempo médio de separação de pedidos Tempo total do processo (da geração do slip até a finalização da separação) Produtividade por operador (itens separados por hora)  2-Indicadores de qualidade e redução de erros  Taxa de erro na separação de materiais Número de retrabalhos gerados Ocorrências de divergências entre pedido e envio   3-Indicadores financeiros  Redução de custos com papel, toner e impressão Economia com manutenção de impressoras Redução de custos indiretos associados a retrabalho   4-Indicadores de digitalização  Percentual de operações re", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 20.0, "rank": 8}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 19.12, "rank": 24}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 5, "total": 18.32, "rank": 9}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 21.24, "rank": 8}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 21.2, "rank": 16}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 19.5, "rank": 26}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 17.56, "rank": 14}}}, {"id": 177, "titulo": "Simulador Nacional de Crises Cibernéticas", "autor": "Paulo Luciano Goncalves da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GERED", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A proposta de solução em alto nível é o desenvolvimento de um simulador nacional de crises cibernéticas, capaz de reproduzir cenários realistas de ataques digitais e falhas operacionais em ambiente controlado. O objetivo é treinar equipes multidisciplinares para responder de forma coordenada e eficiente a incidentes críticos, utilizando IA, RPA e MultiCloud. Integrado às iniciativas de defesa digital da BBTS, o simulador fortalecerá a resiliência institucional, reduzirá o tempo de resposta e consolidará a empresa como referência nacional em gestão de crises cibernéticas.", "ben": "A implementação do simulador trará melhorias significativas na preparação e resposta a incidentes cibernéticos, impactando positivamente pessoas, processos e resultados institucionais.\n\n_xD83C__xDF0D_ Impactos Principais:\n\nPessoas: capacitação contínua e prática, fortalecendo competências técnicas e comportamentais em situações de crise.\n\nEmpresa (BBTS): aumento da resiliência digital e operacional, com protocolos testados e maior agilidade na tomada de decisão.\n\nClientes e Parceiros: maior confiança na segurança dos serviços prestados, reduzindo riscos e interrupções.\n\nMercado: posicionamento da BBTS como referência nacional em simulação e gestão de crises cibernéticas, estimulando boas práticas no ecossistema digital.\n\n_xD83D__xDE80_ Resultados Esperados:\n\nRedução de impactos financeiros e reputacionais em um único ambiente.\nO objetivo é reduzir custos, simplificar a operação e ampliar o acesso global, por meio de um modelo colaborativo e totalmente digital.", "ben": "NexPorta permitirá a redução de custos logísticos, simplificará os processos de importação e exportação e ampliará o acesso de pequenos e médios empreendedores ao comércio internacional.\nPara a BBTS, o projeto traz nova fonte de receita, expansão tecnológica e fortalecimento da inovação, além de potencializar a integração com serviços do Banco do Brasil (crédito e câmbio).\nTambém beneficia parceiros logísticos, ao gerar novos negócios, e contribui para a modernização e digitalização do comércio exterior no Brasil.", "diferencial": "A NexPorta se diferencia por integrar em uma única plataforma todas as etapas do comércio internacional, que hoje são fragmentadas, como logística, aduana e serviços financeiros.\nAlém disso, introduz um modelo inovador de compartilhamento de containers, reduzindo custos e permitindo que pequenos empreendedores acessem o mercado global — algo ainda pouco explorado no Brasil.", "indicadores": "O sucesso da NexPorta pode ser medido por indicadores como:  Número de usuários ativos e operações realizadas Volume financeiro movimentado na plataforma Redução de custos logísticos para os clientes Taxa de adesão de pequenos empreendedores Receita gerada e crescimento operacional", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 77 es e com busca eficiente;\nEstrutura organizada por temas como: solução de problemas e boas práticas;\nUso de templates padronizados para facilitar a criação de conteúdo;\nCuradores por área para organizar (não restringir) o conteúdo;\nEstímulo à cultura de compartilhamento.\nO foco principal será no conhecimento prático (“como fazer”) e não apenas em normas formais.", "ben": "Com a implementação da WIKIBBTS, os principais ganhos são:\nPara os colaboradores:\nAcesso rápido a soluções práticas e dicas do dia a dia.\nRedução de dúvidas e dependência de terceiros.\nPara a empresa:\nPreservação do conhecimento tácito.\nMaior produtividade e menos retrabalho.\nPadronização inteligente de práticas (sem engessar).\nFortalecimento da cultura de colaboração.\nPara clientes e parceiros:\nRespostas mais rápidas e assertivas.\nMelhor qualidade no atendimento e suporte.", "diferencial": "O principal diferencial é a mudança de cultura, não apenas a implantação de uma ferramenta.\nDiferente do modelo atual:\nSai de uma base estática e burocrática para uma base viva e colaborativa;\nValoriza o conhecimento tácito (\"pulos do gato\") e não só regras formais;\nIncentiva a participação ativa dos funcionários;\nUsa curadoria leve, evitando burocracia e incentivando agilidade;\nIntegra o uso da wiki ao dia a dia (ex: documentar respostas dadas no chat).", "indicadores": "Para medir o sucesso da iniciativa, podem ser utilizados os seguintes indicadores: Engajamento: Número de contribuições por mês Quantidade de usuários ativos Uso da plataforma: Número de acessos e buscas realizadas Tempo médio de navegação Eficiência operacional: Redução de dúvidas repetidas em canais internos Redução do tempo de resolução de problemas Qualidade percebida: Avaliação dos usuários sobre o conteúdo (ex: útil/não útil)", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 126}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 129}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 139}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 128}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 101}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 120}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 144}}}, {"id": 185, "titulo": "Cross Training (Treinamento Cruzado)", "autor": "Patricio Lofy", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CATJOI", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolver um programa estruturado de aprendizado baseado no conceito de Job Rotation, no qual os colaboradores interessados terão a oportunidade de vivenciar, por períodos definidos, diferentes áreas da empresa para adquirir conhecimento prático dos processos, promover integração e ampliar a visão sistêmica de todo negócio.", "ben": "Funcionários mais completos; Melhor comunicação entre setores; Redução de erros operacionais; Maior engajamento e Facilidade na cobertura de ausências", "diferencial": "Não temos conhecimento de um programa que tem objetivo de proporcionar uma visão mais ampla dos processos organizacionais, permitindo que os participantes adquiram conhecimento prático sobre as atividades de outros setores, fortalecendo a integração entre equipes e desenvolvendo uma compreensão sistêmica do negócio, contribuindo para o desenvolvimento profissional dos colaboradores, aumento da autonomia, redução de dependências operacionais e melhoria contínua dos processos internos e externos", "indicadores": "No final do programa, pode-se fazer uma avaliação final, uma reunião de feedbacks ou uma avaliação de aprendizado e até mesmo um certificado ou reconhecimento.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 127}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 130}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 140}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 129}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 102}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 121}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 145}}}, {"id": 186, "titulo": "Esteira Automatizada V360: Extração Inteligente e Envio Seguro de Documentos Fiscais em Lote", "autor": "Claudia Lucia Ribeiro Correa", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CESEC-FIN", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolvimento de uma Esteira de Automação Inteligente (RPA/API) para atuar no processo, dividida em duas etapas:1 - Extração e Formatação Automatizada: O robô faz a leitura direta da planilha Excel, extrai a coluna de RIs e separa os dados por vírgula. Em seguida, faz o login na pag. do V360, insere a sequência tratada na célula de filtro correspondente e faz o download em lote das notas para uma pasta segura; 2 - Ponto de Entrega Neutro e Seguro: a automação faz o upload do lote de notas para um repositório seguro e criptografado dentro do ambiente de nuvem corporativa, como o Microsoft Azure. Ao finalizar o upload, o sistema dispara um único e-mail para o escritório contendo um link seguro de acesso temporário. O parceiro valida sua identidade e baixa o lote de uma só vez.", "ben": "Ganho de Escala e Produtividade Gigante: Redução do tempo total de processamento, formatação e envio das quase 2 mil notas de horas para poucos minutos de execução automatizada.  \nFim do Retrabalho no Outlook: Eliminação completa da necessidade de dividir arquivos manualmente em pastas e gerenciar dezenas de e-mails para contornar o limite de 25 MB.\nSegurança Integrada e Proteção de Dados: Mitigação de riscos de vazamento ou interceptação de e-mails fiscais, substituindo anexos soltos por um portal seguro, criptografado e totalmente auditável dentro da infraestrutura de nuvem da própria BBTS.  \nConformidade de Estatal: Solução totalmente alinhada às regras de governança da Administração Pública, sem custos extras de contratação, aproveitando ferramentas já homologadas e disponíveis no catálogo tecnológico da empresa.", "diferencial": "Esse novo processo acaba com a fragmentação com o uso de três ferramentas separadas (Excel para copiar, Copilot para formatar e V360 para buscar) e unifica tudo num único robô que lê a planilha, trata o texto e faz o download de uma só vez. Em relação à entrega dos arquivos, a automação acaba com a divisão de pastas e com o envio massivo de emails, criando uma única pasta criptografada com links temporários dentro da nuvem da própria BBTS. O escritório baixa tudo de forma segura e direta.", "indicadores": "Tempo Médio de Atendimento (SLA): Redução do tempo gasto entre a leitura dos RIs no Excel e a disponibilização final das notas para o escritório terceirizado. Taxa de Ocupação de Canal: Redução drástica do tráfego de arquivos pesados na fila de saída do servidor do Outlook corporativo. Volume de Notas Processadas: Capacidade de extrair e transferir lotes superiores a 1.500 registros sem interrupções ou erros manuais de formatação.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 46}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 54}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 56}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 45}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 42}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 47}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 62}}}, {"id": 187, "titulo": "Gestão Inteligente de Locomoção (GIL)", "autor": "Savio Marinho Andrade", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "SUCOB.GECOB.DIOPE.PRESI.CONAD", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolver um aplicativo capaz de indicar a melhor rota para o atendimento dos chamados e para a busca de peças nos CATs.\nA solução pode ser estruturada em três etapas principais. A primeira consiste na centralização das informações de chamados, técnicos e deslocamentos em um único ambiente.\nEm seguida, propõe-se a aplicação de uma regra de decisão que considere distância, tempo de deslocamento, prioridade e SLA, permitindo a definição automática do técnico mais adequado para cada atendimento.\nPor fim, a solução deve contemplar o monitoramento em tempo real, por meio de indicadores claros, possibilitando ajustes ágeis sempre que necessário.", "ben": "BENEFÍCIOS:\nO primeiro benefício é a otimização da rotina do técnico, que passa a contar com apoio tecnológico para identificar a melhor rota até o local de destino. Como consequência, há maior transparência no percurso realizado, o que se torna ainda mais relevante considerando que, enquanto empregados da Administração Pública, temos um compromisso reforçado com a moralidade, a transparência e a eficiência dos nossos atos.\nOutro benefício direto é a redução dos custos com locomoção, proporcionando não apenas economia financeira, mas também maior sustentabilidade no consumo de combustível.\nPara viabilizar esses ganhos, são utilizados recursos como: algoritmo de roteirização, machine learning para previsão de tempo de deslocamento, integração com sistemas de mapas (Google Maps API ou OpenStreetMap), além de banco de dados com histórico de chamados, desempenho dos técnicos e estimativa de consumo.", "diferencial": "Embora já exista o recurso de geolocalização, sua aplicação ainda é limitada quando se trata de soluções que agreguem valor efetivo aos objetivos estratégicos da empresa. O diferencial desta proposta está na transição de um modelo operacional reativo para um modelo de decisão orientado por dados.\nAtualmente, a distribuição de chamados considera, principalmente, a disponibilidade dos técnicos. A proposta, por sua vez, integra variáveis como distância, tempo de deslocamento, prioridade e SLA.", "indicadores": "Tempo total de atendimento (TMA), Tempo médio de deslocamento, Combustível e locomoções", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 18.0, "rank": 47}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 19.42, "rank": 15}, "joao": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 16.08, "rank": 35}, "rafael": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 19.44, "rank": 60}, "laine": {"REL": 3, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 21.0, "rank": 19}, "dani": {"REL": 4, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 20.5, "rank": 13}, "manoel": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.46, "rank": 30}}}, {"id": 189, "titulo": "Integração de Relatório de Coparticipação Unimed à Folha de Pagamento", "autor": "Rubia Priscila Wessler de Carvalho Wagner", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Gered - Ceman Curitiba", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A solução consiste em integrar os dados de coparticipação da Unimed ao sistema de folha de pagamento, organizando essas informações por colaborador e gerando automaticamente um relatório detalhado com a discriminação dos valores descontados.\nEsse relatório será disponibilizado junto ao holerite e também em um ambiente digital (intranet e/ou aplicativo), onde o colaborador poderá acessar, consultar histórico e baixar os documentos sempre que necessário.", "ben": "Para os colaboradores: Maior transparência sobre os descontos de coparticipação;\nFacilidade de acesso às informações (via intranet ou aplicativo);\nPara o RH / Departamento Pessoal: Redução significativa de atendimentos e retrabalho com esclarecimentos;\nPadronização e organização das informações;", "diferencial": "O que torna essa iniciativa diferente é a integração completa, automatizada e acessível das informações, aliando transparência com tecnologia.\nAtualmente, as informações de coparticipação existem de forma fragmentada e pouco detalhada (normalmente apenas um valor total na folha), exigindo contato com o RH para esclarecimentos.", "indicadores": "Custo operacional, redução de retrabalho para o RH.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 15.0, "rank": 171}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 16.32, "rank": 171}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 12.88, "rank": 182}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 17.04, "rank": 173}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 18.8, "rank": 155}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 16.72, "rank": 160}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 12.86, "rank": 185}}}, {"id": 191, "titulo": "Negocia+", "autor": "Edvaldo Moreira da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CECOB Lauro de Freitas", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolver um painel interativo de apoio à negociação, integrado aos sistemas já utilizados (CRM/discador), que acompanhe as interações em tempo real (ligações ou chat) e ofereça suporte inteligente ao operador.\nO painel irá:\nAnalisar linguagem, tom e sinais da conversa\nIdentificar o estado emocional do cliente (ex: resistência, colaboração, irritação)\nMonitorar a evolução da negociação\nSugerir abordagens, frases e ajustes de comunicação em tempo real\nAlém disso, apresentará um indicador visual simples do “clima da negociação” (ex: frio, estável, construtivo ou risco de conflito).\nPara a gestão, o sistema fornecerá indicadores agregados sobre qualidade das negociações, perfil dos operadores e níveis de tensão nas interações, permitindo atuação preventiva e desenvolvimento da equipe.\nA sol", "ben": "A implementação da solução trará ganhos amplos:\nPara a operação\nAumento da taxa de acordos sustentáveis\nRedução de conflitos e retrabalho\nMaior eficiência nas negociações\nPara as pessoas (operadores)\nRedução do desgaste emocional\nApoio em tempo real nas interações mais críticas\nDesenvolvimento de comunicação assertiva\nPara a empresa BBTS\nMelhoria na qualidade do atendimento\nRedução de riscos reputacionais e reclamações\nAlinhamento com práticas de atendimento mais empáticas e responsáveis\nPara clientes\nExperiência mais respeitosa e humanizada\nNegociações mais claras e adequadas à sua realidade", "diferencial": "O diferencial no modelo de atuação:\nAtua em tempo real, e não apenas com análise ou correção posterior: Integra resultado financeiro com qualidade da interação, por meio de indicadores como o Índice de Qualidade da Negociação (IQN): Coloca o operador no centro, potencializando sua capacidade, em vez de substituí-lo: Introduz uma abordagem de negociação assistida e humanizada, ainda pouco explorada em operações de cobrança: Permite uma atuação gerencial mais estratégica e preventiva.", "indicadores": "Conversão;  Valor Recuperado; Conversão por Contato; Tempo Médio de Negociação; Taxa de Recontato/Reabertura de negociação.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 16.0, "rank": 128}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 17.02, "rank": 109}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 13.28, "rank": 167}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 17.84, "rank": 149}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 19.4, "rank": 125}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 17.7, "rank": 105}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.26, "rank": 170}}}, {"id": 193, "titulo": "AITR‑BBTS: Plataforma de Auditoria do Trabalho Real", "autor": "Julio Cesar Torres Goncalves dos Santos", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CEPLAN", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A proposta consiste na criação da AITR‑BBTS (Auditoria Institucional do Trabalho Real), uma tecnologia organizacional inédita para analisar, auditar e reconfigurar o funcionamento real das operações. Em vez de atuar apenas sobre processos formais e indicadores, a AITR transforma a distância entre o prescrito e o executado em objeto técnico de análise, medição e decisão. Por meio de auditorias estruturadas do trabalho real, a solução identifica retrabalho, ajustes informais, distorções de indicadores e mecanismos ocultos que sustentam a operação, permitindo reengenharia baseada na realidade e não apenas no modelo formal.", "ben": "A AITR‑BBTS permite reduzir retrabalho estrutural, exceções recorrentes e custos invisíveis que hoje não aparecem nos indicadores tradicionais.\nAo tornar auditável a distância entre o prescrito e o trabalho real, a solução melhora a qualidade das decisões, aumenta a aderência entre norma e prática, reduz riscos operacionais e fortalece a governança.\nAlém dos ganhos operacionais, a iniciativa cria um ativo intelectual próprio para a BBTS, com potencial de replicação interna, formação especializada e evolução para nova linha de serviço tecnológico.", "diferencial": "A AITR‑BBTS não propõe apenas melhorar processos: ela desloca o próprio objeto da gestão. Enquanto soluções tradicionais operam sobre fluxos formais, indicadores e automação, a AITR atua sobre o trabalho real, tornando auditável a parte invisível da operação: retrabalho, compensações informais, distorções e mecanismos ocultos de sustentação. Seu diferencial é converter esse invisível em base técnica de decisão, criando uma tecnologia replicável com potencial de nova linha de serviço para a BBTS", "indicadores": "Redução da DIT (Dívida Institucional do Trabalho), medida por menor retrabalho, menos exceções e menor dependência de compensações informais | Redução do ATR (Atrito Técnico-Regulatório) entre prescrição formal e execução prática | Queda de exceções operacionais e correções manuais | Maior aderência entre norma, processo e prática real | Redução do tempo efetivo de execução dos fluxos críticos", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 48}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 55}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 57}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 46}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 43}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 48}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 63}}}, {"id": 194, "titulo": "Prevenção à Atos de Vandalismo", "autor": "Nilton da Silva Amaral", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Cat Joi", "arena": "Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolver um dispositivo de segurança lincado ao host BB com leitor biométrico onde possa ser validado apenas o acesso de Clientes BB no interior das agências nos horários pré determinados", "ben": "Segurança das Salas do SAA", "diferencial": "Hoje não há nenhuma restrição aos acessos das Salas de SAA e qualquer pessoa pode adentrar e cometer qualquer tipo de sinistro se tiver a má intenção", "indicadores": "Se ocorrer a diminuição dos inúmeros casos de vandalismo que ocorrem atualmente", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "AUSENTE", e as áreas, reduz duplicidades e fortalece o alinhamento estratégico, contribuindo para decisões mais eficientes, melhor utilização dos recursos e para a mitigação de contratações emergenciais.\nAlém disso, é fundamental destacar que o Plano de Contratações Anual (PCA) é um processo indispensável para a Companhia, pois organiza, direciona e confere previsibilidade às contratações ao longo do ano. Nesse contexto, sua adequada elaboração contribui diretamente para o planejamento antecipado das contratações, reduzindo a necessidade de contratações emergenciais.\nNesse sentido, é essencial que o PCA seja amplamente conhecido e compreendido por todos os colaboradores, garantindo maior engajamento das áreas e contribuindo para uma gestão mais integrada, estratégica e orientada a resultados.", "diferencial": "As áreas passam a ter maior autonomia ao registrar diretamente suas demandas no Sisccon, eliminando a necessidade de envio de e-mails pela Dipli. Durante o período definido para o PCA, o sistema emitirá alertas automáticos para garantir o cumprimento dos prazos.\nAs solicitações ficarão visíveis para todas as áreas, proporcionando uma visão integrada das demandas, incentivando a colaboração e possibilitando a consolidação de necessidades similares, incluindo oportunidades de contratações conjunta", "indicadores": "Indicadores como redução de retrabalho, diminuição de demandas duplicadas, tempo de processamento das solicitações e aumento da padronização das informações. Também será avaliado o nível de adesão ao uso do Sisccon e a melhoria na assertividade das contratações.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 49}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 56}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 58}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 47}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 44}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 49}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 64}}}, {"id": 196, "titulo": "AIBH - ATENDIMENTO INTELIGENTE BASEADO EM HISTÓRICO", "autor": "Josiane Cristina Soares Ribas", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Gered- Ceman Curitiba", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolver um aplicativo inteligente que analise o histórico de atendimentos e falhas, gerando diagnósticos e recomendações automáticas para orientar o técnico e evitar retrabalho.", "ben": "Redução de custos operacionais, diminuição de falhas e retrabalho, maior rapidez no atendimento, aumento da resolutividade na primeira visita e melhoria na disponibilidade dos equipamentos, beneficiando técnicos, empresa e clientes.", "diferencial": "Utiliza análise inteligente do histórico para prever e recomendar soluções no atendimento técnico, transformando dados existentes em decisões práticas, reduzindo retrabalho e aumentando a eficiência de forma automatizada.", "indicadores": "Redução de chamados repetidos, diminuição do tempo de atendimento, menor troca de peças, aumento da resolutividade na primeira visita e melhoria na disponibilidade dos equipamentos.", "ganhos": "Ganhos de eficiência (redu
