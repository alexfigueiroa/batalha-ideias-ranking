traz ganhos diretos para pessoas, operação e negócio, especialmente ao eliminar barreiras de acesso ao conhecimento e ampliar a capacidade de todos aprenderem e performarem com equidade em ambientes corporativos.\nPara as pessoas (colaboradores)\n- Aprendizado mais rápido, contínuo e acessível no dia a dia\n- Maior clareza sobre como executar tarefas corretamente, independentemente do perfil ou necessidade\n- Redução de erros com aumento da confiança e autonomia na execução\n- Acesso equitativo ao conhecimento, incluindo PcD e diferentes perfis cognitivos\nPara a operação \n- Padronização de processos e práticas com acessibilidade incorporada\n- Redução de falhas operacionais, incluindo aquelas causadas por barreiras de entendimento ou acesso\n- Aumento da produtividade e eficiência de forma distribuída entre diferentes perfis de equipes\n- Execução consistente com menor dependência de conhecimento informal\nPara a empresa\n- Escala do conhecimento de forma estruturada e inclusiva\n- Aceleração de resultados com menos retrabalho e menor desigualdade de performance entre grupos\n- Maior alinhamento entre estratégia e execução\n- Ampliação da força produtiva por meio da inclusão (mais pessoas performando no mesmo nível)\nPara clientes e parceiros\n- Melhor qualidade na entrega\n- Experiência mais consistente\n- Redução de erros que impactam o cliente final\n- Atendimento mais inclusivo e adaptado a diferentes perfis de clientes e contextos", "diferencial": "A solução não apenas compartilha conhecimento, garante aplicação e resultados mensuráveis. Diferente dos modelos tradicionais, que isolam aprendizado da operação, essa proposta: Integra o conhecimento ao fluxo de trabalho, tornando-o acionável e acessível para todos; Foca na execução, garantindo compreensão e aplicação com equidade; e Fecha o ciclo de valor, conectando aprendizado ao impacto real no negócio com consistência e inclusão.", "indicadores": "Sucesso = NSM alta (produtividade ↑ + erros ↓) + IEI alto (performance com equidade),  Aumento consistente de produtividade, Redução relevante de erros operacionais, Maior aplicação prática do conhecimento,  Redução de retrabalho, Tempo menor de aprendizado, Alto uso ativo da plataforma, Engajamento contínuo com conteúdos, Aplicação no dia a dia, Resultado de inclusão (diferencial), IEI alto (≥ 75) → indica equidade de aprendizado e execução Redução de gaps de performance entre perfis, Alto acesso e conclusão por PcD, Conteúdos amplamente acessíveis", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.0, "rank": 11}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.02, "rank": 6}, "joao": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 16.92, "rank": 20}, "rafael": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.44, "rank": 12}, "laine": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 21.8, "rank": 5}, "dani": {"REL": 4, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 21.3, "rank": 5}, "manoel": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.16, "rank": 17}}}, {"id": 52, "titulo": "Assistente Virtual com IA para consulta de documentos corporativos", "autor": "Gabrielle Coelho Da Silva Almeida", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Dicos/Gefic", "arena": "Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Proposta de solução (alto nível)\nA proposta consiste em potencializar o uso do chatbot Cesar, já disponível no Teams, como principal canal de consulta aos normativos da BBTS.\nO Cesar passaria a ser alimentado com a base atualizada de normativos, permitindo que os colaboradores realizem perguntas em linguagem natural e recebam respostas rápidas, objetivas e fundamentadas nos documentos oficiais, com indicação da fonte.\nAlém disso, o chatbot pode consolidar informações de diferentes normativos sobre o mesmo tema, reduzindo conflitos e facilitando a compreensão, atuando como um ponto central de acesso ao conhecimento.\nDessa forma, a solução aproveita uma ferramenta já existente, ampliando sua capacidade para tornar o acesso aos normativos mais simples, ágil e confiável no dia a dia dos colabo", "ben": "A implementação de um chatbot com acesso aos normativos trará mais agilidade e precisão na consulta de informações, permitindo respostas rápidas e centralizadas.\nPrincipais ganhos:\n*Acesso facilitado e imediato aos normativos, reduzindo o tempo de busca\n*Maior autonomia dos colaboradores para esclarecer dúvidas sem depender de outras pessoas\n*Redução de erros operacionais causados por interpretações incorretas ou informações desatualizadas\n*Padronização das respostas e do entendimento das normas em toda a empresa\n*Diminuição da sobrecarga dos colaboradores mais experientes com dúvidas recorrentes\n*Apoio ao treinamento de novos funcionários, tornando o processo mais rápido e eficiente\n*Consolidação de informações de diferentes normativos sobre o mesmo tema, evitando conflitos\n*Atualização contínua e centralizada das informações, garantindo maior confiabilidade\n*Aumento da produtividade e redução de retrabalho\n*Gerar estatísticas sobre as principais dúvidas e identificar necessidades de novos normativos\n*Melhoria na qualidade das entregas e na conformidade com normas internas\nDe forma geral, a iniciativa melhora a gestão do conhecimento na empresa, tornando o acesso à informação mais inteligente, eficiente e escalável.", "diferencial": "Hoje, o acesso aos normativos é feito exclusivamente pela intranet, exigindo leitura direta dos documentos e busca manual das informações. Esse modelo é pouco eficiente, consome tempo e aumenta o risco de interpretações incorretas.\nNa prática, essa dificuldade faz com que muitos colaboradores recorram a ferramentas externas (como copilots públicos) para resumir normas e tirar dúvidas, o que gera risco de vazamento de informações e perda de controle sobre a qualidade e a confiabilidade das respos", "indicadores": "Uso e adesão: Número de acessos/consultas ao chatbot Cesar; Percentual de colaboradores utilizando a ferramenta; Redução de acessos diretos aos normativos na intranet. Eficiência operacional: Redução do tempo médio para encontrar informações; Diminuição do volume de dúvidas direcionadas a colegas ou áreas de suporte; Redução do tempo de integração de novos funcionários. Qualidade e conformidade: Redução de erros operacionais relacionados à interpretação de normas; Aumento da padronização nas respostas e processos; Número de inconsistências entre normativos identificadas e corrigidas. Segurança", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 66}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.62, "rank": 72}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.12, "rank": 110}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.84, "rank": 71}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 59}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.5, "rank": 65}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.96, "rank": 114}}}, {"id": 53, "titulo": "BB Connect Imóveis - Corretor de Imóveis Digital", "autor": "Hamilton Carvalho Rocha", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Estagiários BBts", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A solução consiste na criação de uma plataforma digital inteligente que funcione como um corretor de imóveis virtual, conectando clientes, imóveis e financiamento bancário em um único ambiente digital, o sistema utilizará inteligência artificial para entender o perfil do cliente e recomendar imóveis compatíveis com sua renda, localização desejada e necessidades pessoais, a jornada será simples, rápida e automatizada, reduzindo burocracias e melhorando a experiência do usuário, a plataforma também poderá integrar serviços do banco, permitindo; simulação de financiamento em tempo real, análise inicial de crédito, agendamento de visitas, envio digital de documentos, acompanhamento do processo de compra, a ideia é transformar um processo tradicional e demorado em uma experiência incrível.", "ben": "Podendo aumentar seu fluxo de clientes, mais financiamentos bancários, modernização digital, redução de atendimento manual, melhor experiencia do cliente, agregando valor a instituição, mais segurança nas negociações e trazendo credibilidade para os clientes.", "diferencial": "O que torna essa ideia diferente e a experiência do cliente com o resultado positivo em suas buscas, com uma integração inteligente dando ao cliente comodidade e transparecia, em transformar toda sua jornada de busca imobiliária em uma só plataforma, trazendo menos burocracia, atendimento 24 horas, processo rápido e pratico, mais segurança, escolha personalizada com tudo em um só lugar. O diferencial não está apenas em buscar imóveis, mas em transformar essa jornada em uma realização de senhos.", "indicadores": "Indicadores de Negocio, Indicadores de Experiencia do Cliente, Indicadores de Inteligência Artificial, Indicadores Operacionais, Indicadores Estratégicos para BBts/BB.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["NÃO ELEGÍVEL", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 19.0, "rank": 12}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.62, "rank": 12}, "joao": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 3, "total": 17.92, "rank": 12}, "rafael": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 20.44, "rank": 13}, "laine": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 21.4, "rank": 11}, "dani": {"REL": 4, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 20.52, "rank": 12}, "manoel": {"REL": 3, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 17.96, "rank": 9}}}, {"id": 54, "titulo": "Logística Reversa 4.0: Automação de Baixa de Peças via QR Code Dinâmico.", "autor": "Hausbleno Moreira Porto", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "gered - cat sps", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A solução consiste na criação de Etiquetas Inteligentes para as peças. \nAo invés de o técnico abrir um link vazio e digitar tudo manualmente, ele utilizará a câmera do celular para ler um QR Code dinâmico colado na peça.\nEste código já 'carrega' as informações da Nota Fiscal e do item para dentro do formulário. O técnico apenas valida o status da peça (se está boa ou ruim) e clica em enviar.\n É a digitalização total da baixa de materiais, transformando um processo burocrático de minutos em uma ação simples de poucos segundos.", "ben": "Agilidade: Redução do tempo de preenchimento de 5 minutos para 30 segundos.\nAcuracidade: Eliminação de 100% dos erros de digitação de códigos e bases.\nGestão Dia: Baixa imediata sistêmica, garantindo que o indicador EFICAT reflita a realidade em tempo real.\nOtimização de Espaço: Gatilho rápido para coleta, evitando acúmulo de material parado nas agências.", "diferencial": "O diferencial desta ideia é a automação por preenchimento prévio (Parâmetros de URL).  Diferente do que existe hoje — onde o QR Code apenas abre um link genérico e o técnico precisa digitar dados que a empresa já possui - a minha proposta faz o sistema 'conversar' com o formulário. O que torna a ideia única é: Inteligência de Dados: O código já nasce com a 'identidade' da peça (NF, Item, CAT). Simplificação Radical:  Removemos o técnico da função de 'digitador.", "indicadores": "EFICAT (Acuracidade do Indicador): Redução drástica de pendências \"fantasmas\" no sistema. O sucesso será atingido quando o indicador refletir o status real das peças em Dia (baixa no mesmo dia). Logística Reversa: Redução do tempo entre a instalação da peça nova e o gatilho de coleta da peça substituída. Menos tempo de peça \"parada\" na agência. Taxa de Erro de Dados: Comparação entre o número de registros com informações de NF/Código divergentes antes e depois da implementação (meta: zero erro de digitação).Produtividade Técnica: Mensuração do tempo médio gasto pelo téc no processo de baixa.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 106}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 120}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 131}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 120}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 92}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 111}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 136}}}, {"id": 56, "titulo": "Busca Visual Inteligente: Identificação de Peças por Imagem via Mobile", "autor": "Casiano Pires Santos", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT-SLU", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Implementar um módulo de Visão Computacional (IA) integrado à câmera do smartphone no sistema de consulta da BBTS. O técnico tiraria uma foto da peça e a aplicação realizaria o reconhecimento automático, direcionando instantaneamente para o código, descrição e foto ilustrativa no banco de dados. A solução funcionaria como um \"Google Lens\" corporativo, focado exclusivamente no catálogo de peças da empresa.", "ben": "Agilidade Técnica: Redução drástica no tempo de consulta e identificação em campo.\n​Precisão Operacional: Eliminação de erros de digitação e pedidos de peças incorretas.\n​Eficiência Logística: Redução de custos com fretes de devolução e reenvio de peças.\n​Capacitação: Facilita a curva de aprendizado para técnicos em novos equipamentos, aumentando a assertividade da equipe desde o primeiro dia.", "diferencial": "Diferente da busca atual que é passiva (depende de texto/código inserido pelo usuário), esta solução é proativa e baseada em dados visuais. Ela utiliza tecnologias modernas de Inteligência Artificial para simplificar um processo burocrático e técnico, transformando o celular do colaborador em uma ferramenta de diagnóstico inteligente e imediata.", "indicadores": "TMA (Tempo Médio de Atendimento): Redução do tempo gasto na etapa de identificação e requisição./ ​Taxa de Erro na Requisição: Diminuição no percentual de peças solicitadas incorretamente por erro de identificação./ ​Volume de Consultas por Imagem: Mensurar a adesão dos técnicos à nova tecnologia./ ​SLA de Reparo: Melhoria no tempo total de restabelecimento dos serviços devido à agilidade na peça correta.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 107}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 121}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 132}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 121}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 93}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 112}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 137}}}, {"id": 57, "titulo": "conecta", "autor": "Hausbleno Moreira Porto", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Cat - SPS", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Em resumo, a solução não tenta substituir os sistemas oficiais da empresa, mas sim criar uma camada de inteligência e unificação que aproveita as ferramentas que já possuímos (Teams e SharePoint) para entregar suporte técnico em tempo real, com segurança e agilidade.\nCONECTA é uma solução de \"atrito zero\". O técnico não precisa aprender a usar um sistema novo e complexo; ele apenas passa a usar o Teams (que já conhece) de uma forma muito mais poderosa e integrada.", "ben": "A implementação do CONECTA trará ganhos estruturais e financeiros, divididos em quatro pilares principais:\n1. Para a Empresa (Soberania e Segurança):\nSegurança da Informação: Migração de dados técnicos sensíveis e fotos do WhatsApp (ambiente externo) para o ambiente controlado e auditável do Microsoft Teams/Azure.\nRetenção de Capital Intelectual: Transformação do \"conhecimento tácito\" dos técnicos em um ativo digital permanente. A IA aprende com as soluções de campo, garantindo que o conhecimento não saia da empresa com a rotatividade de pessoal.\nRedução de Custos Logísticos: Menor índice de solicitações de peças equivocadas e redução de revisitas (rework) devido a diagnósticos mais precisos via IA e consulta ágil de estoque.\n2. Para o Técnico de Campo (Produtividade e Ergonomia Digital):\nJanela Única (Single Pane of Glass): Redução drástica da \"fadiga de decisão\" ao unificar Suporte, Manuais (SharePoint) e Estoque em uma única interface no Teams.\nAutonomia Técnica: Respostas instantâneas da IA para dúvidas complexas e códigos de erro, mesmo em locais de difícil acesso, reduzindo a pressão e o estresse no atendimento.\n3. Para o Cliente (Qualidade e Disponibilidade):\nMelhoria no SLA: Redução do Tempo Médio de Atendimento (TMA), devolvendo a disponibilidade dos equipamentos (ATMs, Recicladoras, etc.) ao cliente final com maior rapidez.\n\nAumento do FTF (First Time Fix): Maior probabilidade de resolver o problema logo na primeira visita, elevando o índice de satisfação do cliente (NPS).\n\n4. Para a Gestão (Visibilidade e Dados):\nDados para Tomada de Decisão: Geração de relatórios sobre quais equipamentos geram mais dúvidas ou quais peças são mais consultadas, permitindo ações preventivas e melhor planejamento de compras e treinamentos.", "diferencial": "O grande diferencial do CONECTA não é apenas o uso da Inteligência Artificial, mas a unificação de silos em um ambiente de soberania digital. O que o torna único é: Convergência de Ferramentas: Diferente do cenário atual, onde o técnico atua como um \"integrador manual\" (copiando dados entre Field Service, WhatsApp, SharePoint e Sistemas de Estoque), o CONECTA centraliza toda a camada de inteligência em uma única janela de chat.\nAprendizado Orgânico /Segurança Cibernética /Baixa Barreira d Adoção", "indicadores": "Eficiência: Redução do TMA (Tempo Médio de Atendimento) e aumento do FTF (Resolução na Primeira Visita) devido ao acesso imediato a manuais e estoque.  Adoção: Percentual de migração dos técnicos do suporte informal (WhatsApp) para o oficial (Teams).  Logística: Queda no índice de pedidos de peças incorretas e redução de custos com deslocamentos para revisitas.  Conhecimento: Volume de novas soluções documentadas automaticamente pela IA a partir das interações de campo.  Segurança: Redução do tráfego de dados sensíveis em redes externas", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 108}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 122}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 133}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 122}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 94}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 113}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 138}}}, {"id": 58, "titulo": "PROJETO ESTRATÉGICO PARA AUMENTO DA POSITIVIDADE NOS RESULTADOS DE ENTREGA DOS SERVIÇOS – CATS BBTS", "autor": "Sandro Habekost de Oliveira", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT Uberlândia", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A solução que propomos combina quatro pilares práticos e integrados:\nPrimeiro , um diagnóstico honesto da realidade de cada CAT, ouvindo a equipe e analisando dados operacionais antes de agir. Depois, um programa de capacitação contínua técnica e comportamental, com mentoria entre os próprios colaboradores, valorizando o conhecimento que já existe dentro de casa.\nNa sequência, uma gestão por desempenho real, com KPIs objetivos que tornam o progresso visível para todos. E por fim, um sistema de engajamento e reconhecimento baseado em gamificação e reuniões quinzenais, criando um ambiente onde cada técnico se sente parte do resultado.\nA estratégia começa por um projeto piloto em um CAT, aprende com a prática e depois se expande para as demais unidades, com método e resultados mensuráveis.", "ben": "A implementação deste projeto gerará benefícios concretos e mensuráveis para cada parte envolvida:\nPara a equipe técnica, o programa de treinamentos contínuos, mentoria e reconhecimento trará mais capacitação, autonomia e motivação. Técnicos mais preparados se sentem mais valorizados, o que fortalece o comprometimento e reduz a rotatividade.\nPara a operação da BBTS, a redução estimada no retrabalho, no tempo médio de reparo e o aumento na resolutividade no primeiro atendimento significam mais eficiência, menos custos operacionais e maior capacidade de atendimento sem ampliar o quadro de pessoal, gerando impacto direto na lucratividade.\nPara o Banco do Brasil, nosso principal cliente, a melhoria na agilidade, precisão e profissionalismo dos atendimentos elevará o índice de satisfação, fortalecendo a confiança e a parceria estratégica de longo prazo.\nPara a BBTS como empresa, a consolidação de uma cultura de alta performance, responsabilização e melhoria contínua posiciona a companhia como referência no mercado de serviços técnicos, abrindo portas para novos contratos e oportunidades de negócio.\nEm síntese: o projeto não apenas corrige falhas operacionais, mas construindo as bases para uma BBTS mais forte, mais competitiva e mais preparada para o futuro.", "diferencial": "O diferencial está na integração. Diagnóstico, capacitação, KPIs, mentoria entre colegas, gamificação e responsabilização reunidos em um único sistema desenhado de dentro pra fora a partir da realidade dos CATs e das pessoas que neles trabalham. Não é uma solução importada e sim uma abordagem que valoriza o conhecimento interno, dá protagonismos a quem está na ponta e faz a melhoria acontecer de forma natural e reconhecida.", "indicadores": "O sucesso será visível nos números e sentido no comportamento das equipes. Os indicadores que utilizaremos serão: retrabalho, resolutividade no 1° atendimento, tempo médio de reparo, satisfação dos clientes, capacitação da equipe e engajamento. Todos sendo monitorados mensalmente, com relatórios que orientam ajustes rápidos. Saberemos que tivemos sucesso com o aumento dos números e quando cada técnico chegar no cliente com mais preparo, confiança e orgulho no que entrega.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 25}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 39}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 43}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 29}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 26}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 33}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 49}}}, {"id": 59, "titulo": "IAprovve - Smart Notes", "autor": "Silvana Lucia da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Dires/Gered", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Implementar o IAprovve, uma solução de Inteligência Artificial integrada ao sistema Aprovve, capaz de apoiar automaticamente a elaboração de Notas Técnicas a partir do tema informado pelo usuário. A ferramenta irá sugerir textos, estruturas e conteúdos com base no histórico de notas já aprovadas, promovendo padronização, qualidade técnica e agilidade no processo. O IAprovve atuará ainda como um assistente de escrita, auxiliando na correção ortográfica, concordância, clareza textual e adequação da linguagem técnica e institucional, contribuindo para documentos mais consistentes e bem redigidos. Além disso, apoiará a gestão na tomada de decisão, com documentos mais objetivos e estruturados, fornecendo resumos executivos para análise dos aprovadores, pareceristas e comitês.", "ben": "A integração de Inteligência Artificial ao processo de elaboração de Notas Técnicas no sistema Aprovve (Decisão) trará aumento significativo de produtividade na elaboração de Notas Técnicas, reduzindo tempo gasto, retrabalho e dependência excessiva da experiência individual dos colaboradores. A solução promoverá padronização da linguagem e da estrutura dos documentos, melhoria na qualidade técnica desde a origem e redução de riscos de omissões ou inconsistências. Além disso, transformará o histórico de notas já aprovadas em conhecimento institucional ativo, apoiando a tomada de decisão, fortalecendo a governança e contribuindo para a modernização e transformação digital dos processos da BBTS.", "diferencial": "O IAprovve se diferencia por atuar como uma Inteligência Artificial integrada que utiliza o histórico de Notas Técnicas e pareceres aprovados da própria BBTS como base de conhecimento ativa e retroalimentada, apoiando elaboradores, pareceristas, aprovadores e comitês de aprovação. O Aprovve deixa de ser apenas um sistema manual e passa a atuar como um sistema inteligente de gestão do conhecimento e apoio à decisão institucional, algo inexistente hoje no processo.", "indicadores": "O próprio sistema poderá fornecer dados que poderão gerar indicadores como: redução do tempo médio de elaboração de NTs; redução do tempo médio de elaboração de pareceres;redução de devoluções para ajustes; redução do tempo de análise por aprovadores, pareceristas e comitês; quantidade de notas elaboradas com apoio do IAprovve; uso de resumos automáticos nas decisões; reaproveitamento de notas e pareceres semelhantes sugeridos pela IA; pesquisas de satisfação com usuários, pareceristas e integrantes dos comitês de aprovação.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 109}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 123}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 134}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 123}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 95}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 114}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 139}}}, {"id": 60, "titulo": "RFID AOS INVENTÁRIOS BBTS", "autor": "Fabio Nazareno da Costa", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT BELÉM PA.....7784", "arena": "Eficiência Operacional e Automação", "trl": "8", "trl_fase": "Testes Operacionais e Comercialização (TRL 7–9) — Solução pronta ou em operação", "sol": "As vantagens do RFID:\nAs principais vantagens da utilização das etiquetas RFID em cenários logísticos e na gestão de estoques: \n– Capacidade de armazenamento, leitura e envio dos dados – as etiquetas RFID permitem a gravação de informações nas mesmas;\n– Detecção sem necessidade da proximidade da leitora para o reconhecimento dos dados – as etiquetas RFID podem ser lidas a distância;\n– Durabilidade das etiquetas com possibilidade de reutilização;\n– Redução de erros comuns nos estoques;\n– Contagem instantânea de estoque, facilitando os sistemas empresariais de inventário;\n– Precisão nas informações de armazenamento e velocidade na expedição – tanto a armazenagem como os processos de picking e packing são agilizados;\n– Localização dos itens ainda em processos de busca – separação.", "ben": "Eficiência operacional e controle no estoque.\nEssa tecnologia já é utilizada em empresas de médio e grande porte, principalmente quando se trata de grandes estoques de produtos, onde o controle deve ser atualizado rapidamente. Se o produto possui uma etiqueta RFID, com sensores nas prateleiras e/ou sessões do estoque, facilmente será identificado quando houver entrada e saída de estoque.", "diferencial": "– Melhoria no reabastecimento com eliminação de itens faltantes e aqueles com validade vencida;\n– Prevenção de roubos e falsificação de mercadorias;\n– Otimização do processo de gestão, permitindo às companhias operarem com muito mais agilidade e garantindo capacidade operacional menor, pois os processos são \nmais assertivos.", "indicadores": "Logístico", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 5}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 5, "total": 19.0, "rank": 13}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 5, "total": 18.42, "rank": 33}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 5, "total": 17.78, "rank": 13}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 5, "total": 20.0, "rank": 21}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 5, "total": 20.2, "rank": 60}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 4, "FAC": 5, "total": 18.12, "rank": 82}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 5, "total": 17.3, "rank": 15}}}, {"id": 62, "titulo": "Analise preditiva Chamados.", "autor": "Pedro Stefano Souto Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "7131", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": a plataforma corporativa baseada em Inteligência Artificial Generativa para centralizar conhecimento técnico e operacional da BBTS, auxiliando equipes no atendimento, suporte e resolução de incidentes.\n\nA solução funcionará como um assistente inteligente integrado aos sistemas internos, bases de conhecimento, documentações e ferramentas de chamados da empresa. Por meio de linguagem natural, os colaboradores poderão realizar perguntas, consultar procedimentos, localizar soluções já utilizadas anteriormente e receber recomendações automáticas para resolução de problemas.\n\nA plataforma utilizará IA para:\n\nbuscar informações de forma inteligente;\nsugerir soluções para incidentes;\nresumir chamados automaticamente;\napoiar análises técnicas;\ngerar documentação operacional;", "ben": "A implementação da solução proporcionará ganhos operacionais, estratégicos e tecnológicos para a BBTS, promovendo maior eficiência no suporte e na gestão do conhecimento corporativo.\nEntre os principais benefícios esperados estão:\n\n\nRedução do tempo de atendimento e resolução de chamados, por meio de respostas inteligentes e recomendações automáticas da IA;\n\n\nDiminuição de retrabalho e erros operacionais, aumentando a qualidade e a padronização dos processos;\n\n\nMaior produtividade das equipes técnicas e operacionais, permitindo foco em atividades mais estratégicas;\n\n\nCentralização e preservação do conhecimento corporativo, evitando perda de informações críticas e dependência de conhecimento individual;\n\n\nAgilidade no acesso a procedimentos, documentações e soluções já aplicadas anteriormente;\n\n\nApoio à tomada de decisão com análises mais rápidas e assertivas;\n\n\nMelhor experiência para colaboradores e clientes internos, com respostas mais rápidas e eficientes;\n\n\nRedução de custos operacionais relacionados ao suporte e tratamento de incidentes;\n\n\nFacilidade no treinamento e onboarding de novos colaboradores, reduzindo tempo de adaptação;\n\n\nFortalecimento da transformação digital da BBTS com uso estratégico de Inteligência Artificial.\n\n\nA iniciativa também contribui para criar uma cultura orientada à inovação, eficiência operacional e uso inteligente de dados, preparando a empresa para desafios futuros e aumento contínuo da demanda tecnológica.", "diferencial": "Redução do tempo de atendimento\n Menos retrabalho\n Maior produtividade das equipes\n Resolução mais rápida de incidentes\n Preservação do conhecimento interno\n Apoio à tomada de decisão\n Redução de erros operacionais\n Modernização com IA corporativa", "indicadores": "O sucesso da iniciativa poderá ser acompanhado por indicadores operacionais, financeiros e de qualidade, permitindo medir os ganhos gerados pela utilização da Inteligência Artificial nos processos internos da BBTS.  Os principais indicadores aplicáveis são:  Redução do tempo médio de atendimento e resolução de chamados; Percentual de chamados resolvidos no primeiro atendimento; Redução de retrabalho e reincidência de incidentes;A iniciativa será considerada bem-sucedida caso apresente:  maior agilidade operacional; aumento da eficiência das equipes; redução de erros e tempo de resposta;", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 2, "total": 16.0, "rank": 111}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 16.62, "rank": 145}, "joao": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 3, "total": 14.52, "rank": 92}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 18.36, "rank": 104}, "laine": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.8, "rank": 152}, "dani": {"REL": 2, "INO": 4, "DES": 4, "VIA": 5, "FAC": 2, "total": 16.72, "rank": 157}, "manoel": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 2, "total": 14.36, "rank": 95}}}, {"id": 75, "titulo": "Sentinela - Um AI Agent que classifica falhas e propõe solução", "autor": "Abner Lucas Sande Lopes", "empresa": "Cobra Tecnologia", "uo": "DIDES/GEAPE", "arena": "Eficiência Operacional e Automação", "trl": "3", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Criar o Sentinela, um agente de IA integrado ao ambiente de desenvolvimento e ao board de acompanhamento das demandas.\n\nO agente irá: \n- analisar códigos, logs, pipelines e execuções periódicas; \n- identificar falhas, riscos e padrões de erro; \n- classificar a ocorrência por tipo, impacto e criticidade; \n- indicar o time ou perfil mais adequado para atuação; \n- criar automaticamente um card com descrição, evidências e solução sugerida; \n- propor correções via Pull Request para revisão humana em casos simples ou recorrentes; \n- e aprender com os feedbacks e soluções aplicadas.\n\nO foco inicial será em pipelines e processos de dados que rodam diariamente e sustentam painéis e informações estratégicas.", "ben": "A ideia melhora a forma como falhas são identificadas, priorizadas e encaminhadas para resolução.\n\nPrincipais benefícios:\n- Redução do tempo de análise e triagem de falhas;\n- Priorização por criticidade, impacto e urgência;\n- Maior rastreabilidade das ocorrências identificadas;\n- Criação automática de cards com contexto e solução sugerida;\n- Redução de retrabalho para os times técnicos;\n- Melhoria da qualidade do código e dos pipelines;\n- Aumento da confiabilidade dos dados, processos e painéis;\n- Aprendizado contínuo para reutilização em outros agentes.\n\nCom isso, os times ganham agilidade, organização e capacidade de atuar de forma mais preventiva.", "diferencial": "O diferencial do Sentinela é transformar falhas em ações estruturadas.\nEnquanto ferramentas tradicionais geralmente apenas alertam ou registram erros, o Sentinela interpreta a falha, classifica sua prioridade, sugere encaminhamento e propõe uma solução inicial.\nAlém disso, ele automatiza a triagem técnica inicial, cria demandas rastreáveis diretamente no board, pode gerar Pull Requests para correções simples, aprende com o histórico real da organização e cria conhecimento reutilizável.", "indicadores": "O sucesso da iniciativa poderá ser medido por indicadores relacionados à redução do tempo de análise, aumento da rastreabilidade, melhoria da qualidade dos processos e efetividade das soluções propostas.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["NÃO ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 17.0, "rank": 68}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.22, "rank": 97}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 3, "total": 15.12, "rank": 72}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 18.84, "rank": 72}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.8, "rank": 83}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 17.72, "rank": 93}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 14.76, "rank": 79}}}, {"id": 76, "titulo": "Matriz unica", "autor": "Pedro Stefano Souto Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "7131", "arena": "Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Elaborar uma matriz mínima em linux  em que após instalada, ao identificar o equipam o futuro da TI.  \n- Maior alinhamento com as exigências implícitas do Banco do Brasil e outros clientes de alto nível.", "diferencial": "A empresa hoje não possui qualquer iniciativa estruturada de adoção de agentes de IA — apenas acesso reativo a um chat assistente(Copilot Basico). A diferença está em evoluir de um modelo utilitário para um modelo **autônomo e configurável**, onde a IA passa a executar tarefas, seguir padrões da empresa e atuar como um membro do time de desenvolvimento e sustentação, com governança, limites e rastreabilidade.", "indicadores": "- Redução do tempo médio de entrega de tarefas (lead time).   - Aumento da taxa de acerto na primeira execução de tarefas repetitivas.   - Quantidade de automações (Skills) criadas e reutilizadas pela equipe.   - Redução de chamados de sustentação resolvidos com auxílio de agentes. - Satisfação do time com o suporte à produtividade (NPS interno).", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.0, "rank": 4}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.32, "rank": 3}, "joao": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 18.32, "rank": 6}, "rafael": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 21.24, "rank": 5}, "laine": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 22.0, "rank": 2}, "dani": {"REL": 4, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 21.5, "rank": 2}, "manoel": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.36, "rank": 4}}}, {"id": 102, "titulo": "Catálogo reabilidade\n\n•\tImpacto geral:\no\tRedução de custos operacionais\no\tAumento da eficiência e confiabilidade do processo", "diferencial": "Integração direta com sistemas já existentes (não é uma ferramenta isolada)\nAutomação de ponta a ponta (da solicitação à prestação final)\nRegistro das despesas em tempo real, reduzindo erros posteriores\nPadronização nacional do processo\nInclusão automática de relatórios técnicos (ERAC), algo específico do contexto operacional\nFoco na experiência do técnico de campo, que hoje é o maior impactado\nDiferente do modelo atual, a proposta traz uma abordagem digital, integrada e orientada ao usuário.", "indicadores": "Tempo médio de prestação de contas (antes x depois), redução de inconsistências/documentos rejeitados (%), tempo médio de aprovação pelo gestor, quantidade de prestações realizadas dentro do prazo (%), redução de retrabalho (reenvios), adoção do app (% de usuários ativos), satisfação dos usuários (NPS interno) Esses indicadores permitirão avaliar ganhos em eficiência, qualidade e experiência do usuário.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 20.0, "rank": 5}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 19.12, "rank": 21}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 5, "total": 18.32, "rank": 7}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 21.24, "rank": 6}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 4, "total": 21.2, "rank": 14}, "dani": {" elhor custo-benefício\n- Agrupamento de compromissos para reduzir deslocamentos\n- Alertas sobre oportunidades de economia\n\nA plataforma também disponibilizaria painéis gerenciais com análise de gastos, padrões de deslocamento e oportunidades de otimização contínua.\n\nA implementação pode iniciar com um projeto piloto, utilizando dados já disponíveis na organização.", "ben": "A implementação da solução pode gerar diversos benefícios para a BBTS e seus colaboradores, tais como:\n\n- Redução significativa de custos com passagens e hospedagens\n- Melhor planejamento e antecipação de viagens\n- Otimização do uso de recursos financeiros\n- Aumento da eficiência operacional nos processos de deslocamento\n- Apoio à tomada de decisão baseada em dados\n- Melhoria na experiência do colaborador\n- Maior transparência e controle dos gastos por área\n\nAlém disso, a iniciativa contribui diretamente para a sustentabilidade financeira e para a otimização de processos internos.", "diferencial": "Atualmente, o processo de viagens é predominantemente operacional, focado na execução da demanda.\nA proposta se diferencia por introduzir inteligência preditiva e analítica no processo, atuando antes da contratação, orientando decisões mais eficientes.\nO uso de dados históricos e algoritmos permite não apenas executar viagens, mas otimizá-las continuamente, gerando economia e melhor aproveitamento dos recursos.\nAlém disso, a solução promove integração entre planejamento, execução e gestão.", "indicadores": "- Redução percentual do custo médio por viagem - Economia total gerada em reais - Tempo médio de planejamento de viagens - Índice de aproveitamento de agendas (viagens consolidadas) - Percentual de utilização de recomendações da plataforma - Satisfação dos colaboradores com o processo de viagens", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "P em tempo real, atuando tanto na formação da cultura quanto na prevenção ativa de riscos.", "indicadores": "Engajamento com conteúdos de privacidade Número de interações com o assistente LGPD Redução de incidentes relacionados a dados Tempo de resposta para dúvidas internas Evolução do nível de maturidade em privacidade (pesquisas internas)", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 1, "total": 15.0, "rank": 167}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.32, "rank": 167}, "joao": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.12, "rank": 171}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.56, "rank": 159}, "laine": {"REL": 1, "INO": 4, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.6, "rank": 162}, "dani": {"REL": 2, "INO": 4, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.52, "rank": 172}, "manoel": {"REL": 1, "INO": 4, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.16, "rank": 176}}}, {"id": 122, "titulo": "Hub de Especialistas BBTS", "autor": "Josemar Viana da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GERIC", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Implementar um serviço estruturado de consultoria interna, onde o conhecimento dos profissionais da BBTS seja organizado e disponibilizado como um serviço acessível para toda a empresa. A solução consiste em mapear as competências dos colaboradores, criar um catálogo de especialistas e permitir que áreas solicitem apoio conforme suas necessidades. As demandas seriam tratadas de forma organizada, com definição de escopo, responsáveis e acompanhamento dos resultados. O objetivo é transformar o conhecimento interno em um serviço ativo, gerando mais agilidade, eficiência e valor para o negócio, com potencial de evolução para oferta externa.", "ben": "A iniciativa permite aproveitar melhor o conhecimento interno, reduzindo custos com consultorias externas e aumentando a agilidade na resolução de demandas. Também valoriza os colaboradores, promove colaboração entre áreas e melhora a eficiência operacional. Além disso, pode evoluir para um serviço de mercado, gerando novas oportunidades de receita para a empresa.", "diferencial": "A ideia se diferencia por estruturar o conhecimento interno como um serviço formal de consultoria, substituindo interações informais e pouco organizadas. Cria visibilidade dos especialistas, reduz a dependência de terceiros e aumenta a agilidade nas soluções. Além disso, é simples de implementar e pode evoluir para uma nova linha de negócio, com potencial de geração de receita.", "indicadores": "Uso: nº de solicitações e áreas participantes Eficiência: tempo para atendimento e resolução Custos: redução com consultorias externas Valor: nº de demandas resolvidas e satisfação das áreas Engajamento: nº de especialistas e participação interna", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 33}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 44}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 46}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 33}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 32}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 37}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 52}}}, {"id": 123, "titulo": "AutoResumo — Resumo Inteligente de Reuniões e Conversas no Microsoft Teams", "autor": "Luis Guilherme Brant Oliveira", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CESID", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Uma solução integrada ao Microsoft Teams que gera automaticamente resumos estruturados de reuniões e conversas, identificando principais tópicos, decisões e próximos passos.\nA solução utiliza recursos do Microsoft 365, como transcrição de reuniões, automação de fluxos e inteligência artificial, para transformar o conteúdo das interações em informação organizada e de fácil entendimento.\nOs resumos são automaticamente disponibilizados no Teams, permitindo acesso imediato pelas equipes envolvidas.", "ben": "Registro automático de reuniões e decisões\nRedução de retrabalho e desalinhamento\nMelhoria na comunicação entre equipes\nFacilidade para acompanhamento de ações e responsabilidades\nApoio à tomada de decisão baseada em informação consolidada\nMelhor experiência no uso do Teams\nAumento da produtividade operacional", "diferencial": "Atualmente, o Teams armazena reuniões e conversas, mas não organiza automaticamente o conteúdo gerado.\nO diferencial desta proposta está em transformar esse grande volume de informação em conhecimento estruturado, por meio de automação e inteligência, permitindo:\n\nidentificação automática de decisões\nextração de próximos passos\ngeração de resumos claros e objetivos\nredução da dependência de registros manuais", "indicadores": "Percentual de reuniões com resumo gerado automaticamente Redução do retrabalho entre equipes Tempo médio de alinhamento pós-reunião Percentual de ações identificadas e acompanhadas Satisfação dos usuários com as reuniões", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 34}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 45}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 47}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 34}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 33}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 38}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 53}}}, {"id": 124, "titulo": "CONECTE BBTS", "autor": "Maria do Carmo Antunes de Oliveira", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Superintendência de Serviços Sudeste - SUPER SE", "arena": "Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Entendo que seria possível manter dentro da própria intranet um banco de dados que seja mais bem alimentado, e que permita que uma ação, por exemplo, uma mudança de UOR, um ausência de longo prazo, quando inseridas a informação no banco de dados possa afetar, em cadeia todas as informações pertinentes àquela pessoa, retornando ao usuário maior credibilidade a a possibilidade de contactar, ou ao menos saber como encontrar essa pessoa que procura.\n\nAtualmente, há funcionários, como meu próprio caso, que atuo na Superintendência Sudeste, mas apareço como FILIAL CARIOCA, como se ainda estivesse no Cat Carioca, local onde exerci atividades entre dez/2014 s jun/2016.", "ben": "- Melhora da comunicação;\n- Conexão;\n- Sinergia entre as pessoas;\n- Agilidade;\n- Confiabilidade das informações;\n- Dirimir custos com envio de documentos que não chegam aos seus destinatários, e geram mais custos de retorno;\n- Cuidado com as pessoas;", "diferencial": "A oportunidade, espaço e a mudança de perspectiva e importância dada a melhoria da comunicação. É perceptível as diversas ações em prol dessa melhoria, e isso torna o cenário, tempo/espaço propícios para essa finalidade. A intranet já existe, o banco de está sendo atualizado na plataforma LG - cabe disponibilizar a visão a todos, e persistir na necessidade de atualização dos dados no sistema LG, e consequentemente, alimentação da base de dados que poderá ser usada pela intranet.", "indicadores": "Acesso ao recurso na própria intranet, e LG, e manter ativo feedbacks e até atualizações que poderiam ser indicadas na própria tela, no momento do desencontro de alguma informação.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 116}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 125}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 135}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 124}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 97}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 116}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 140}}}, {"id": 125, "titulo": "MakeBuy Manager", "autor": "Josemar Viana da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GERIC", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A proposta é criar uma ferramenta de apoio à decisão Make or Buy (apoiada em IA), onde as áreas possam registrar demandas e avaliar de forma estruturada se devem desenvolver internamente ou contratar externamente. A solução comparará critérios como custo, prazo, risco e capacidade interna, gerando recomendações padronizadas. Isso permitirá decisões mais rápidas, consistentes e alinhadas à estratégia da empresa.", "ben": "A ferramenta permitirá decisões mais assertivas ao padronizar a análise entre fazer internamente ou contratar, considerando custo, prazo e risco. Com isso, haverá redução de custos, mais agilidade e melhor aproveitamento dos recursos internos. Também aumenta o controle e alinhamento estratégico entre as áreas.", "diferencial": "A ideia se diferencia por trazer um processo estruturado e padronizado para decisões de Make or Buy, que hoje são feitas de forma informal e descentralizada. A ferramenta permite comparar custos, prazos e riscos de forma clara e baseada em dados (histórico e conhecimentos da empresa), aumentando a assertividade. Além disso, considera a capacidade interna da empresa, algo pouco explorado nas abordagens atuais, tornando a decisão mais estratégica e eficiente.", "indicadores": "Os indicadores podem incluir a redução de custos nas decisões (comparação fazer vs. comprar), o tempo médio de decisão, e o percentual de decisões padronizadas via ferramenta. Também é importante medir o aproveitamento da capacidade interna e a redução de riscos ou retrabalho.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 35}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 46}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 48}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 35}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 34}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 39}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 54}}}, {"id": 126, "titulo": "Suporte Técnico Volante - Transferência voluntária temporária pra técnicos de campo", "autor": "Anderson Veloso Guimaraes", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT-JPA", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Suporte Técnico Volante\nO que é\nPrograma corporativo de mobilidade interna temporária. Técnicos de campo se voluntariam para missões de 15 a 90 dias em bases com déficit crítico, com remuneração extra e retorno garantido à base de origem.\n\nProblema que resolve\nQueda de SLA e acúmulo de chamados em regiões específicas por falta de técnico, sem aumentar headcount fixo ou recorrer a terceirização de alto custo.\n\nComo funciona\n1. Empresa abre \"missão\" com prazo, meta e pacote de benefícios definidos e local de atuação.\n2. Técnicos elegíveis se candidatam voluntariamente.  \n3. Selecionado atua na base destino com foco em zerar backlog e cumprir SLA.  \n4. Após o período, retorna à base com bonificação e experiência registrada.", "ben": "Ganhos para a empresa\nGarante proteção de SLA e de contratos, evitando multas por atraso. O custo é até 75% menor que uma transferência definitiva e mais barato que terceirizar, pois é ativado só sob demanda. A resposta ao problema leva dias em vez de meses. O conhecimento técnico fica e circula dentro da empresa, e a gestão ganha visibilidade real de onde sobra e falta gente.\n\nGanhos para o técnico\nÉ uma oportunidade de ganhar remuneração extra relevante sem precisar mudar de cidade ou sair da empresa. O técnico agrega experiência com novos clientes e equipamentos, ganha reconhecimento por resolver crises e acelera o plano de carreira. Todo o processo tem previsibilidade, com datas de ida e volta definidas, dando autonomia para ele escolher participar.\n\nGanhos para o cliente\nO cliente deixa de sentir o impacto da falta de equipe. Chamados parados são atendidos rapidamente por um técnico experiente da própria empresa, mantendo o mesmo padrão de qualidade e conhecimento dos processos. A percepção é de prioridade e de que a empresa se mobilizou para não deixá-lo desassistido.", "diferencial": "O grande diferencial é ser voluntário, temporário e com retorno garantido. Troca a imposição da transferência definitiva pela escolha do técnico. Transforma um problema operacional em trilha de carreira, onde cobrir demandas críticas vira medalha no histórico profissional. O custo é variável e previsível: só existe enquanto a missão durar. É a agilidade de uma força-tarefa com a qualidade e o conhecimento de um funcionário da casa.", "indicadores": "O programa é acompanhado por três frentes: Custo, com economia gerada por missão; Operação, com redução do backlog, SLA acima de 95% e queda no tempo de atendimento; e Pessoas, com taxa de adesão dos técnicos, satisfação de quem participou.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 117}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 126}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 136}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 125}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 98}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 117}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 141}}}, {"id": 129, "titulo": "Visão 360 TOA", "autor": "Anderson Veloso Guimaraes", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT-JPA", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Como funciona na prática\n1. Gatilho: Técnico dá \"Chegada\" no primeiro chamado da agência.\n2. Visão: Aba \"Agência\" é liberada no app mostrando todos os chamados abertos do local.\n3. Ação: Técnico seleciona chamados que consegue fazer na sequência e clica em \"Assumir\".\n4. Validação: TOA checa automaticamente se o técnico tem skill, peças e SLA permite. Se ok, aloca.\n5. Rastreio: Controlador recebe notificação de auto-alocação e o dashboard é atualizado.", "ben": "Pra Empresa\n1. Redução de custo de deslocamento: Menos km rodado, menos combustível, menos horas improdutivas.\n2. Aumento de produtividade: Mesmo técnico fecha mais chamados por dia sem aumentar jornada.\n3. SLA reativo: Chamados críticos que iam estourar são puxados por quem já está no local.\n4. Controladoria vira estratégia: Time de despacho foca em planejar, não em apagar incêndio.\n\nPro Técnico  \n1. Menos frustração: Acaba o \"pô, se eu soubesse tinha feito ontem\".\n2. Meta mais fácil: Bate produtividade resolvendo chamados próximos, não rodando cidade inteira.\n3. Protagonismo: Sente que confiam no julgamento dele pra otimizar a própria rota.\n\nPro Cliente \n1. Resolução mais rápida: Problema é resolvido na primeira visita do técnico à agência.\n2. Menos interrupções: Evita ter que receber equipes técnicas várias vezes na semana.", "diferencial": "1. Autonomia com controle: Sai do modelo \"pai e filho\" onde só o controlador distribui. O técnico vira parte da solução, mas dentro de regras que o sistema valida.\n2. Elimina deslocamento burro: Evita o maior desperdício da operação de campo: ir na mesma agência duas vezes no mesmo dia por chamados diferentes.\n3. Desafoga o controlador: Tira do controlador a micro-gestão de ficar encaixando chamado. Ele foca em exceção e escalonamento.\n4.Quem está na agência sabe melhor que ninguém se dá atender", "indicadores": "Operação, Pessoas e Custos", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 15.0, "rank": 168}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 16.32, "rank": 168}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 12.88, "rank": 179}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 17.04, "rank": 171}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 18.8, "rank": 153}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 16.72, "rank": 158}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 12.86, "rank": 183}}}, {"id": 130, "titulo": "CyberOps – Operações Seguras e Escaláveis", "autor": "Paulo Luciano Goncalves da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GERED", "arena": "Segurança Integrada", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A ideia é criar um HUB digital integrado de operações e cibersegurança, capaz de unir eficiência operacional com defesa digital.\nDe forma objetiva, a solução funcionaria assim:\nCentralização de operações e segurança: unificar chamados, ativos, monitoramento e eventos de segurança em uma única plataforma.\nIA preditiva e generativa: detectar padrões suspeitos, prever falhas e sugerir ações corretivas antes que o incidente ocorra.\nResposta automatizada: bloquear acessos suspeitos, isolar ativos comprometidos e acionar protocolos de segurança em tempo real.\nAnalytics de risco e compliance: dashboards inteligentes com métricas de vulnerabilidade, tempo de resposta, impacto financeiro e conformidade regulatória.\nGovernança executiva: relatórios estratégicos para apoiar decisões da diretoria", "ben": "Redução significativa de incidentes de segurança.\n\nMaior resiliência operacional e proteção contra ataques.\n\nConformidade com normas nacionais e internacionais.\n\nFortalecimento da imagem da BBTS como referência em segurança digital estatal.", "diferencial": "Integra operações e segurança digital em um único HUB, enquanto as soluções atuais focam apenas em eficiência operacional.\nAplica IA generativa e preditiva especificamente para identificar padrões de ataque e vulnerabilidades, indo além da simples previsão de falhas técnicas.\nAutomatiza respostas a incidentes de segurança, isolando ativos comprometidos e bloqueando acessos suspeitos em tempo real.\nAlinha cibersegurança com governança executiva - Cria resiliência institucional", "indicadores": "Operacionais-Estratégicos-Financeiros-Executivos", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 16.0, "rank": 118}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 16.62, "rank": 150}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 3, "total": 14.28, "rank": 100}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 17.84, "rank": 146}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 19.0, "rank": 143}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 16.92, "rank": 146}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 14.06, "rank": 102}}}, {"id": 131, "titulo": "CyberShield – Defesa Digital Ativa", "autor": "Paulo Luciano Goncalves da Silva", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GERED", "arena": "Segurança Integrada", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "CyberShield propõe a criação de uma plataforma de defesa digital ativa, capaz de monitorar continuamente os ambientes críticos da empresa e responder automaticamente a ameaças.\nA solução combina inteligência artificial preditiva, automação de bloqueios e análise comportamental para antecipar ataques e neutralizá-los antes que causem impacto.\nAlém disso, utiliza blockchain para registrar eventos de segurança de forma imutável, garantindo rastreabilidade e transparência.\nEm alto nível, o CyberShield transforma a postura da empresa de reativa para proativa, fortalecendo a resiliência digital e protegendo os ativos estratégicos da empresa.", "ben": "A implementação do CyberShield trará ganhos diretos em segurança, eficiência e confiabilidade.\nPara a empresa, significa uma postura proativa contra ameaças digitais, reduzindo incidentes e fortalecendo a imagem institucional como referência em defesa cibernética.\nPara as equipes técnicas, haverá maior agilidade na resposta a incidentes e menor sobrecarga operacional, graças à automação inteligente.\nPara os clientes e parceiros, o benefício é a garantia de continuidade dos serviços e proteção dos dados, reforçando a confiança na empresa como provedora segura e inovadora.\nNo conjunto, a solução promove resiliência digital, redução de riscos e eficiência operacional, consolidando a empresa como líder em segurança integrada.", "diferencial": "CyberShield adota uma defesa digital proativa e inteligente, substituindo o modelo reativo tradicional.\nCom IA preditiva, automação e blockchain, antecipa ameaças, age preventivamente e garante rastreabilidade total dos eventos de segurança — criando um ecossistema autônomo e transparente, inédito na empresa e no mercado.", "indicadores": "O sucesso do CyberShield será medido pela redução do tempo de resposta e contenção de incidentes, aumento da taxa de bloqueio de ataques e diminuição das vulnerabilidades críticas. A iniciativa busca fortalecer a confiabilidade da infraestrutura e otimizar a eficiência operacional por meio da automação inteligente. Esses resultados demonstrarão a evolução da postura de segurança da empresa, consolidando sua resiliência digital e capacidade de antecipar ameaças com precisão e agilidade.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 36}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 47}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 49}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 36}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 35}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 40}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 55}}}, {"id": 132, "titulo": "BBTS Log-Field: Capilaridade de Suporte na Rota Bioceânica", "autor": "Marcia Cristina Leal Sobreira", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "BBTS CAT CGR", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Implementar um serviço de Field Service e suporte tecnológico para o ecossistema logístico da Rota Bioceânica, utilizando a rede de atendimento que a BBTS já possui em cidades estratégicas. Onde houver uma agência do Banco do Brasil, a BBTS oferecerá suporte técnico para hardware embarcado (troca de sensores, reparo em rastreadores e hubs de conectividade de contingência), otimizando a rota dos técnicos que já estão em campo.", "ben": "Para a BBTS: Criação de uma nova linha de receita B2B (suporte para o mercado privado) com baixo investimento.\n​Para o Banco do Brasil: Fortalecimento do relacionamento com grandes clientes do Agro e Logística, garantindo que o negócio que o Banco financia não pare.\n​Para os Clientes: Redução drástica no tempo de parada (Downtime) de frotas e menor custo de manutenção em áreas remotas", "diferencial": "O diferencial é o uso da nossa capilaridade geográfica para resolver um gargalo logístico. Enquanto concorrentes deslocam técnicos de grandes centros (gerando altos custos e demora), a BBTS utiliza sua estrutura já instalada que atende também as cidades de fronteiras. Transformamos uma rede de suporte bancário em uma rede de suporte técnico para a Rota Bioceânica, aplicando nossa expertise em um novo contexto de mercado com custo de implementação mínimo e resposta imediata (SLA local).\"", "indicadores": "Mediremos o sucesso pelos KPIs: 1. Receita B2B (novos contratos); 2. Redução de SLA (tempo de atendimento local vs. capital); 3. Produtividade (ocupação das equipes de campo). O sucesso será confirmado se a receita extra superar os custos operacionais do piloto, validando a escala do modelo.\"", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.0, "rank": 6}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.32, "rank": 4}, "joao": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 18.32, "rank": 8}, "rafael": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 21.24, "rank": 7}, "laine": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 22.0, "rank": 3}, "dani": {"REL": 4, "INO": 5, "DES": 5, "VIA": 5,
