ção\nAceleração do onboarding de novos técnicos\nGeração de dados para análises estratégicas\nEstímulo à cultura de colaboração e inovação", "diferencial": "Diferentemente de bases de conhecimento tradicionais, o Omne BBTS não é um repositório estático, mas sim um sistema vivo, que aprende continuamente com a própria operação. Ele não apenas armazena informações, mas prioriza e recomenda as soluções com base na efetividade prática e recorrência.\nOutro diferencial relevante é a integração com a operação de forma natural e simples, transformando cada atendimento em uma oportunidade de aprendizado coletivo. A incorporação de gamificação também se desta", "indicadores": "Redução de backlog de chamados, redução de reincidências, redução de custos operacionais com logística, peças etc.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 17.0, "rank": 91}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 17.32, "rank": 93}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 3, "total": 14.68, "rank": 88}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 18.64, "rank": 99}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 19.6, "rank": 111}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 17.9, "rank": 89}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.46, "rank": 91}}}, {"id": 278, "titulo": "BBTS PSPBIA - Plataforma de Segurança Preditiva Baseada em IA (Cyber Risk Intelligence)", "autor": "Denis Salgado Gomes Mattos Medina", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "3000008023", "arena": "Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Coleta dados de múltiplas fontes: Logs de sistemas e redes, Sistemas de segurança (SIEM, SOC, IAM),Dados físicos (acesso, sensores), Inteligência externa (threat intelligence).\n\nAnalisa comportamento: Perfis de usuários e sistemas, Detecção de anomalias, Padrões de risco\n\nAplica IA e machine learning: Identifica ameaças emergentes, Classifica riscos com base em probabilidade e impacto\n\nAntecipação e resposta automatizada: Geração de alertas preditivos, Ações automáticas (bloqueios, isolamento)", "ben": "Para a empresa (BBTS / BB): Redução significativa de incidentes de segurança, Maior maturidade em cibersegurança\nMelhor proteção da marca e dos ativos críticos.\n\nPara as pessoas: Redução da sobrecarga operacional (menos alertas irrelevantes), Apoio à tomada de decisão com base em inteligência\nMaior eficiência das equipes de segurança.\n\nPara clientes: Maior proteção de dados financeiros, Aumento da confiança nos serviços digitais, Redução de fraudes e indisponibilidades.\n\nPara parceiros: Ambiente mais seguro para integração, Redução de riscos compartilhados.", "diferencial": "O que existe hoje: SIEM/SOC tradicionais focados em eventos registrados, Regras estáticas e correlações limitadas, Atuação majoritariamente reativa. Proposta inovadora: Análise preditiva baseada em IA Integração de comportamento humano + sistemas + ambiente físico Uso de inteligência externa (ameaças globais), Capacidade de antecipar riscos antes da materialização. \n\nDiferencial chave: Segurança deixa de ser “alerta após evento” → passa a ser inteligência antecipatória de risco", "indicadores": "Segurança: % de incidentes evitados vs ocorridos Tempo médio de detecção (MTTD) Tempo médio de resposta (MTTR) Taxa de falsos positivos. Gestão de risco: Índice de risco cibernético (score contínuo) Número de ameaças críticas antecipadas Redução de vulnerabilidades exploradas. Eficiência operacional: Redução de volume de alertas (%) Taxa de automação de respostas Produtividade da equipe de segurança. Financeiros: Redução de perdas financeiras por incidentes ROI da plataforma Custo por incidente evitado. Experiência e confiança: Índice de confiança do cliente Redução de fraudes.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 92}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.62, "rank": 80}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.12, "rank": 118}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.84, "rank": 86}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 72}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.5, "rank": 73}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.96, "rank": 123}}}, {"id": 279, "titulo": "Monitoramento Automatizado de Licitações Públicas", "autor": "Maicon Munis De Souza", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Dinel", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A proposta consiste na implementação de uma solução automatizada baseada em RPA, integrada a recursos de inteligência artificial, para execução diária de buscas em portais de licitações públicas. A automação realizará a identificação de oportunidades aderentes ao portfólio da empresa, fará o download e tratamento dos editais, e aplicará análise automatizada para extrair informações relevantes e comparar os requisitos exigidos com as capacidades internas. Com base nessa análise, o sistema apresentará uma recomendação estruturada de participação (GO) ou não participação (NO GO), apoiando a tomada de decisão de forma mais ágil e padronizada, reduzindo a dependência de análises manuais e aumentando a eficiência do processo.", "ben": "A implementação da solução proporcionará ganhos significativos de eficiência e produtividade, ao automatizar as etapas de busca, tratamento e análise de licitações. A equipe passará a focar apenas em oportunidades com real aderência, reduzindo retrabalho e o tempo gasto com leitura manual de editais. Haverá maior agilidade na identificação e tomada de decisão, aumentando a competitividade da empresa no mercado. Além disso, a solução trará padronização na análise, melhor qualidade na triagem das oportunidades e redução de custos operacionais. Como benefício adicional, será possível estruturar dados e gerar indicadores para apoiar decisões estratégicas, ampliando a assertividade na participação em processos licitatórios para clientes e parceiros.", "diferencial": "A proposta se diferencia por integrar RPA com inteligência artificial para automatizar todo o processo, desde a busca até a análise e recomendação (GO / NO GO). Enquanto as soluções atuais apenas apresentam oportunidades, a proposta elimina a análise manual, padroniza a triagem e considera o contexto real da empresa, tornando o processo mais ágil, eficiente e orientado a dados.", "indicadores": "O sucesso da iniciativa será evidenciado pela redução do esforço manual, aumento da assertividade na seleção de oportunidades e melhoria na agilidade e qualidade do processo decisório.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 61}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 64}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 66}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 57}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 54}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 58}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 72}}}, {"id": 280, "titulo": "Evolução do TOA – Inteligência Operacional no Atendimento Técnico", "autor": "Evaldo Barros de Andrade", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Gelop/Dipis", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A proposta consiste em transformar a abertura da ocorrência em um ponto ativo de uso e captura de informação, enriquecendo o início do atendimento com dados objetivos e históricos da operação. Para equipamentos com capacidade de telemetria, como os TAA, o sistema pode incorporar automaticamente logs em tempo real, permitindo que o diagnóstico já comece baseado em evidências concretas da falha. Para os demais equipamentos, o apoio é realizado por um banco de dados estruturado de relacionamento entre defeitos e soluções, alimentado continuamente pelos próprios atendimentos.\nAo final de cada ocorrência, o erro identificado, o defeito classificado e a solução aplicada passam a ser vinculados de forma estruturada, criando um histórico confiável que evolui progressivamente.", "ben": "A melhoria do processo com foco na qualidade e uso estratégico dos dados possibilita a obtenção de diagnósticos mais rápidos e assertivos, reduzindo o tempo total de resolução das demandas e diminuindo significativamente o retrabalho. Além disso, promove a padronização das informações registradas, aumenta a confiabilidade dos dados e viabiliza a geração de relatórios gerenciais mais consistentes. Outro benefício importante é a criação de uma base estruturada que permite a utilização de automações, como chatbots e mecanismos de sugestão de solução, contribuindo também para o aumento da satisfação do cliente e para a eficiência operacional.", "diferencial": "O diferencial da proposta está na mudança de abordagem, deixando de tratar o atendimento como uma atividade apenas operacional e passando a estruturá-lo como um processo orientado a dados e aprendizado contínuo. A solução integra informações em tempo real com bases históricas, utiliza os dados para apoiar diretamente o diagnóstico e a resolução e garante que cada atendimento gere conhecimento reutilizável. Dessa forma, promove a evolução para um modelo inteligente, preditivo e estruturado.", "indicadores": "A efetividade da solução pode ser acompanhada por meio de indicadores como o tempo médio de diagnóstico e de resolução, a taxa de retrabalho e o percentual de demandas resolvidas na primeira análise. Também podem ser avaliados indicadores relacionados à qualidade dos dados, como o nível de completude e padronização das informações registradas. Do ponto de vista de performance e inteligência, destacam-se a acurácia dos diagnósticos, a efetividade das sugestões automatizadas e o volume de reutilização de soluções já existentes. Por fim, a satisfação do cliente e taxa de reincidência.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 93}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.62, "rank": 81}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.12, "rank": 119}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.84, "rank": 87}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 73}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.5, "rank": 74}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.96, "rank": 124}}}, {"id": 281, "titulo": "TAA inteligente: quando os dados antecipam a falha e protegem a margem", "autor": "Bruna Machado Cruz", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "DIPIS", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A proposta é a criação de uma plataforma preditiva e inteligente, baseada em dados e IA, capaz de antecipar falhas e apoiar toda a jornada do atendimento de TAA — do planejamento ao pós-atendimento.\nEssa plataforma analisa dados históricos, padrões de uso, reincidência de falhas, localização e criticidade dos equipamentos para identificar riscos de indisponibilidade e recomendar ações preventivas. Mas o diferencial está na evolução: levamos essa inteligência também para o campo. Antes do atendimento, o sistema já sugere a causa provável e as peças necessárias. Durante, um assistente digital orienta o técnico com base nas melhores soluções já aplicadas. E após o atendimento, o RAC é preenchido automaticamente, padronizando dados e transformando o conhecimento em ativo corporativo.", "ben": "Proteção da margem do contrato por meio da antecipação de falhas é o principal alvo da nossa proposta. A Atuação preventiva reduz a indisponibilidade, um banco de dados alimentado com as informações de solução assertivas realizadas pelos nossos técnicos ajudam a diminuir o tempo de atendimento, permitindo que o técnico já chegue ao local com um pré diagnostico e lista de possível peças para serem trocadas, diminuição de deslocamento, padronização do preenchimento das RACs, ganho de eficiência operacional e melhoria na gestão.", "diferencial": "Hoje, já temos dados, histórico de falhas e até processos estruturados de atendimento.\nPorém, essas informações são utilizadas de forma reativa e pouco integrada — ou seja, elas ajudam a explicar o problema depois que ele acontece.\nO grande diferencial dessa proposta é que ela transforma dados em ação antes da falha ocorrer, de forma integrada em toda a operação.", "indicadores": "Operação: indisponibilidade, MTTR, assertividade; Financeiro: penalidades evitadas, custo reduzido; Inteligência: acurácia preditiva e uso da solução", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 17.0, "rank": 94}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 17.32, "rank": 94}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 3, "total": 14.68, "rank": 89}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 18.64, "rank": 100}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 19.6, "rank": 112}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 17.9, "rank": 90}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.46, "rank": 92}}}, {"id": 282, "titulo": "BBTS XAAS - Plataforma “Everything-as-a-Service”", "autor": "Denis Salgado Gomes Mattos Medina", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "3000008023", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Catálogo de serviços modular: Infraestrutura (IaaS), Plataformas (PaaS), Software (SaaS), Segurança, automação, suporte\n\nProvisionamento automatizado: Serviços ativados sob demanda, Integração via APIs.\n\nModelo de cobrança inteligente: Pay-per-use, Medição de consumo em tempo real.\n\nPortal unificado: Interface para clientes e parceiros, Gestão de serviços, contratos e consumo.\n\nOrquestração e governança: Controle de qualidade, segurança e compliance, Padronização de serviços.", "ben": "Para a empresa (BBTS / BB): Novo modelo de negócio baseado em recorrência e escala, Aumento da eficiência operacional, Maior competitividade frente a hyperscalers.\n\nPara as pessoas: Redução de atividades operacionais e burocráticas, Mais foco em inovação e gestão de serviços, Agilidade na entrega de soluções.\n\nPara clientes: Acesso rápido a serviços sob demanda, Pagamento conforme uso (flexibilidade financeira), Soluções escaláveis e personalizadas.\n\nPara parceiros: Integração mais simples via marketplace de serviços, Novas oportunidades de oferta conjunta, Ecossistema mais colaborativo.", "diferencial": "O que existe hoje: Serviços fragmentados, Contratação tradicional e estática, Baixa integração entre soluções.\n\nProposta inovadora: \nModelo semelhante a hyperscalers (AWS, Azure), porém focado em: Governo, Sistema financeiro, Grandes corporações.\n\nPlataforma única com: Serviços fim-a-fim, Integração nativa, Governança e compliance adaptados ao Brasil\n\nDiferencial chave: BBTS deixa de ser prestadora de serviços → passa a ser uma plataforma digital de serviços", "indicadores": "Crescimento e adoção: Número de serviços consumidos via plataforma, Taxa de adesão de clientes, Receita recorrente (MRR/ARR). Eficiência operacional: Tempo de provisionamento de serviços, Taxa de automação, (%) Utilização de recursos. Financeiros: Receita por cliente, Ticket médio por serviço ROI da plataforma. Experiência do cliente: NPS (net promoter score), Tempo de atendimento e entrega, Taxa de churn (cancelamento). Qualidade e governança: SLA atendido, (%) Incidentes por serviço, Aderência a compliance", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 95}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.62, "rank": 82}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.12, "rank": 120}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.84, "rank": 88}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 74}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.5, "rank": 75}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.96, "rank": 125}}}, {"id": 283, "titulo": "Planejador de rotas – BBTS Móvel", "autor": "Renato Teixeira de Araujo", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "GELOJ:  UOR 2000008155", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolver internamente um planejador de rotas ou contratar um serviço disponível no mercado com os requisitos mínimos de integração aos portais ou plataformas internas. Em ambiente interno, disponibilizar acesso pela rede de agências do Banco do Brasil, de forma que as solicitações sejam inseridas por meio deste canal com as informações suficientes para que o gerenciador de rotas faça uma análise e traga as melhores alternativas para validação posterior da BBTS.", "ben": "Com análise de dados e roteirização inteligente, será possível reduzir custos logísticos com os deslocamentos das VANS, gestão que hoje é feita pelo fornecedor do serviço contratado, onde a BBTS não tem gestão da logística sobre as rotas planejadas nos deslocamentos dos veículos. Melhorar o aproveitamento da frota e aumentar a eficiência da operação, com redução dos custos com combustível específico onde poderemos pesquisar os preços em cada posto de combustível ao longo do deslocamento dos veículos.", "diferencial": "Atualmente, a gestão da frota das unidades móveis é realizada pelo fornecedor do serviço em relação ao deslocamento e hospedagem do motorista e ajudante. Com a intervenção da BBTS em sugerir rotas, locais de hospedagens, e rede de postos com preços mais vantajosos, teríamos uma redução dos custos, pagando mais barato pelo litro de combustível bem como escolhendo locais com hospedagem mais acessíveis e que atenda um padrão de qualidade mínimo para uso do motorista e ajudante.", "indicadores": "Indicador financeiro e operacional. Com as ferramentas disponibilizadas que são gratuitas e nem sempre são atualizadas, não há precisão de mensuração dos custos. Assim, com uso de um planejador de rotas e uso de IA, haverá mais alternativas na tomada de decisão e consequentemente redução de custos.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 149}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 138}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 148}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 137}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 113}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 129}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 159}}}, {"id": 285, "titulo": "AGILIZA BBTS", "autor": "Bernardete de Lourdes Guizzardi", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT-VIT", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Informar aos CAT origem/destino sobre a movimentação de peças, com foco em agilizar as tratativas, mitigando atrasos/demoras e inércias no que tange a transferências e movimentações de peças, através de avisos (e-mail, teams, whatsapp), de que há uma ação a ser feita pelo CAT origem, e/ou, há uma peça a ser enviada para um determinado técnico, naquele momento.\nRastreabilidade das ações (tempo/espaço).", "ben": "-  eficiência operacional;\n-  agilidade na operação;\n-  auxiliar na acuracidade dos itens em estoque;\n-  previsibilidade de atuação;\n- melhoria da organização de rotinas técnicas (sabe que a peça já foi movimentada, e os passos de remessa);\n- apoio na gestão e acompanhamento de desempenho dos transportadores;\n- rastreabilidade das ações (tempo/espaço);\n- apoio a melhoria de desempenho dos times – é possível saber que naquele momento da informação da movimentação, o funcionário “A” estava no estoque e agiu imediatamente, e/ou, não o fez (com isso é possível entender o que houve e orientar o funcionário para melhora da performance);", "diferencial": "As informações existem, mas depende de que “alguém veja” que há a necessidade, ou rode um slip.\nReceber o aviso, agilizaria “o fazer”.", "indicadores": "As métricas utilizadas pelo Eficat (ganho de produtividade, melhoria do tempo de resposta, e satisfação do cliente, com maior desempenho no SLA).", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE"], "base": {"REL": 1, "INO": 3, "DES": 5, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 3, "DES": 5, "VIA": 4, "FAC": 1, "total": 14.0, "rank": 195}, "alex": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 1, "total": 15.22, "rank": 189}, "joao": {"REL": 1, "INO": 3, "DES": 5, "VIA": 4, "FAC": 2, "total": 12.08, "rank": 197}, "rafael": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 1, "total": 15.76, "rank": 191}, "laine": {"REL": 1, "INO": 3, "DES": 5, "VIA": 4, "FAC": 1, "total": 17.4, "rank": 187}, "dani": {"REL": 2, "INO": 3, "DES": 5, "VIA": 4, "FAC": 1, "total": 15.7, "rank": 188}, "manoel": {"REL": 1, "INO": 3, "DES": 5, "VIA": 5, "FAC": 1, "total": 12.46, "rank": 197}}}, {"id": 287, "titulo": "Atualização de POPs integrada ao BIT", "autor": "Patricio Lofy", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CATJOI", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Sugerir alterações nos POP - Procedimento Operacional Padrão dentro do BIT. Implementando um botão de \"Sugerir Alteração\" no rodapé de cada página da base ou ao lado, abrindo um formulário integrado para descrever a melhoria e enviar o feedback aos responsáveis pela revisão. \nTeria um Mecanismo de Coleta (Dentro do BIT)  com um Formulário Flutuante ou Botão: Adicione um botão \"Sugerir Atualização\" em cada artigo do BIT.\nCampos Essenciais: O técnico deve preencher campos curtos, como:\nMotivo da alteração (correção, melhoria de processo ou ferramenta nova).\nO que deve ser mudado (qual passo ou tópico).\nEvidência ou anexo (ex: print da tela de erro ou novo script).\nCampos Automáticos: O sistema já preenche sozinho o nome do artigo (POP), o usuário logado e a data da sugestão.", "ben": "Na prática trará melhorias em:\n\n•\tMelhoria contínua dos processos\n•\tParticipação ativa dos técnicos\n•\tRedução de erros operacionais\n•\tAtualização mais rápida dos POPs\n•\tCentralização das informações no BIT\n•\tRastreabilidade e auditoria facilitadas", "diferencial": "Hoje não existe este tipo de opção aberta para o colaborador sugerir este tipo de alteração nos POPs. Alguns dos POPs já estão desatualizados e sendo esta sugestão implantada, traria atualização quase on-line, transformando o POP de um documento estático em um sistema a vivo, colaborativo e integrado a operação diariamente.", "indicadores": "Indicará adesão dos técnicos, medirá a participação real, medirá agilidade no processo e indicará melhoria contínua. Mostrará que os POPs estão vivos e não estáticos. Impactará diretamente nos conhecimentos atualizados dos técnicos trazendo maior aderência nas informações", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 150}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 139}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 149}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 138}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 114}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 130}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 160}}}, {"id": 289, "titulo": "BBTS IA - Assistente Cognitivo Corporativo (AI Copilot)", "autor": "Denis Salgado Gomes Mattos Medina", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "3000008023", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Implementar um Assistente Cognitivo Corporativo (AI Copilot) que:\n\nIntegra com sistemas internos: Operações de TI, Segurança, Sistemas corporativos e bases de dados.\n\nInterage em linguagem natural: Usuários consultam, analisam e executam ações via chat/voz\nEx: “Qual o status dos incidentes críticos?”Automatiza tarefas e decisões\n\nGeração de relatórios: Análise de dados, Recomendações de ação.\n\nApoia decisões críticas: Sugestões baseadas em dados históricos e regras de negócio, Validação de compliance e risco.\n\nAprendizado contínuo: Evolui com uso e feedback, Personalização por perfil de usuário.", "ben": "Para a empresa (BBTS / BB): Aumento significativo da eficiência operacional, Padronização de decisões e processos, Redução de riscos operacionais e de compliance.\n\nPara as pessoas: Apoio direto na execução de tarefas complexas, Redução de esforço cognitivo, Ganho de produtividade e assertividade.\n\nPara clientes: Respostas mais rápidas e precisas, Serviços com maior confiabilidade Melhor experiência digital.\n\nPara parceiros: Interação mais ágil com sistemas BBTS, Menor dependência de suporte humano, Integrações mais inteligentes.", "diferencial": "O que existe hoje: Chatbots limitados e scripts pré-definidos, Ferramentas isoladas de BI e automação, Copilots genéricos sem contexto corporativo profundo.\n\nProposta inovadora: IA especializada no contexto BBTS (operações críticas), Integração com compliance, segurança e governança, Capacidade de executar ações reais, não apenas responder, Personalização por perfil (gestão, operação, segurança).\n\nDiferencial chave: Não é só um assistente → é um copiloto corporativo que pensa, recomenda e age", "indicadores": "Produtividade: Ganho de produtividade, (%) por usuário Tempo médio de execução de tarefas, Número de tarefas automatizadas. Eficiência operacional: Redução de erros humanos, (%) Tempo de resposta a demandas internas, Taxa de uso do copiloto. Inteligência e decisão: Tempo médio de tomada de decisão, Acurácia das recomendações da IA, % de decisões assistidas pela IA. Segurança e compliance: Redução de não conformidades, Incidentes relacionados a erro humano Aderência a políticas internas. Financeiros: Redução de custos operacionais ROI da solução, Custo por atividade/processo.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 96}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.62, "rank": 83}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.12, "rank": 121}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.84, "rank": 89}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 75}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.5, "rank": 76}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.96, "rank": 126}}}, {"id": 290, "titulo": "PSIM Cognitivo: Convergência de Segurança Física e Cibernética com IA", "autor": "Rafael Guimaraes Trugilho", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Direp", "arena": "Eficiência Operacional e Automação,Segurança Integrada", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "​Implementar uma camada de inteligência e correlação de dados (Mecanismo de Segurança Convergente) que integra os logs de eventos cibernéticos do SOC (Security Operations Center) aos eventos de segurança física consolidados pelo PSIM. Através de algoritmos de Inteligência Artificial e correlação probabilística, o sistema passará a identificar anomalias comportamentais cruzadas.\n​Exemplo prático: se o sistema detectar um acesso digital crítico de madrugada utilizando o perfil de um determinado colaborador, a plataforma interroga instantaneamente o PSIM para checar se a catraca registrou a entrada física daquele funcionário ou se há imagens dele na baia de trabalho via CFTV. Caso não haja correspondência, o bloqueio digital é preventivo e automático, e um alerta de alta criticidade é gerado.", "ben": "​Para a BBTS: valorização e evolução de um ativo tecnológico que a empresa já possui (a infraestrutura do PSIM), adicionando uma camada de Inteligência Artificial sem necessidade de substituição de sistemas.\n​Para os clientes (como o Conglomerado BB): redução drástica do risco de fraudes e vazamento de dados, elevando os níveis de conformidade regulatória (LGPD e BACEN) e resiliência de infraestrutura crítica.\n​Para as equipes operacionais de segurança: centralização de alertas de criticidade híbrida, diminuindo o tempo de resposta a incidentes (MTTR) e mitigando alarmes falsos.", "diferencial": "O PSIM tradicional opera baseado em regras estáticas e restritas ao perímetro físico (ex: porta aberta, sensor violado). A inovação da nossa proposta está na Convergência Ciber-Física Preditiva. Não estamos criando um software do zero, mas sim aplicando IA para quebrar o silo entre a segurança lógica e a física. Em vez de agir depois que o perímetro foi violado ou o dado vazado, a solução cria um \"Score de Ameaça\" comportamental em tempo real, gerando uma barreira preventiva inédita no mercado.", "indicadores": "MTTR Híbrido (Mean Time to Respond); ​Taxa de Falsos Positivos; e ​Índice de Vulnerabilidade de Ativos Críticos.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 17.0, "rank": 97}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 17.32, "rank": 95}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 3, "total": 14.68, "rank": 90}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 18.64, "rank": 101}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 19.6, "rank": 115}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 17.9, "rank": 91}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.46, "rank": 93}}}, {"id": 291, "titulo": "Fórum de Infraestrutura Financeira e Digital da BBTS", "autor": "Gabrielle Borges Roquete De Melo", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "MATRIZ", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Criar um fórum institucional da BBTS voltado à tecnologia financeira e infraestrutura digital, reunindo clientes estratégicos, órgãos públicos e especialistas do setor.\nO evento funcionará como uma plataforma contínua de relacionamento e geração de negócios, conectando a apresentação das soluções da BBTS com demandas reais do mercado.\nA iniciativa será estruturada para atrair públicos-alvo qualificados e permitir a mensuração do retorno sobre investimento (ROI), a partir da geração de oportunidades comerciais e novos contratos.", "ben": "Fortalecimento da BBTS como referência em tecnologia financeira e infraestrutura digital;\nPosicionamento institucional como autoridade no ecossistema financeiro e de governo digital;\nGeração de relacionamento direto com clientes estratégicos e decisores;\nAumento da geração de oportunidades comerciais qualificadas;\nAmpliação do pipeline de vendas e contratos potenciais;\nEstruturação de um canal contínuo de prospecção institucional;\nMaior previsibilidade e mensuração do retorno sobre investimentos em marketing institucional;\nMaior integração entre áreas de tecnologia, negócios e marketing;\nExpansão do portfólio de soluções com base em demandas reais do mercado.", "diferencial": "A proposta transforma eventos institucionais em uma plataforma estruturada e recorrente de geração de negócios, com foco em clientes estratégicos e mensuração de resultados.\nDiferentemente de eventos tradicionais de branding, o modelo proposto integra relacionamento, posicionamento e geração de oportunidades comerciais, permitindo que o evento funcione como parte ativa da estratégia de negócios da BBTS.", "indicadores": "Número de leads qualificados gerados por edição do evento; Número de reuniões comerciais originadas; Volume de oportunidades em pipeline comercial; Taxa de conversão de oportunidades em contratos; ROI do evento (receita gerada vs investimento); Número de clientes estratégicos participantes; Engajamento institucional dos participantes; Valor potencial de contratos influenciados pelo evento.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.0, "rank": 19}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.02, "rank": 9}, "joao": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 16.92, "rank": 23}, "rafael": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.44, "rank": 16}, "laine": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 21.8, "rank": 8}, "dani": {"REL": 4, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 21.3, "rank": 8}, "manoel": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.16, "rank": 20}}}, {"id": 292, "titulo": "Smart Escape BBTS – Plataforma Dinâmica de Resposta Emergencial", "autor": "Gabrielle Borges Roquete De Melo", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "MATRIZ", "arena": "Negócios Digitais Escaláveis,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolver uma plataforma inteligente integrada a sensores, mapas digitais e IoT para monitoramento dinâmico de emergências em tempo real.\nDurante incidentes, o sistema identificaria áreas críticas, atualizaria rotas seguras de evacuação, acionaria sinalizações inteligentes e disponibilizaria mapas temporários no celular dos colaboradores presentes no prédio. A solução também permitiria o compartilhamento voluntário e temporário de localização (em conformidade com a LGPD), apoiando equipes de resgate na identificação de pessoas possivelmente isoladas.", "ben": "Maior proteção à integridade física de colaboradores e visitantes;\nRedução do risco de asfixia, isolamento e desorientação durante evacuações;\nApoio inteligente às equipes de brigada e resgate;\nVisualização em tempo real das áreas afetadas;\nIdentificação mais rápida de pessoas possivelmente ilhadas;\nFortalecimento da cultura de segurança e prevenção;\nModernização da gestão de emergências da BBTS;\nPotencial de evolução futura para solução escalável voltada a prédios corporativos e ambientes críticos.", "diferencial": "A proposta transforma planos tradicionais de evacuação estáticos em uma resposta emergencial dinâmica e inteligente, baseada em dados em tempo real.\nO diferencial está na integração entre sensores físicos, inteligência operacional, sinalização dinâmica, rastreamento voluntário temporário e mapas digitais adaptativos, ampliando a consciência situacional durante emergências.", "indicadores": "Tempo médio de evacuação; Tempo de resposta da brigada; Quantidade de áreas críticas identificadas automaticamente; Número de colaboradores localizados durante emergências; Redução de incidentes operacionais em evacuações; Tempo médio de atualização das rotas dinâmicas; Índice de adesão ao compartilhamento voluntário de localização.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de segurança / conformidade / redução de risco,Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 98}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.62, "rank": 84}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.12, "rank": 122}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.84, "rank": 90}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 76}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.5, "rank": 77}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.96, "rank": 127}}}, {"id": 293, "titulo": "Radar de Clima Inteligente BBTS", "autor": "Emanoel Coqueiro Muniz", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "DIPAV/GECON/DIAFI", "arena": "Negócios Digitais Escaláveis", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Implementar uma ferramenta contínua de monitoramento de clima organizacional, com pesquisas semanais rápidas, painéis em tempo real para gestores, alertas preventivos a Gestão de Pessoas e reconhecimento entre colegas.", "ben": "Com a implementação, o engajamento aumentará e afastamentos serão reduzidos, e a Gestão de Pessoas poderá agir de forma preventiva. As equipes serão mais motivadas e produtivas, beneficiando a empresa e seus parceiros.", "diferencial": "A proposta é contínua e preventiva, diferente das pesquisas anuais tradicionais. O sistema será simples e rápido (menos de 30 segundos), utilizando inteligência artificial para identificar tendências e permitindo reconhecimento instantâneo entre colaboradores. Toda semana o funcionário responde: * 3 perguntas rápidas; * em menos de 30 segundos; * com emojis ou notas simples. Exemplo:* Como foi sua semana? * Sua carga de trabalho está equilibrada?  * Você se sentiu valorizado essa semana?", "indicadores": "Taxa de participação semanal nas pesquisas; Evolução do índice de satisfação; Tempo de resposta da GEPES; Redução de afastamentos relacionados ao estresse.", "ganhos": "Ganhos de segurança / conformidade / redução de risco", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 16.0, "rank": 151}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 16.62, "rank": 157}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 3, "total": 14.28, "rank": 104}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 17.84, "rank": 153}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 19.0, "rank": 147}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 16.92, "rank": 150}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 14.06, "rank": 108}}}, {"id": 294, "titulo": "Base Inteligente de Custos", "autor": "Maria Jose Pereira Lima", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "3000004045", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A solução proposta consiste na configuração de uma Base Inteligente de Custos Corporativa, estruturada como um “motor parametrizado de custos”, que transforma custos hoje dispersos e recalculados sob demanda em um conjunto padronizado de referências reutilizáveis. \n\nA solução organiza os custos a partir dos serviços mais relevantes, com unidades padrão e composição completa. Esses dados são consolidados em uma base única que elimina recálculos.\n\nAs áreas passam a ajustar apenas variáveis das propostas, enquanto exceções seguem análise específica. O modelo evolui continuamente com revisões periódicas e uso de dados reais.\n\nDe forma estratégica, a base sustenta a transformação do modelo de receita da BBTS, viabilizando integração com CPQ, automação e preparação para uso de IA em pricing.", "ben": "A implementação de uma Base Inteligente de Custos permitirá ganhos quantitativos relevantes:\n\n>\tOperacionais\n•\tRedução do retrabalho em até 60–70% (eliminação de reanálises recorrentes)\n•\tRedução de interações entre áreas em propostas padrão (menos loops de validação)\n•\tAumento de produtividade das áreas envolvidas (Deal Desk, Produto, Controladoria)\n\n>\tComerciais\n•\tRedução do tempo de precificação de patamares atuais (~30 dias) para: \no\t<15 dias na fase inicial\no\t<7 dias em maturidade\n•\tAumento da velocidade de resposta ao cliente\n•\tPotencial aumento de conversão de negócios por melhoria na agilidade competitiva\n\n>\tFinanceiros\n•\tRedução do risco de erros na composição de custos\n•\tMaior consistência nos modelos de precificação\n•\tPotencial aumento de margem por: \no\teliminação de subprecificação\no\tmaior previsibilidade financeira\n\n>\tEstratégicos\n•\tCapacidade de escalar o volume de propostas sem aumento proporcional de esforço\n•\tRedução da dependência de conhecimento tácito (“modelo de heróis”)\n•\tCriação de base estruturada para: \no\tautomação de pricing\no\timplementação futura de CPQ\no\tevolução para modelos orientados a IA\n\n>\tExperiência\n•\tRespostas mais rápidas e consistentes ao cliente\n•\tRedução de retrabalho pós-proposta\n•\tMaior previsibilidade nas entregas\n\n>\tResultado Esperado:\nRedução significativa de tempo, esforço e risco, com aumento simultâneo de velocidade comercial, consistência e capacidade de escala.", "diferencial": "A adoção de custos de referência, ainda que inicialmente conservadores, possibilita ganhos relevantes em agilidade, eficiência operacional e competitividade, ao viabilizar decisões mais rápidas com adequado controle de risco.\nO principal diferencial da proposta está na transformação da lógica operacional: migrar de um modelo reativo e manual, baseado no recálculo sob demanda, para uma abordagem proativa, parametrizada e reutilizável, que favorece escalabilidade, padronização e automação.", "indicadores": "A iniciativa será considerada bem-sucedida se entregar, de forma consistente: redução relevante do tempo de precificação; diminuição de retrabalho e interações; aumento da taxa de conversão; maior previsibilidade e qualidade dos custos; e capacidade de escalar propostas sem aumento de esforço. Ou seja, mais velocidade, menos esforço, maior consistência e melhores resultados comerciais.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.0, "rank": 20}, "alex": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.02, "rank": 10}, "joao": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 16.92, "rank": 24}, "rafael": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.44, "rank": 17}, "laine": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 21.8, "rank": 9}, "dani": {"REL": 4, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 21.3, "rank": 9}, "manoel": {"REL": 3, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.16, "rank": 21}}}, {"id": 295, "titulo": "Tradutor Eventos - Boas Práticas Acessível", "autor": "Ednilson Francisco dos Santos", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT CUR", "arena": "Eficiência Operacional e Automação", "trl": "3", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Tradutor de eventos:\nUm ponto chave seria a implementação de um tradutor de eventos, capaz de converter códigos técnicos (muitas vezes complexos) em uma linguagem mais clara e compreensível para os técnicos. Isso facilitaria diagnóstico rápido e tomada de decisão em campo.\nCombinado a isso, o uso de registros com imagens/figuras apontando defeitos e soluções práticas ajudaria a:\n- Reduzir tempo de atendimento\n- Padronizar soluções\n- Compartilhar conhecimento\n- Aumentar a eficiência operacional\nPercebo uma oportunidade na criação de um sistema estruturado de apoio aos chamados técnicos, reunindo boas práticas de campo que hoje não estão documentadas. A falta dessa base gera demora na resolução e retrabalho.", "ben": "Reduzir tempo de atendimento\nPadronizar soluções\nCompartilhar conhecimento\nAumentar a eficiência operacional", "diferencial": "Não temos um Tradutor de Eventos e muito menos as Boas Praticas documentadas Oficialmente.", "indicadores": "Agilidade nos atendimentos e satisfação do clientes e colaboradores.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 3, "DES": 4, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 3, "DES": 4, "VIA": 4, "FAC": 2, "total": 14.0, "rank": 196}, "alex": {"REL": 1, "INO": 4, "DES": 5, "VIA": 4, "FAC": 2, "total": 14.82, "rank": 195}, "joao": {"REL": 1, "INO": 3, "DES": 4, "VIA": 4, "FAC": 3, "total": 13.08, "rank": 176}, "rafael": {"REL": 1, "INO": 4, "DES": 4, "VIA": 4, "FAC": 2, "total": 15.76, "rank": 192}, "laine": {"REL": 1, "INO": 3, "DES": 5, "VIA": 4, "FAC": 2, "total": 17.0, "rank": 191}, "dani": {"REL": 2, "INO": 3, "DES": 4, "VIA": 4, "FAC": 2, "total": 14.92, "rank": 195}, "manoel": {"REL": 1, "INO": 3, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.26, "rank": 173}}}, {"id": 296, "titulo": "BBTS Travel", "autor": "Marcus Vinicius Fernandes de Azevedo Pereira", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "3000003154", "arena": "Negócios Digitais Escaláveis", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A ideia não é só digitalizar — é mudar o modelo:\n_xD83E__xDDE0_ 1. Inteligência no processo\n•\tautomação ponta a ponta\n•\tredução de erros  \n_xD83D__xDD17_ 2. Fim da fragmentação\n•\ttudo integrado em uma única plataforma\n•\tdados consistentes e rastreáveis\n⏱️ 3. Experiência radicalmente melhor\n•\tmenos burocracia\n•\tprocessos mobile-first\n•\tdecisões em tempo real\n_xD83C__xDF31_ 4. ESG na prática\n•\tcálculo de emissão de CO₂ por viagem\n•\tapoio a escolhas sustentáveis\n________________________________________\n_xD83D__xDCB0_ IMPACTO \n•\tRedução de custos operacionais\n•\tMenos FTE dedicado ao processo\n•\tAumento da produtividade\n•\tMais transparência e governança\n•\tMelhor experiência para o colaborador", "ben": "A ideia traz uma série de benefícios estratégicos e operacionais para a organização ao transformar um processo hoje fragmentado e burocrático em uma jornada digital integrada e inteligente. Em primeiro lugar, há uma redução significativa de custos, já que a automação elimina retrabalho, erros manuais e despesas fora de política, permitindo um uso mais eficiente dos recursos destinados a viagens corporativas. Ao mesmo tempo, ocorre um aumento relevante de produtividade, pois atividades operacionais como abertura de solicitações, validações e prestações de contas deixam de consumir tempo dos empregados e passam a ser realizadas automaticamente pelo sistema. \nOutro benefício importante está na melhoria da experiência do usuário, que passa a interagir com um processo simples, intuitivo e acessível por dispositivos móveis, substituindo fluxos complexos e demorados que hoje impactam negativamente a rotina de trabalho. Além disso, a solução amplia a visibilidade gerencial ao disponibilizar dados e indicadores em tempo real, permitindo um controle mais preciso dos gastos e uma tomada de decisão mais ágil e baseada em informações confiáveis. No campo da governança, há um fortalecimento do compliance, com aplicação automática das regras corporativas, maior rastreabilidade das operações e redução de riscos de inconsistências ou fraudes. \nA integração entre sistemas elimina a fragmentação atual, reduz redundâncias e garante consistência dos dados, tornando o processo mais fluido e eficiente. Soma-se a isso o ganho de agilidade operacional, com aprovações mais rápidas, autonomia para o colaborador e menor dependência de fornecedores externos. A iniciativa também incorpora práticas de sustentabilidade ao permitir o monitoramento de emissões de carbono nas viagens, apoiando decisões mais conscientes e alinhadas à agenda ESG. Por fim, a proposta fortalece a estratégia corporativa ao impulsionar a digitalização, aumentar a eficiência na gestão de recursos e criar uma base sólida para decisões orientadas por dados, posicionando a organização em um patamar mais moderno, competitivo e inovador.", "diferencial": "Hoje:\nVários sistemas (Argo, Supravizio, ERP)\nProcesso fragmentado e manual\nSua ideia:\n_xD83D__xDC49_ Um ecossistema único e integrado ponta a ponta\n_xD83D__xDCCC_ Diferença:\nSai de “gerenciar etapas” → para “gerenciar a jornada completa”\nHoje:\nusuário preenche diversos campos\nvalidações manuais\nprestação de contas depois do fato\nSua proposta:\n_xD83D__xDC49_ O sistema já pensa pelo usuário\naplica política automaticamente\nreduz decisões operacionais\nelimina retrabalho\nDiferença:\nNão depende do usuário acertar, o sistema faz", "indicadores": "ASG - emissão de CO². Tempo dedicado a de prestação de contas - FTE - Eficiência operacional. Redução de Custos com deslocamento - Pedidos com janela de tempo correta.", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 152}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 140}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 150}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 139}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 116}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 131}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 161}}}, {"id": 297, "titulo": "BBTS ROTR - Plataforma de Inteligência de Riscos Ope CEDEN1", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Desenvolver uma solução digital leve e escalável para coleta estruturada da percepção do cliente externo, integrada ao ecossistema BBTS. A solução será composta por:\n•\tQuestionários inteligentes e adaptáveis ao contexto de atuação;\n•\tIndicadores padronizados de desempenho (ex.: qualidade, relacionamento, proatividade);\n•\tDashboards gerenciais com visão consolidada por colaborador, equipe e cliente;\n•\tGeração automática de insights e alerts para pontos críticos;\n•\tIntegração futura com sistemas internos de gestão de desempenho;\n•\tFuncionalidade de devolutiva estruturada para o colaborador (feedback construtivo).\nA solução prioriza simplicidade para o cliente (baixa fricção no fornecimento do feedback) e alto valor analítico para a gestão.", "ben": "A solução permitirá maior assertividade na avaliação de desempenho com base em evidências externas, melhoria contínua da qualidade dos serviços prestados, fortalecimento do relacionamento com o cliente, aumento da transparência, desenvolvimento direcionado de competências, reconhecimento de desempenho e maior alinhamento entre expectativas do cliente e entregas do colaborador. Adicionalmente, possibilita a geração de indicadores estratégicos para tomada de decisão gerencial e evolução dos contratos.", "diferencial": "Integração direta entre a percepção do cliente externo e a gestão de desempenho interna, criando um ciclo estruturado de feedback orientado a dados, o que não é comumente feito de forma estruturada e contínua. Além disso, a proposta combina simplicidade para o cliente com inteligência analítica para a gestão, criando um ciclo completo de captura, análise e ação. Outro diferencial é o potencial de integração com processos corporativos e escalabilidade para múltiplos contratos e clientes.", "indicadores": "A implementação da solução permitirá melhoria da experiência do cliente externo, aumento da confiança institucional e fortalecimento da imagem da BBTS como prestadora de serviços orientados a entrega de valor, aumento dos índices de satisfação do cliente, redução de retrabalho, maior eficiência na gestão de desempenho e melhor direcionamento de ações de capacitação. A solução possui potencial de escala, podendo ser replicada para diferentes contratos e clientes, ampliando o impacto organizacional.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.0, "rank": 62}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 17.92, "rank": 65}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 3, "total": 15.52, "rank": 67}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 19.64, "rank": 58}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 20.4, "rank": 55}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 18.7, "rank": 59}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 15.16, "rank": 73}}}, {"id": 299, "titulo": "Programa Incentivo+", "autor": "Marco Antonio Alves Truda", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Gesap/Diage", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Criar um programa estruturado de incentivo à mudança de hábitos, baseado em metas mensuráveis de economia de recursos (água e energia) e acompanhamento simples. Funcionamento:\n\n- Adesão voluntária: Colaborador se inscreve no programa\n- Registro de linha de base: Informa consumo histórico (ex.: média dos últimos meses)\n- Meta de redução: Redução mínima de 20% no período (semestre ou ano)\n- Acompanhamento: Atualização periódica simples (ex.: envio mensal de dados) / Possibilidade de uso de formulário ou ferramenta.\n- Reconhecimento: Colaboradores que atingirem a meta receberão selo digital, destaque em canais internos, pontuação em mecanismos de engajamento", "ben": "PARA A BBTS:\n> Fortalecimento da cultura de eficiência e responsabilidade\n> Aumento de engajamento institucional\n> Melhoria de percepção interna\n\nPARA OS COLABORADORES:\n> Economia financeira direta\n> Mudança de hábitos duradoura\n> Maior senso de pertencimento", "diferencial": "- Foco em resultado mensurável, não apenas conscientização\n- Geração de benefício direto ao colaborador (economia financeira)\n- Implementação simples (sem necessidade de sistemas complexos)\n- Alta capacidade de adesão voluntária\n- Não depende de integração com sistemas externos\n- Baseado em dados autodeclarados\n- Baixa complexidade operacional", "indicadores": "Número de participantes inscritos, Percentual de participantes que atingem a meta, Redução média de consumo declarada", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 15.0, "rank": 180}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 16.32, "rank": 174}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 12.88, "rank": 185}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 17.04, "rank": 175}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 1, "total": 18.8, "rank": 159}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 4, "FAC": 1, "total": 16.72, "rank": 164}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 12.86, "rank": 189}}}, {"id": 300, "titulo": "Controle de Ativos de Outsourcing Via RFID", "autor": "Yasmim Fonseca Vianna", "empresa": "BB Tecnologia e Servicos S.A.", "uo": "Colog", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "A implementação de um sistema de controle e inventário de ativos baseado em tecnologia RFID (Radio Frequency Identification) visa automatizar e otimizar esse processo.\nCom o uso de etiquetas RFID nos ativos e leitores apropriados, será possível:\n\nRealizar inventários de forma rápida e automatizada;\nIdentificar ativos sem necessidade de contato visual direto;\nRegistrar movimentações em tempo real;\nIntegrar os dados a sistemas de gestão (ERP ou plataformas internas).", "ben": "A adoção da tecnologia RFID traz diversos ganhos operacionais e estratégicos:\n\n Redução de erros operacionais: Elimina falhas comuns em processos manuais de conferência e registro;\n Agilidade no inventário: Permite leitura simultânea de múltiplos ativos, reduzindo drasticamente o tempo de execução;\n Rastreabilidade em tempo real: Acompanhamento preciso das movimentações dos ativos;\n Aumento da produtividade: Libera a equipe para atividades mais estratégicas;\n Maior controle patrimonial: Informações mais confiáveis e atualizadas;\n Redução de perdas e extravios: Melhora a segurança e o controle dos ativos.", "diferencial": "Automação inteligente do inventário: Diferente dos métodos tradicionais com código de barras ou planilhas, o RFID não exige leitura individual e manual;\n Leitura sem linha de visão: Os ativos podem s ancário.\nIsso permite que o Banco do Brasil se prepare para o mercado de ativos digitais com controle, rastreabilidade e conformidade regulatória.", "indicadores": "Redução de risco em transações digitais; Volume de operações monitoradas; Tempo de detecção de transações suspeitas; Taxa de conformidade regulatória; Adoção de serviços digitais relacionados a ativos digitais; Número de integrações habilitadas com sistemas externos.", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 16.0, "rank": 156}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 16.92, "rank": 141}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 13.72, "rank": 151}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 18.04, "rank": 140}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 19.6, "rank": 117}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 17.52, "rank": 132}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 1, "total": 13.56, "rank": 163}}}, {"id": 307, "titulo": "Programa Valor Gameficado", "autor": "Rafael Guimaraes Trugilho", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Direp", "arena": "Eficiência Operacional e Automação", "trl": "2", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "​Implementar um módulo complementar de gamificação conectado à estrutura atual do Programa Valor. Sem alterar os critérios de avaliação ou as regras vigentes, a solução funcionará como uma \"camada de interface interativa\".\n​Os dados de desempenho atuais serão espelhados em tempo real na tela do colaborador em forma de:\n​Barra de Progresso Dinâmica: onde o funcionário visualiza o quão perto está de atingir o próximo nível de reconhecimento do ciclo atual.\n​Conquistas e medalhas (badges): selos digitais puramente meritórios concedidos automaticamente quando marcos intermediários são alcançados (ex: manter a constância de acompanhamento dos seus resultados).\n​Jornada visual: uma interface amigável que transforma o acompanhamento de metas em uma trilha de evolução pessoal, gerando feedbacks.", "ben": "​Para a BBTS: potencialização dos resultados do Programa Valor atual sem a necessidade de alterar suas regras de negócio, gerando aumento de produtividade por meio de um engajamento contínuo.\n​Para os gestores: facilidade para manter a equipe motivada ao longo do mês, utilizando uma camada visual que traduz o esforço diário de forma leve.\n​Para os funcionários: aumento da percepção de progresso contínuo. O funcionário consegue ver o impacto do seu trabalho diário se acumulando rumo à meta final do programa, tornando a jornada mais interativa e transparente.", "diferencial": "O grande diferencial é o respeito ao legado do programa atual aliado à inovação de engajamento comportamental. Não estamos propondo uma mudança nas regras ou na burocracia do Programa Valor, mas sim adicionando uma camada de design de jogos para tornar o acompanhamento do desempenho diário mais estimulante. É um complemento focado na experiência do usuário (UX) e na psicologia do incentivo, funcionando como um motivador de curto prazo para garantir o sucesso das metas de longo prazo da empresa.", "indicadores": "eNPS; Taxa de Atingimento de Metas; Nível de Adoção da Plataforma; Nível de Engajamento", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de experiência (cliente ou empregado)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE",  dados;\nAumento da conformidade com LGPD;\nDiminuição de riscos legais;\nPadronização do processo;\nRedução de retrabalho;\nEscalabilidade no tratamento de documentos.", "diferencial": "A ideia se diferencia por integrar IA para identificação automática de dados sensíveis com controle manual personalizável, oferecendo anonimização mais segura e flexível, além de garantir rastreabilidade completa e centralização do compartilhamento, tudo em uma solução desenvolvida internamente, reduzindo riscos de terceirização e aumentando a governança e conformidade com a LGPD.", "indicadores": "Taxa de detecção de dados sensíveis pela IA; Tempo médio de anonimização; Número de documentos processados", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 16.0, "rank": 158}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 16.62, "rank": 160}, "joao": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 3, "total": 14.28, "rank": 107}, "rafael": {"REL": 1, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 17.84, "rank": 157}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 4, "FAC": 2, "total": 19.0, "rank": 150}, "dani": {"REL": 2, "INO": 5, "DES": 4, "VIA": 4, "FAC": 2, "total": 16.92, "rank": 153}, "manoel": {"REL": 1, "INO": 5, "DES": 4, "VIA": 5, "FAC": 2, "total": 14.06, "rank": 111}}}, {"id": 309, "titulo": "Rastreio de Peças", "autor": "Andre Luiz Nunes", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "CAT-PTA", "arena": "Eficiência Operacional e Automação", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Criando um cod para cada item do nosso estoque, uma identidade única para cada item, rastreando sua vida util.\nA leitura do QR Code poderá ser feita via dispositivos móveis (smartphones ou coletores), permitindo que técnicos e gestores acessem e atualizem informações diretamente no local de trabalho, de forma rápida e precisa.", "ben": "✅ Maior controle e visibilidade do estoque\n✅ Redução de perdas e extravios de peças\n✅ Agilidade no diagnóstico de falhas recorrentes\n✅ Melhoria na gestão de manutenção preventiva e corretiva\n✅ Aumento da eficiência operacional e produtividade das equipes\n✅ Rastreabilidade completa do ciclo de vida das peças\nEmpresa ganha em eficiência, redução de custo, e maior disponibilidade dos equipamentos para o cliente.", "diferencial": "Não temos nenhuma solução atual.", "indicadores": "Com uma base de dados, vamos verificar na logística", "ganhos": "Ganhos de eficiência (redução de custo / produtividade / tempo)", "resultado": "PARCIALMENTE ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "AUSENTE", "PRESENTE", "PRESENTE", "PRESENTE", "INDETERMINADO", "INDETERMINADO", "PRESENTE"], "base": {"REL": 1, "INO": 2, "DES": 4, "VIA": 4, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 2, "DES": 4, "VIA": 4, "FAC": 1, "total": 12.0, "rank": 221}, "alex": {"REL": 1, "INO": 3, "DES": 5, "VIA": 4, "FAC": 1, "total": 13.32, "rank": 214}, "joao": {"REL": 1, "INO": 2, "DES": 4, "VIA": 4, "FAC": 2, "total": 11.08, "rank": 219}, "rafael": {"REL": 1, "INO": 3, "DES": 4, "VIA": 4, "FAC": 1, "total": 13.36, "rank": 218}, "laine": {"REL": 1, "INO": 2, "DES": 5, "VIA": 4, "FAC": 1, "total": 15.8, "rank": 213}, "dani": {"REL": 2, "INO": 2, "DES": 4, "VIA": 4, "FAC": 1, "total": 13.72, "rank": 214}, "manoel": {"REL": 1, "INO": 2, "DES": 4, "VIA": 5, "FAC": 1, "total": 11.66, "rank": 214}}}, {"id": 311, "titulo": "BBTS CISI – Central Inteligente de Segurança Integrada (SOC + ISOC unificado)", "autor": "Denis Salgado Gomes Mattos Medina", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "3000008023", "arena": "Negócios Digitais Escaláveis,Eficiência Operacional e Automação,Segurança Integrada", "trl": "1", "trl_fase": "Pesquisa e Desenvolvimento Inicial (TRL 1–3) — Ideia no papel a primeiros testes", "sol": "Implementar uma Central Inteligente de Segurança Integrada (CISI) com:\n\n\nIntegração de plataformas\n\nSegurança cibernética (SIEM, SOC, IAM)\nSegurança física (CFTV, controle de acesso, sensores)\n\n\n\nCentralização de dados\n\nEventos físicos e digitais em um único ambiente\nCorrelação de informações em tempo real\n\n\n\nAplicação de IA\n\nIdentificação de padrões e anomalias\nDetecção de ameaças híbridas\n\n\n\nMonitoramento contínuo\n\nDashboards em tempo real\nPriorização automática de incidentes\n\n\n\nResposta inteligente\n\nAlertas automatizados\nAções integradas (bloqueio de acesso físico + digital, por exemplo)", "ben": "Para a empresa (BBTS / BB):\n\nFortalecimento da postura de segurança integrada\nRedução de incidentes críticos\nNovo portfólio de serviços gerenciados de alto valor\n\nPara as pessoas:\n\nRedução da sobrecarga operacional (menos alertas isolados)\nMelhor tomada de decisão com visão contextual\nAtuação mais estratégica e menos reativa\n\nPara clientes:\n\nMaior proteção de ativos físicos e digitais\nMonitoramento contínuo e inteligente\nAumento da confiança nos serviços\n\nPara parceiros:\n\nIntegração com ecossistema de segurança mais robusto\nCompartilhamento seguro de informações\nRedução de riscos compartilhados", "diferencial": "O que existe hoje:\n\nSOC (segurança cibernética) separado de ISOC (segurança física)\nFerramentas desconectadas\nAnálise limitada ao contexto individual de cada sistema\n\nProposta inovadora:\n\nIntegração total: SOC + ISOC em uma única central\nCorrelação de eventos físicos e digitais\nIA aplicada para detecção de ameaças complexas\nMonitoramento e resposta unificados\n\nDiferencial chave: Segurança deixa de ser fragmentada → passa a ser integrada, inteligente e contextual", "indicadores": "Segurança  Tempo médio de detecção de incidentes (MTTD) Tempo médio de resposta (MTTR) % de ameaças identificadas preventivamente  Eficiência operacional:  Redução de falsos positivos (%) Volume de alertas correlacionados vs isolados Taxa de automação de resposta  Integração:  Número de sistemas integrados % de eventos analisados de forma cruzada (físico + digital)  Risco:  Redução de incidentes críticos Número de ameaças híbridas detectadas Índice de exposição a risco  Financeiros:  Redução de perdas por incidentes Receita com serviços gerenciados ROI da solução", "ganhos": "Ganhos financeiros (receita / novos negócios),Ganhos de eficiência (redução de custo / produtividade / tempo),Ganhos de segurança / conformidade / redução de risco,Ganhos de experiência (cliente ou empregado),Ganhos estratégicos (capacidade futura, posicionamento, aprendizado)", "resultado": "ADERENTE", "aderencia": ["ELEGÍVEL", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE", "PRESENTE"], "base": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1}, "scores": {"baseline": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.0, "rank": 102}, "alex": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 17.62, "rank": 88}, "joao": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 2, "total": 14.12, "rank": 126}, "rafael": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.84, "rank": 94}, "laine": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 20.2, "rank": 80}, "dani": {"REL": 2, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 18.5, "rank": 81}, "manoel": {"REL": 1, "INO": 5, "DES": 5, "VIA": 5, "FAC": 1, "total": 13.96, "rank": 131}}}, {"id": 312, "titulo": "Plataforma Inteligente de Direcionamento de Ocorrências", "autor": "Marcelo Reis Goncalves", "empresa": "BB TECNOLOGIA E SERVICOS S.A", "uo": "Cat Florinópolis", "arena": "Eficiência Operacional e Automação", "trl": "1" function aderDots(aderArr) {
  return '<div class="ader-dots">' + aderArr.map(function(v, i) {
    var cls = !v ? 'na' : (v.toUpperCase().includes('REPROVADO') ? 'fail' : 'ok');
    return '<div class="ader-dot ' + cls + '" title="C' + (i+1) + ': ' + esc(v||'—') + '"></div>';
  }).join('') + '</div>';
}

// ---- helpers ----
function esc(t) {
  return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function scClass(v) {
  var r = Math.round(v);
  return 'sc sc-' + Math.max(1, Math.min(5, r));
}
function scLabel(v) { return v % 1 === 0 ? v : v.toFixed(1); }
function deltaHtml(d) {
  if (d === 0) return '<span class="delta zero">=</span>';
  if (d > 0)   return '<span class="delta up">&#9650;' + d + '</span>';
  return '<span class="delta down">&#9660;' + Math.abs(d) + '</span>';
}
function rankClass(rank) {
  if (rank <= N*0.25) return 'q1';
  if (rank <= N*0.50) return 'q2';
  if (rank <= N*0.75) return 'q3';
  return 'q4';
}
